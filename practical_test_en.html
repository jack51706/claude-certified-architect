<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Certified Architect — Practical Test</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

.shell { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 260px; min-width: 260px;
  background: #1a1a2e; color: #cdd3de;
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
  padding: 20px 16px 14px;
  font-size: 13px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  color: #7f8fa6; border-bottom: 1px solid #2c2c4a; flex-shrink: 0;
}
.sidebar-progress {
  padding: 10px 16px; font-size: 12px; color: #7f8fa6;
  border-bottom: 1px solid #2c2c4a; flex-shrink: 0;
}
.sidebar-progress span { color: #e2e8f0; font-weight: 600; }
.sidebar-scroll { overflow-y: auto; flex: 1; padding: 8px 0; }
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: #2c2c4a; border-radius: 2px; }

.scenario-group { margin-bottom: 4px; }
.scenario-label {
  padding: 6px 16px 4px; font-size: 10.5px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase; color: #4a5568;
}
.q-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 6px 16px;
  background: none; border: none; cursor: pointer;
  font-size: 13.5px; color: #a0aec0; text-align: left;
  transition: background .15s, color .15s;
  border-left: 3px solid transparent;
}
.q-btn:hover { background: #242447; color: #e2e8f0; }
.q-btn.active { background: #1e3a5f; color: #63b3ed; border-left-color: #63b3ed; }
.q-btn.answered-correct { color: #68d391; }
.q-btn.answered-correct .q-dot { background: #68d391; }
.q-btn.answered-wrong { color: #fc8181; }
.q-btn.answered-wrong .q-dot { background: #fc8181; }
.q-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4a5568; flex-shrink: 0; transition: background .2s;
}

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 12px 32px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.topbar-title { font-size: 15px; font-weight: 600; color: #2d3748; }
.topbar-nav { display: flex; gap: 10px; align-items: center; }
.nav-btn {
  padding: 7px 18px; border-radius: 8px;
  border: 1.5px solid #cbd5e0; background: #fff;
  font-size: 14px; cursor: pointer; color: #4a5568; font-weight: 500;
  transition: all .15s;
}
.nav-btn:hover { background: #edf2f7; border-color: #a0aec0; }
.nav-btn:disabled { opacity: .35; cursor: default; }
.nav-btn.finish { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }
.nav-btn.finish:hover { background: #2c5282; }
.q-counter { font-size: 13px; color: #718096; font-weight: 500; }

.content { flex: 1; overflow-y: auto; padding: 36px 48px; }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

/* Question card */
.q-card { max-width: 820px; margin: 0 auto; }
.q-scenario {
  display: inline-block; background: #ebf8ff; color: #2b6cb0;
  font-size: 12px; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; padding: 4px 12px;
  border-radius: 20px; margin-bottom: 16px;
}
.q-number { font-size: 13px; color: #a0aec0; margin-bottom: 6px; font-weight: 600; }
.q-situation {
  font-size: 16.5px; color: #1a202c;
  font-weight: 500; line-height: 1.7;
  background: #fff;
  border: 1.5px solid #d0dff0;
  border-radius: 10px;
  padding: 16px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  margin-bottom: 22px;
}
.q-situation code, .opt-text code, .explanation code {
  background: #e2e8f0; padding: 1px 5px; border-radius: 4px;
  font-family: "SF Mono", Menlo, Monaco, monospace;
  font-size: 13.5px; color: #2d3748;
}
.explanation code { background: #feebc8; }
.q-prompt { font-size: 17px; font-weight: 700; color: #1a202c; margin-bottom: 20px; }

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.option {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 18px; border: 2px solid #e2e8f0;
  border-radius: 12px; cursor: pointer; background: #fff;
  transition: border-color .15s, background .15s, transform .1s;
}
.option:hover:not(.locked) {
  border-color: #90cdf4; background: #ebf8ff; transform: translateX(2px);
}
.option.locked { cursor: default; }
.opt-letter {
  width: 30px; height: 30px; min-width: 30px; border-radius: 50%;
  background: #edf2f7; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #4a5568;
  transition: background .2s, color .2s; flex-shrink: 0;
}
.opt-text { font-size: 15px; color: #2d3748; line-height: 1.55; padding-top: 3px; }

.option.correct { border-color: #48bb78; background: #f0fff4; }
.option.correct .opt-letter { background: #48bb78; color: #fff; }
.option.wrong { border-color: #fc8181; background: #fff5f5; }
.option.wrong .opt-letter { background: #fc8181; color: #fff; }
.option.dimmed { opacity: .55; }

/* Explanation */
.explanation {
  margin-top: 4px; padding: 14px 18px;
  background: #fffbeb; border-left: 4px solid #f6ad55;
  border-radius: 0 10px 10px 0;
  font-size: 14.5px; color: #744210; line-height: 1.65; display: none;
}
.explanation.show { display: block; }
.explanation strong { color: #744210; }

/* Summary */
.summary { max-width: 820px; margin: 0 auto; display: none; }
.summary.show { display: block; }
.summary h1 { font-size: 26px; font-weight: 800; color: #1a202c; margin-bottom: 6px; }
.summary-subtitle { color: #718096; font-size: 15px; margin-bottom: 28px; }
.score-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 32px; }
.score-card {
  background: #fff; border-radius: 14px; padding: 20px;
  text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.07);
}
.score-card .big { font-size: 38px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
.score-card .label { font-size: 13px; color: #718096; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.score-card.total .big { color: #2b6cb0; }
.score-card.correct-c .big { color: #38a169; }
.score-card.wrong-c .big { color: #e53e3e; }

.section-title {
  font-size: 18px; font-weight: 700; color: #2d3748;
  margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #e2e8f0;
}
.group-block {
  background: #fff; border-radius: 12px; padding: 18px 20px;
  margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.group-title {
  font-size: 15px; font-weight: 700; color: #2d3748;
  margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.group-badge {
  font-size: 11px; padding: 2px 10px; border-radius: 20px;
  font-weight: 700; background: #fff5f5; color: #c53030;
}
.wrong-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 12px 0; border-bottom: 1px solid #f0f0f0;
  font-size: 14px; color: #4a5568;
}
.wrong-item:last-child { border-bottom: none; }
.wrong-item .wi-n { min-width: 32px; font-weight: 700; color: #a0aec0; font-size: 12px; padding-top: 2px; }
.wrong-item .wi-q { flex: 1; }
.wrong-item .wi-situation { font-size: 13.5px; color: #2d3748; font-weight: 500; margin-bottom: 4px; line-height: 1.5; }
.wrong-item .wi-situation code { background: #e2e8f0; padding: 1px 4px; border-radius: 3px; font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 12.5px; }
.wrong-item .wi-prompt { font-size: 13px; color: #718096; font-style: italic; margin-bottom: 4px; }
.wrong-item .wi-ans { font-size: 12px; margin-top: 3px; color: #718096; }
.wi-wrong-tag { color: #e53e3e; font-weight: 700; }
.wi-correct-tag { color: #38a169; font-weight: 700; }

.restart-btn {
  margin-top: 28px; padding: 12px 32px;
  background: #2b6cb0; color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background .15s;
}
.restart-btn:hover { background: #2c5282; }

.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-header">Questions</div>
    <div class="sidebar-progress">Answered: <span id="answeredCount">0</span> / <span id="totalCount">0</span></div>
    <div class="sidebar-scroll" id="sidebarList"></div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Claude Certified Architect — Practical Test</div>
      <div class="topbar-nav">
        <span class="q-counter" id="qCounter"></span>
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>&#8592; Prev</button>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next &#8594;</button>
        <button class="nav-btn finish" id="finishBtn" onclick="showSummary()">Finish &amp; Review</button>
      </div>
    </div>
    <div class="content">
      <div class="screen active" id="questionScreen">
        <div class="q-card" id="qCard"></div>
      </div>
      <div class="screen" id="summaryScreen">
        <div class="summary show" id="summaryContent"></div>
      </div>
    </div>
  </div>
</div>
<script>
const QUESTIONS = [{"scenario": "Multi-agent Research System", "global_n": 1, "situation": "A document analysis agent discovers that two credible sources contain directly contradictory statistics for a key metric: a government report states 40% growth, while an industry analysis states 12%. Both sources look credible, and the discrepancy could materially affect the research conclusions. How should the document analysis agent handle this situation most effectively?", "question": "Which approach is most effective?", "options": [{"letter": "A", "text": "Apply credibility heuristics to pick the most likely correct number, finish analysis with that value, and add a footnote mentioning the discrepancy.", "correct": false}, {"letter": "B", "text": "Include both numbers in the analysis output without marking them as conflicting, letting the synthesis agent decide which to use based on broader context.", "correct": false}, {"letter": "C", "text": "Stop analysis and immediately escalate to the coordinator, asking it to decide which source is more authoritative before continuing.", "correct": false}, {"letter": "D", "text": "Complete analysis with both numbers, explicitly annotate the conflict with source attribution, and let the coordinator decide how to reconcile the data before passing to synthesis.", "correct": true}], "correct": "D", "explanation": "This approach preserves separation of responsibilities: the analysis agent completes its core work without blocking, preserves both conflicting values with clear attribution, and correctly passes reconciliation to the coordinator, which has broader context."}, {"scenario": "Multi-agent Research System", "global_n": 2, "situation": "The web-search and document-analysis agents have completed their tasks and returned results to the coordinator. What is the next step for creating an integrated research report?", "question": "Which next step is most appropriate?", "options": [{"letter": "A", "text": "Each agent sends its results directly to the report-writing agent, bypassing the coordinator.", "correct": false}, {"letter": "B", "text": "The document analysis agent requests web-search results and merges them internally.", "correct": false}, {"letter": "C", "text": "The coordinator passes both sets of results to the synthesis agent for a unified integration.", "correct": true}, {"letter": "D", "text": "The coordinator concatenates the raw outputs from both agents and returns them as the final result.", "correct": false}], "correct": "C", "explanation": "In a coordinator–subagent architecture, the coordinator forwards both result sets to the synthesis agent for centralized integration, preserving control and ensuring high-quality merging."}, {"scenario": "Multi-agent Research System", "global_n": 3, "situation": "A document analysis subagent frequently fails when processing PDF files: some have corrupted sections that trigger parsing exceptions, others are password-protected, and sometimes the parsing library hangs on large files. Currently, any exception immediately terminates the subagent and returns an error to the coordinator, which must decide whether to retry, skip, or fail the whole task. This causes excessive coordinator involvement in routine error handling. What architectural improvement is most effective?", "question": "Which improvement is most effective?", "options": [{"letter": "A", "text": "Create a dedicated error-handling agent that monitors all failures via a shared queue and decides recovery actions, sending restart commands directly to subagents.", "correct": false}, {"letter": "B", "text": "Configure the subagent to always return partial results with a success status, embedding error details in metadata; the coordinator treats all responses as successful.", "correct": false}, {"letter": "C", "text": "Make the coordinator validate all documents before sending them to the subagent, rejecting documents that might cause failures.", "correct": false}, {"letter": "D", "text": "Implement local recovery in the subagent for transient failures and escalate to the coordinator only errors it cannot resolve, including attempted steps and partial results.", "correct": true}], "correct": "D", "explanation": "Handle errors at the lowest level capable of resolving them. Local recovery reduces coordinator workload while still escalating truly unrecoverable issues with full context and partial progress."}, {"scenario": "Multi-agent Research System", "global_n": 4, "situation": "After running the system on “AI impact on creative industries,” you observe that every subagent completes successfully: the web-search agent finds relevant articles, the document analysis agent summarizes them correctly, and the synthesis agent produces coherent text. However, final reports cover only visual art and completely miss music, literature, and film. In the coordinator logs, you see it decomposed the topic into three subtasks: “AI in digital art,” “AI in graphic design,” and “AI in photography.” What is the most likely root cause?", "question": "What is the most likely root cause?", "options": [{"letter": "A", "text": "The synthesis agent lacks instructions to detect coverage gaps.", "correct": false}, {"letter": "B", "text": "The document analysis agent filters out non-visual sources due to overly strict relevance criteria.", "correct": false}, {"letter": "C", "text": "The coordinator’s task decomposition is too narrow, assigning subagents work that does not cover all relevant areas.", "correct": true}, {"letter": "D", "text": "The web-search agent’s queries are insufficient and should be broadened to cover more sectors.", "correct": false}], "correct": "C", "explanation": "The coordinator decomposed a broad topic only into visual-art subtasks, missing music, literature, and film entirely. Since subagents executed their assignments correctly, the narrow decomposition is the obvious root cause."}, {"scenario": "Multi-agent Research System", "global_n": 5, "situation": "The web-search subagent returns results for only 3 of 5 requested source categories (competitor sites and industry reports succeed, but news archives and social feeds time out). The document analysis subagent successfully processes all provided documents. The synthesis subagent must produce a summary from mixed-quality upstream inputs. Which error-propagation strategy is most effective?", "question": "Which error-propagation strategy is most effective?", "options": [{"letter": "A", "text": "Continue synthesis using only successful sources and produce an output without mentioning which data was unavailable.", "correct": false}, {"letter": "B", "text": "The synthesis subagent returns an error to the coordinator, triggering a full retry or task failure due to incomplete data.", "correct": false}, {"letter": "C", "text": "The synthesis subagent asks the coordinator to retry timed-out sources with a longer timeout before starting synthesis.", "correct": false}, {"letter": "D", "text": "Structure the synthesis output with coverage annotations that indicate which conclusions are well-supported and where gaps exist due to unavailable sources.", "correct": true}], "correct": "D", "explanation": "Coverage annotations implement graceful degradation with transparency, preserving value from completed work while propagating uncertainty to enable informed decisions about confidence."}, {"scenario": "Multi-agent Research System", "global_n": 6, "situation": "The document analysis subagent encounters a corrupted PDF file that it cannot parse. When designing the system’s error handling, what is the most effective way to handle this failure?", "question": "Which approach is most effective?", "options": [{"letter": "A", "text": "Return an error with context to the coordinator agent, allowing it to decide how to proceed.", "correct": true}, {"letter": "B", "text": "Silently skip the corrupted document and continue processing the remaining files to avoid interrupting the workflow.", "correct": false}, {"letter": "C", "text": "Automatically retry parsing the document three times with exponential backoff before reporting a failure.", "correct": false}, {"letter": "D", "text": "Throw an exception that terminates the entire research workflow.", "correct": false}], "correct": "A", "explanation": "Returning an error with context to the coordinator is the most effective approach because it lets the coordinator make an informed decision—skip the file, try an alternative parsing method, or notify the user—while maintaining visibility into the failure."}, {"scenario": "Multi-agent Research System", "global_n": 7, "situation": "Production logs show a persistent pattern: requests like “analyze the uploaded quarterly report” are routed to the web-search agent 45% of the time instead of the document analysis agent. Reviewing tool definitions, you find that the web-search agent has a tool `analyze_content` described as “analyzes content and extracts key information,” while the document analysis agent has a tool `analyze_document` described as “analyzes documents and extracts key information.” How should you fix the misrouting problem?", "question": "How should you fix the misrouting problem?", "options": [{"letter": "A", "text": "Add a pre-routing classifier that detects whether the user refers to uploaded files or web content before the coordinator decides on delegation.", "correct": false}, {"letter": "B", "text": "Rename the web-search tool to `extract_web_results` and update its description to “processes and returns information retrieved from web search and URLs.”", "correct": true}, {"letter": "C", "text": "Add few-shot examples to the coordinator prompt showing correct routing: “User uploads a quarterly report → document analysis agent” and “User asks about a web page → web-search agent.”", "correct": false}, {"letter": "D", "text": "Expand the document analysis tool description with usage examples like “Use for uploaded PDFs, Word docs, and spreadsheets,” leaving the web-search tool unchanged.", "correct": false}], "correct": "B", "explanation": "Renaming the web-search tool to `extract_web_results` and updating its description to explicitly reference web search and URLs directly removes the root cause by eliminating semantic overlap between the two tool names and descriptions. This makes each tool’s purpose unambiguous, enabling the coordinator to reliably distinguish document analysis from web search."}, {"scenario": "Multi-agent Research System", "global_n": 8, "situation": "A colleague proposes that the document analysis agent should send its results directly to the synthesis agent, bypassing the coordinator. What is the main advantage of keeping the coordinator as the central hub for all communication between subagents?", "question": "What is the main advantage of keeping the coordinator as the central hub?", "options": [{"letter": "A", "text": "The coordinator can observe all interactions, handle errors uniformly, and decide what information each subagent should receive.", "correct": true}, {"letter": "B", "text": "The coordinator batches multiple requests to subagents, reducing total API calls and overall latency.", "correct": false}, {"letter": "C", "text": "Routing through the coordinator enables automatic retry logic that direct inter-agent calls cannot support.", "correct": false}, {"letter": "D", "text": "Subagents use isolated memory, and direct communication would require complex serialization that only the coordinator can perform.", "correct": false}], "correct": "A", "explanation": "The coordinator pattern provides centralized visibility into all interactions, uniform error handling across the system, and fine-grained control over what information each subagent receives—these are the primary advantages of a star-shaped communication topology."}, {"scenario": "Multi-agent Research System", "global_n": 9, "situation": "The web-search subagent times out while researching a complex topic. You need to design how information about this failure is returned to the coordinator. Which error-propagation approach best enables intelligent recovery?", "question": "Which error-propagation approach best enables intelligent recovery?", "options": [{"letter": "A", "text": "Return structured error context to the coordinator including the failure type, the query executed, any partial results, and potential alternative approaches.", "correct": true}, {"letter": "B", "text": "Catch the timeout within the subagent and return an empty result set marked as successful.", "correct": false}, {"letter": "C", "text": "Implement automatic exponential-backoff retries inside the subagent, only returning a generic “search unavailable” status after exhausting retries.", "correct": false}, {"letter": "D", "text": "Propagate the timeout exception directly to the top-level handler, terminating the entire research workflow.", "correct": false}], "correct": "A", "explanation": "Returning structured error context—including failure type, executed query, partial results, and alternative approaches—gives the coordinator everything needed to make intelligent recovery decisions (e.g., retry with a modified query or continue with partial results). It preserves maximum context for informed coordination-level decision-making."}, {"scenario": "Multi-agent Research System", "global_n": 10, "situation": "In your system design, you gave the document analysis agent access to a general-purpose tool `fetch_url` so it could download documents by URL. Production logs show this agent now frequently downloads search engine results pages to perform ad hoc web search—behavior that should be routed through the web-search agent—causing inconsistent results. Which fix is most effective?", "question": "Which fix is most effective?", "options": [{"letter": "A", "text": "Replace `fetch_url` with a `load_document` tool that validates that URLs point to document formats.", "correct": true}, {"letter": "B", "text": "Remove `fetch_url` from the document analysis agent and route all URL fetching through the coordinator to the web-search agent.", "correct": false}, {"letter": "C", "text": "Implement filtering that blocks `fetch_url` calls to known search engine domains while allowing other URLs.", "correct": false}, {"letter": "D", "text": "Add instructions to the document analysis agent prompt that `fetch_url` should only be used to download document URLs, not to search.", "correct": false}], "correct": "A", "explanation": "Replacing a general-purpose tool with a document-specific tool that validates URLs against document formats fixes the root cause by constraining capability at the interface level. This follows the principle of least privilege, making undesired search behavior impossible rather than merely discouraged."}, {"scenario": "Multi-agent Research System", "global_n": 11, "situation": "While researching a broad topic, you observe that the web-search agent and the document analysis agent investigate the same subtopics, leading to substantial duplication in their outputs. Token usage nearly doubles without a proportional increase in research breadth or depth. What is the most effective way to address this?", "question": "What is the most effective way to address this?", "options": [{"letter": "A", "text": "Allow both agents to finish in parallel, then have the coordinator deduplicate overlapping results before passing them to the synthesis agent.", "correct": false}, {"letter": "B", "text": "The coordinator explicitly partitions the research space before delegating, assigning each agent distinct subtopics or source types.", "correct": true}, {"letter": "C", "text": "Implement a shared-state mechanism where agents log their current focus area so other agents can dynamically avoid duplication during execution.", "correct": false}, {"letter": "D", "text": "Switch to sequential execution where document analysis runs only after web search completes, using web-search results as context to avoid duplication.", "correct": false}], "correct": "B", "explanation": "Having the coordinator explicitly partition the research space before delegating is most effective because it addresses the root cause—unclear task boundaries—before any work begins. It preserves parallelism while preventing duplicated effort and wasted tokens."}, {"scenario": "Multi-agent Research System", "global_n": 12, "situation": "During research, the web-search subagent queries three source categories with different outcomes: academic databases return 15 relevant papers, industry reports return “0 results,” and patent databases return “Connection timeout.” When designing error propagation to the coordinator, which approach enables the best recovery decisions?", "question": "Which approach enables the best recovery decisions?", "options": [{"letter": "A", "text": "Aggregate the results into a single success-percentage metric (e.g., “67% source coverage”) with detailed logs available on demand.", "correct": false}, {"letter": "B", "text": "Report both “timeout” and “0 results” as failures requiring coordinator intervention.", "correct": false}, {"letter": "C", "text": "Retry transient failures internally and report only persistent errors.", "correct": false}, {"letter": "D", "text": "Distinguish access failures (timeout) that require a retry decision from valid empty results (“0 results”) that represent successful queries.", "correct": true}], "correct": "D", "explanation": "A timeout (access failure) and “0 results” (valid empty result) are semantically different outcomes requiring different responses. Distinguishing them allows the coordinator to retry the patent database while accepting the industry reports “0 results” as a valid, informative finding."}, {"scenario": "Multi-agent Research System", "global_n": 13, "situation": "Production monitoring shows inconsistent synthesis quality. When aggregated results are ~75K tokens, the synthesis agent reliably cites information from the first 15K tokens (web-search headlines/snippets) and the last 10K tokens (document analysis conclusions), but often misses critical findings in the middle 50K tokens—even when they directly answer the research question. How should you restructure the aggregated input?", "question": "How should you restructure the aggregated input?", "options": [{"letter": "A", "text": "Summarize all subagent outputs to under 20K tokens before aggregation to keep content within the model’s reliable processing range.", "correct": false}, {"letter": "B", "text": "Stream subagent results to the synthesis agent incrementally, processing web-search results first to completion, then adding document analysis results.", "correct": false}, {"letter": "C", "text": "Place a key-findings summary at the start of the aggregated input and organize detailed results with explicit section headings for easier navigation.", "correct": true}, {"letter": "D", "text": "Implement rotation that alternates which subagent’s results appear first across research tasks to ensure both sources get equal top positioning over time.", "correct": false}], "correct": "C", "explanation": "Putting a key-findings summary at the start leverages primacy effects so critical information sits in the most reliably processed position. Adding explicit section headings throughout helps the model navigate and attend to mid-input content, directly mitigating the “lost in the middle” phenomenon."}, {"scenario": "Multi-agent Research System", "global_n": 14, "situation": "In testing, the combined output of the web-search agent (85K tokens including page content) and the document analysis agent (70K tokens including chains of thought) totals 155K tokens, but the synthesis agent performs best with inputs under 50K tokens. Which solution is most effective?", "question": "Which solution is most effective?", "options": [{"letter": "A", "text": "Modify upstream agents to return structured data (key facts, quotes, relevance scores) instead of verbose content and reasoning.", "correct": true}, {"letter": "B", "text": "Add an intermediate summarization agent that condenses findings before passing them to synthesis.", "correct": false}, {"letter": "C", "text": "Have the synthesis agent process findings in sequential batches, maintaining state between calls.", "correct": false}, {"letter": "D", "text": "Store findings in a vector database and give the synthesis agent search tools to query during its work.", "correct": false}], "correct": "A", "explanation": "Modifying upstream agents to return structured data fixes the root cause by reducing token volume at the source while preserving essential information. It avoids passing bulky page content and reasoning traces that inflate tokens without improving the synthesis step."}, {"scenario": "Multi-agent Research System", "global_n": 15, "situation": "In testing, you observe that the synthesis agent often needs to verify specific claims while merging results. Currently, when verification is needed, the synthesis agent returns control to the coordinator, which calls the web-search agent and then re-invokes synthesis with the results. This adds 2–3 extra loops per task and increases latency by 40%. Your assessment shows 85% of these verifications are simple fact checks (dates, names, stats) and 15% require deeper research. Which approach most effectively reduces overhead while preserving system reliability?", "question": "Which approach is most effective?", "options": [{"letter": "A", "text": "Give the synthesis agent access to all web-search tools so it can handle any verification need directly without coordinator loops.", "correct": false}, {"letter": "B", "text": "Have the synthesis agent accumulate all verification needs and return them as a batch to the coordinator at the end, which then sends them all to the web-search agent at once.", "correct": false}, {"letter": "C", "text": "Have the web-search agent proactively cache extra context around each source during initial research in anticipation of synthesis needing verification.", "correct": false}, {"letter": "D", "text": "Give the synthesis agent a limited-scope `verify_fact` tool for simple checks, while routing complex verifications through the coordinator to the web-search agent.", "correct": true}], "correct": "D", "explanation": "A limited-scope fact-verification tool lets the synthesis agent handle 85% of simple checks directly, eliminating most loops, while preserving the coordinator delegation path for the 15% of complex verifications. This applies least privilege while significantly reducing latency."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 16, "situation": "Your CI pipeline runs the Claude Code CLI (in `--print` mode) using CLAUDE.md to provide project context for code review, and developers generally find the reviews substantive. However, they report that integrating findings into the workflow is difficult—Claude outputs narrative paragraphs that must be manually copied into PR comments. The team wants to automatically post each finding as a separate inline PR comment at the relevant place in code, which requires structured data with file path, line number, severity level, and suggested fix. Which approach is most effective?", "question": "Which approach is most effective?", "options": [{"letter": "A", "text": "Add an “Output Format for Review” section to CLAUDE.md with examples of structured findings so Claude learns the expected format from project context.", "correct": false}, {"letter": "B", "text": "Use the CLI flags `--output-format json` and `--json-schema` to enforce structured findings, then parse the output to post inline comments via the GitHub API.", "correct": true}, {"letter": "C", "text": "Include explicit formatting instructions in the review prompt requiring each finding to follow a parseable template like `[FILE:path] [LINE:n] [SEVERITY:level] ...`.", "correct": false}, {"letter": "D", "text": "Keep narrative review format but add a summarization step that uses Claude to generate a structured JSON summary of findings.", "correct": false}], "correct": "B", "explanation": "Using `--output-format json` with `--json-schema` enforces structured output at the CLI level, guaranteeing well-formed JSON with the required fields (file path, line number, severity, suggested fix) that can be reliably parsed and posted as inline PR comments via the GitHub API. It leverages built-in CLI capabilities designed specifically for structured output."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 17, "situation": "Your team uses Claude Code for generating code suggestions, but you notice a pattern: non-obvious issues—performance optimizations that break edge cases, cleanups that unexpectedly change behavior—are only caught when another team member reviews the PR. Claude’s reasoning during generation shows it considered these cases but concluded its approach was correct. Which approach directly addresses the root cause of this self-check limitation?", "question": "Which approach directly addresses the root cause?", "options": [{"letter": "A", "text": "Run a second independent instance of Claude Code to review the changes without access to the generator’s reasoning.", "correct": true}, {"letter": "B", "text": "Enable extended thinking mode for the generation stage to allow more thorough deliberation before producing suggestions.", "correct": false}, {"letter": "C", "text": "Add explicit self-review instructions to the generation prompt asking Claude to critique its own suggestions before finalizing output.", "correct": false}, {"letter": "D", "text": "Include full test files and documentation in prompt context so Claude better understands expected behavior during generation.", "correct": false}], "correct": "A", "explanation": "A second independent Claude Code instance without access to the generator’s reasoning directly addresses the root cause by avoiding confirmation bias. This “fresh eyes” perspective mirrors human peer review, where another reviewer catches issues the author rationalized."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 18, "situation": "Your code review component is iterative: Claude analyzes the changed file, then may request related files (imports, base classes, tests) via tool calls to understand context before providing final feedback. Your application defines a tool that lets Claude request file contents; Claude calls the tool, gets results, and continues analysis. You’re evaluating batch processing to reduce API cost. What is the primary technical limitation when considering batch processing for this workflow?", "question": "What is the primary technical limitation?", "options": [{"letter": "A", "text": "Batch processing does not include correlation IDs to map outputs back to input requests.", "correct": false}, {"letter": "B", "text": "The asynchronous model cannot execute tools mid-request and return results for Claude to continue analysis.", "correct": true}, {"letter": "C", "text": "The Batch API does not support tool definitions in request parameters.", "correct": false}, {"letter": "D", "text": "The batch processing latency of up to 24 hours is too slow for pull request feedback, although the workflow would otherwise function.", "correct": false}], "correct": "B", "explanation": "A “fire-and-forget” asynchronous Batch API model has no mechanism to intercept a tool call during a request, execute the tool, and return results for Claude to continue analysis. This is fundamentally incompatible with iterative tool-calling workflows that require multiple tool request/response rounds within a single logical interaction."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 19, "situation": "Your CI/CD system runs three Claude-based analyses: (1) fast style checks on every PR that block merging until completion, (2) comprehensive weekly security audits of the entire codebase, and (3) nightly test-case generation for recently changed modules. The Message Batches API offers 50% savings but processing can take up to 24 hours. You want to optimize API cost while maintaining an acceptable developer experience. Which combination correctly matches each task to an API approach?", "question": "Which combination is correct?", "options": [{"letter": "A", "text": "Use the Message Batches API for all three tasks to maximize 50% savings, configuring the pipeline to poll for batch completion.", "correct": false}, {"letter": "B", "text": "Use synchronous calls for PR style checks; use the Message Batches API for weekly security audits and nightly test generation.", "correct": true}, {"letter": "C", "text": "Use synchronous calls for all three tasks for consistent response times, relying on prompt caching to reduce costs across workloads.", "correct": false}, {"letter": "D", "text": "Use synchronous calls for PR style checks and nightly test generation; use the Message Batches API only for weekly security audits.", "correct": false}], "correct": "B", "explanation": "PR style checks block developers and require immediate responses via synchronous calls, while weekly security audits and nightly test generation are scheduled tasks with flexible deadlines that can tolerate up to a 24-hour batch window—capturing 50% savings for both."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 20, "situation": "Your automated reviews find real issues, but developers report the feedback is not actionable. Findings include phrases like “complex ticket routing logic” or “potential null pointer” without specifying what exactly to change. When you add detailed instructions like “always include concrete fix suggestions,” the model still produces inconsistent output—sometimes detailed, sometimes vague. Which prompting technique most reliably produces consistently actionable feedback?", "question": "Which prompting technique is most reliable?", "options": [{"letter": "A", "text": "Further refine instructions with more explicit requirements for each part of the feedback format (location, issue, severity, proposed fix).", "correct": false}, {"letter": "B", "text": "Expand the context window to include more surrounding codebase so the model has enough information to propose concrete fixes.", "correct": false}, {"letter": "C", "text": "Implement a two-pass approach where one prompt identifies issues and a second generates fixes, allowing specialization.", "correct": false}, {"letter": "D", "text": "Add 3–4 few-shot examples showing the exact required format: identified issue, location in code, concrete fix suggestion.", "correct": true}], "correct": "D", "explanation": "Few-shot examples are the most effective technique for achieving consistent output format when instructions alone produce variable results. Providing 3–4 examples that show the exact desired structure (issue, location, concrete fix) gives the model a concrete pattern to follow, which is more reliable than abstract instructions."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 21, "situation": "Your CI pipeline includes two Claude-based code review modes: a pre-merge-commit hook that blocks PR merge until completion, and a “deep analysis” that runs overnight, polls for batch completion, and posts detailed suggestions to the PR. You want to reduce API cost using the Message Batches API, which offers 50% savings but requires polling and can take up to 24 hours. Which mode should use batch processing?", "question": "Which mode should use batch processing?", "options": [{"letter": "A", "text": "Only the pre-merge-commit hook.", "correct": false}, {"letter": "B", "text": "Only the deep analysis.", "correct": true}, {"letter": "C", "text": "Both modes.", "correct": false}, {"letter": "D", "text": "Neither mode.", "correct": false}], "correct": "B", "explanation": "Deep analysis is an ideal candidate for batch processing because it already runs overnight, tolerates delay, and uses a polling model before publishing results—matching the asynchronous, polling-based architecture of the Message Batches API while capturing 50% savings."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 22, "situation": "Your automated review analyzes comments and docstrings. The current prompt instructs Claude to “check that comments are accurate and up to date.” Findings often flag acceptable patterns (TODO markers, simple descriptions) while missing comments describing behavior the code no longer implements. What change addresses the root cause of this inconsistent analysis?", "question": "What change addresses the root cause?", "options": [{"letter": "A", "text": "Include `git blame` data so Claude can identify comments that predate recent code changes.", "correct": false}, {"letter": "B", "text": "Add few-shot examples of misleading comments to help the model recognize similar patterns in the codebase.", "correct": false}, {"letter": "C", "text": "Filter TODO, FIXME, and descriptive comment patterns before analysis to reduce noise.", "correct": false}, {"letter": "D", "text": "Specify explicit criteria: flag comments only when the behavior they claim contradicts the code’s actual behavior.", "correct": true}], "correct": "D", "explanation": "Explicit criteria—flagging comments only when claimed behavior contradicts actual code behavior—directly addresses the root cause by replacing a vague instruction with a precise definition of what constitutes a problem. This reduces false positives on acceptable patterns and misses of truly misleading comments."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 23, "situation": "Your automated code review system shows inconsistent severity ratings—similar issues like null pointer risks are rated “critical” in some PRs but only “medium” in others. Developer surveys show growing distrust—many start dismissing findings without reading because “half are wrong.” High-false-positive categories erode trust in accurate categories. Which approach best restores developer trust while improving the system?", "question": "Which approach best restores developer trust?", "options": [{"letter": "A", "text": "Temporarily disable high-false-positive categories (style, naming, documentation) and keep only high-precision categories while improving prompts.", "correct": true}, {"letter": "B", "text": "Keep all categories enabled but display confidence scores with each finding so developers can decide what to investigate.", "correct": false}, {"letter": "C", "text": "Keep all categories enabled and add few-shot examples to improve accuracy for each category over the next few weeks.", "correct": false}, {"letter": "D", "text": "Apply a uniform strictness reduction across all categories to bring the overall false-positive rate down.", "correct": false}], "correct": "A", "explanation": "Temporarily disabling high-false-positive categories immediately stops trust erosion by removing noisy findings that cause developers to dismiss everything, while preserving value from high-precision categories like security and correctness. It also creates space to improve prompts for problematic categories before re-enabling them."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 24, "situation": "Your automated review generates test-case suggestions for each PR. Reviewing a PR that adds course completion tracking, Claude suggests 10 test cases, but developer feedback shows that 6 duplicate scenarios already covered by the existing test suite. What change most effectively reduces duplicate suggestions?", "question": "What change is most effective?", "options": [{"letter": "A", "text": "Include the existing test file in context so Claude can determine what scenarios are already covered.", "correct": true}, {"letter": "B", "text": "Reduce the requested number of suggestions from 10 to 5, assuming Claude prioritizes the most valuable cases first.", "correct": false}, {"letter": "C", "text": "Add instructions directing Claude to focus exclusively on edge cases and error conditions rather than success paths.", "correct": false}, {"letter": "D", "text": "Implement post-processing that filters suggestions whose descriptions match existing test names via keyword overlap.", "correct": false}], "correct": "A", "explanation": "Including the existing test file fixes the root cause of duplication: Claude can only avoid suggesting already-covered scenarios if it knows what tests already exist. This gives Claude the information needed to propose genuinely new, valuable tests."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 25, "situation": "After an initial automated review identifies 12 findings, a developer pushes new commits to address issues. Re-running review produces 8 findings, but developers report that 5 duplicate previous comments on code that was already fixed in the new commits. What is the most effective way to eliminate this redundant feedback while maintaining thoroughness?", "question": "What is the most effective way to eliminate redundant feedback?", "options": [{"letter": "A", "text": "Run review only when the PR is created and in the final pre-merge state, skipping intermediate commits.", "correct": false}, {"letter": "B", "text": "Add a post-processing filter that removes findings that match previous ones by file paths and issue descriptions before posting comments.", "correct": false}, {"letter": "C", "text": "Restrict review scope to files changed in the most recent push, excluding files from earlier commits.", "correct": false}, {"letter": "D", "text": "Include previous review findings in context and instruct Claude to report only new or still-unresolved issues.", "correct": true}], "correct": "D", "explanation": "Including prior review findings in context lets Claude distinguish new problems from those already addressed in recent commits. This preserves review thoroughness while using Claude’s reasoning to avoid redundant feedback on fixed code."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 26, "situation": "Your pipeline script runs `claude \"Analyze this pull request for security issues\"`, but the job hangs indefinitely. Logs show Claude Code is waiting for interactive input. What is the correct approach to run Claude Code in an automated pipeline?", "question": "What is the correct approach?", "options": [{"letter": "A", "text": "Add a `--batch` flag: `claude --batch \"Analyze this pull request for security issues\"`.", "correct": false}, {"letter": "B", "text": "Add the `-p` flag: `claude -p \"Analyze this pull request for security issues\"`.", "correct": true}, {"letter": "C", "text": "Redirect stdin from `/dev/null`: `claude \"Analyze this pull request for security issues\" < /dev/null`.", "correct": false}, {"letter": "D", "text": "Set the environment variable `CLAUDE_HEADLESS=true` before running the command.", "correct": false}], "correct": "B", "explanation": "The `-p` (or `--print`) flag is the documented way to run Claude Code non-interactively. It processes the prompt, prints the result to stdout, and exits without waiting for user input—ideal for CI/CD pipelines."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 27, "situation": "A pull request changes 14 files in an inventory tracking module. A single-pass review that analyzes all files together produces inconsistent results: detailed feedback on some files but shallow comments on others, missed obvious bugs, and contradictory feedback (a pattern is flagged in one file but identical code is approved in another file in the same PR). How should you restructure the review?", "question": "How should you restructure the review?", "options": [{"letter": "A", "text": "Run three independent full-PR review passes and flag only issues that appear in at least two of the three runs.", "correct": false}, {"letter": "B", "text": "Split into focused passes: review each file individually for local issues, then run a separate integration-oriented pass to examine cross-file data flows.", "correct": true}, {"letter": "C", "text": "Require developers to split large PRs into smaller submissions of 3–4 files before running automated review.", "correct": false}, {"letter": "D", "text": "Switch to a larger model with a bigger context window so it can pay sufficient attention to all 14 files in one pass.", "correct": false}], "correct": "B", "explanation": "Focused per-file passes address the root cause—attention dilution—by ensuring consistent depth and reliable local issue detection. A separate integration-oriented pass then covers cross-file concerns such as dependency and data-flow interactions."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 28, "situation": "Your automated code review averages 15 findings per pull request, and developers report a 40% false-positive rate. The bottleneck is investigation time: developers must click into each finding to read Claude’s rationale before deciding whether to fix or dismiss it. Your CLAUDE.md already contains comprehensive rules for acceptable patterns, and stakeholders rejected any approach that filters findings before developers see them. What change best addresses investigation time?", "question": "What change best addresses investigation time?", "options": [{"letter": "A", "text": "Require Claude to include its rationale and confidence estimate directly in each finding.", "correct": true}, {"letter": "B", "text": "Add a post-processor that analyzes finding patterns and automatically suppresses those that match historical false-positive signatures.", "correct": false}, {"letter": "C", "text": "Categorize findings as “blocking issues” vs “suggestions,” with different review requirements by level.", "correct": false}, {"letter": "D", "text": "Configure Claude to show only high-confidence findings, filtering uncertain flags before developers see them.", "correct": false}], "correct": "A", "explanation": "Including rationale and confidence directly in each finding reduces investigation time by letting developers quickly triage without opening each finding. It satisfies the “no filtering” constraint because all findings remain visible while accelerating developer decision-making."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 29, "situation": "Analysis of your automated code review shows large differences in false-positive rates by finding category: security/correctness findings have 8% false positives, performance findings 18%, style/naming findings 52%, and documentation findings 48%. Developer surveys show growing distrust—many start dismissing findings without reading because “half are wrong.” High-false-positive categories erode trust in accurate categories. Which approach best restores developer trust while improving the system?", "question": "Which approach best restores developer trust?", "options": [{"letter": "A", "text": "Temporarily disable high-false-positive categories (style, naming, documentation) and keep only high-precision categories while improving prompts.", "correct": true}, {"letter": "B", "text": "Keep all categories enabled but display confidence scores with each finding so developers can decide what to investigate.", "correct": false}, {"letter": "C", "text": "Keep all categories enabled and add few-shot examples to improve accuracy for each category over the next few weeks.", "correct": false}, {"letter": "D", "text": "Apply a uniform strictness reduction across all categories to bring the overall false-positive rate down.", "correct": false}], "correct": "A", "explanation": "Temporarily disabling high-false-positive categories immediately stops trust erosion by removing noisy findings that cause developers to dismiss everything, while preserving value from high-precision categories like security and correctness. It also creates space to improve prompts for problematic categories before re-enabling them."}, {"scenario": "Claude Code for Continuous Integration", "global_n": 30, "situation": "Your team wants to reduce API costs for automated analysis. Currently, synchronous Claude calls support two workflows: (1) a blocking pre-merge check that must complete before developers can merge, and (2) a technical debt report generated overnight for review the next morning. Your manager proposes moving both to the Message Batches API to save 50%. How should you evaluate this proposal?", "question": "How should you evaluate this proposal?", "options": [{"letter": "A", "text": "Move both to batch processing with fallback to synchronous calls if batches take too long.", "correct": false}, {"letter": "B", "text": "Move both workflows to batch processing with status polling to verify completion.", "correct": false}, {"letter": "C", "text": "Use batch processing only for technical debt reports; keep synchronous calls for pre-merge checks.", "correct": true}, {"letter": "D", "text": "Keep synchronous calls for both workflows to avoid issues with batch result ordering.", "correct": false}], "correct": "C", "explanation": "Message Batches API processing can take up to 24 hours with no latency SLA, which is acceptable for overnight technical debt reports but unacceptable for blocking pre-merge checks where developers wait. This matches each workflow to the right API based on latency requirements."}, {"scenario": "Code Generation with Claude Code", "global_n": 31, "situation": "You asked Claude Code to implement a function that transforms API responses into an internal normalized format. After two iterations, the output structure still doesn’t match expectations—some fields are nested differently and timestamps are formatted incorrectly. You described requirements in prose, but Claude interprets them differently each time.", "question": "Which approach is most effective for the next iteration?", "options": [{"letter": "A", "text": "Write a JSON schema describing the expected output structure and validate Claude’s output against it after each iteration.", "correct": false}, {"letter": "B", "text": "Provide 2–3 concrete input-output examples showing the expected transformation for representative API responses.", "correct": true}, {"letter": "C", "text": "Rewrite requirements with more technical precision, specifying exact field mappings, nesting rules, and timestamp format strings.", "correct": false}, {"letter": "D", "text": "Ask Claude to explain its current understanding of the requirements to identify where interpretations diverge.", "correct": false}], "correct": "B", "explanation": "Concrete input-output examples remove ambiguity inherent in prose descriptions by showing Claude the exact expected transformation results. This directly addresses the root cause—misinterpretation of textual requirements—by providing unambiguous patterns for field nesting and timestamp formatting."}, {"scenario": "Code Generation with Claude Code", "global_n": 32, "situation": "You need to add Slack as a new notification channel. The existing codebase has clear, established patterns for email, SMS, and push channels. However, Slack’s API offers fundamentally different integration approaches—incoming webhooks (simple, one-way), bot tokens (support delivery confirmation and programmatic control), or Slack Apps (two-way events, requires workspace approval). Your task says “add Slack support” without specifying integration method or requiring advanced features like delivery tracking.", "question": "How should you approach this task?", "options": [{"letter": "A", "text": "Start in direct execution mode using incoming webhooks to match the existing one-way notification pattern.", "correct": false}, {"letter": "B", "text": "Switch to planning mode to explore integration options and architectural implications, then present a recommendation before implementation.", "correct": true}, {"letter": "C", "text": "Start in direct execution mode by scaffolding a Slack channel class using existing patterns, deferring the integration method decision.", "correct": false}, {"letter": "D", "text": "Start in direct execution mode using a bot-token approach to ensure delivery confirmation is possible.", "correct": false}], "correct": "B", "explanation": "Slack integration has multiple valid approaches with significantly different architectural implications, and requirements are ambiguous. Planning mode lets you evaluate trade-offs among webhooks, bot tokens, and Slack Apps and align on an approach before implementation."}, {"scenario": "Code Generation with Claude Code", "global_n": 33, "situation": "Your CLAUDE.md file has grown to 400+ lines containing coding standards, testing conventions, a detailed PR review checklist, deployment instructions, and database migration procedures. You want Claude to always follow coding standards and testing conventions, but apply PR review, deploy, and migration guidance only when doing those tasks.", "question": "Which restructuring approach is most effective?", "options": [{"letter": "A", "text": "Move all guidance into separate Skills files organized by workflow type, leaving only a brief project description in CLAUDE.md.", "correct": false}, {"letter": "B", "text": "Keep everything in CLAUDE.md but use `@import` syntax to organize into separately maintained files by category.", "correct": false}, {"letter": "C", "text": "Split CLAUDE.md into files under `.claude/rules/` with path-bound glob patterns so each rule loads only for the relevant file types.", "correct": false}, {"letter": "D", "text": "Keep universal standards in CLAUDE.md and create Skills for workflow-specific guidance (PR review, deploy, migrations) with trigger keywords.", "correct": true}], "correct": "D", "explanation": "CLAUDE.md content loads in every session, ensuring coding standards and testing conventions always apply, while Skills are invoked on demand when Claude detects trigger keywords—ideal for workflow-specific guidance like PR review, deployment, and migrations."}, {"scenario": "Code Generation with Claude Code", "global_n": 34, "situation": "You’re tasked with restructuring your team’s monolithic application into microservices. This impacts changes across dozens of files and requires decisions about service boundaries and module dependencies.", "question": "Which approach should you choose?", "options": [{"letter": "A", "text": "Switch to planning mode to explore the codebase, understand dependencies, and design the implementation approach before making changes.", "correct": true}, {"letter": "B", "text": "Start in direct execution mode and switch to planning only after encountering unexpected complexity during implementation.", "correct": false}, {"letter": "C", "text": "Start in direct execution mode and make incremental changes, letting implementation reveal natural service boundaries.", "correct": false}, {"letter": "D", "text": "Use direct execution with detailed upfront instructions that specify each service structure.", "correct": false}], "correct": "A", "explanation": "Planning mode is the right strategy for complex architectural restructuring like splitting a monolith: it allows safe exploration and informed decisions about boundaries before committing to potentially expensive changes across many files."}, {"scenario": "Code Generation with Claude Code", "global_n": 35, "situation": "Your team created a `/analyze-codebase` skill that performs deep code analysis—dependency scanning, test coverage counts, and code quality metrics. After running the command, team members report Claude becomes less responsive in the session and loses the context of the original task.", "question": "How do you most effectively fix this while keeping full analysis capabilities?", "options": [{"letter": "A", "text": "Add `context: fork` in the skill frontmatter to run the analysis in an isolated subagent context.", "correct": true}, {"letter": "B", "text": "Add `model: haiku` in frontmatter to use a faster, cheaper model for analysis.", "correct": false}, {"letter": "C", "text": "Split the skill into three smaller skills, each producing less output.", "correct": false}, {"letter": "D", "text": "Add instructions to the skill to compress all results into a short summary before displaying them.", "correct": false}], "correct": "A", "explanation": "`context: fork` runs the analysis in an isolated subagent context so the large output does not pollute the main session’s context window and Claude does not lose track of the original task. It preserves full analysis capability while keeping the main session responsive."}, {"scenario": "Code Generation with Claude Code", "global_n": 36, "situation": "Your team uses a `/commit` skill in `.claude/skills/commit/SKILL.md`. A developer wants to customize it for their personal workflow (different commit message format, extra checks) without affecting teammates.", "question": "What do you recommend?", "options": [{"letter": "A", "text": "Create a personal version under `~/.claude/skills/` with a different name, e.g., `/my-commit`.", "correct": false}, {"letter": "B", "text": "Add conditional logic based on username in the project skill frontmatter.", "correct": false}, {"letter": "C", "text": "Create a personal version at `~/.claude/skills/commit/SKILL.md` with the same name.", "correct": true}, {"letter": "D", "text": "Set `override: true` in the personal skill frontmatter to prioritize it over the project version.", "correct": false}], "correct": "C", "explanation": "Personal skills take precedence over project skills with the same name. A personal skill at `~/.claude/skills/commit/SKILL.md` will override the team’s project skill, allowing the developer to customize their workflow while maintaining the familiar `/commit` command name for their personal use. This approach is better than option A because it preserves the original command name, improving the developer’s workflow without affecting teammates."}, {"scenario": "Code Generation with Claude Code", "global_n": 37, "situation": "Your team has used Claude Code for months. Recently, three developers report Claude follows the guidance “always include comprehensive error handling,” but a fourth developer who just joined says Claude does not follow it. All four work in the same repo and have up-to-date code.", "question": "What is the most likely cause and fix?", "options": [{"letter": "A", "text": "The guidance lives in the original developers’ user-level `~/.claude/CLAUDE.md` files, not in the project `.claude/CLAUDE.md`. Move the instruction to the project-level file so all team members receive it.", "correct": true}, {"letter": "B", "text": "The new developer’s `~/.claude/CLAUDE.md` contains conflicting instructions overriding project settings; they should delete the conflicting section.", "correct": false}, {"letter": "C", "text": "Claude Code learns per-user preferences over time; the new developer must repeat the requirement until Claude “remembers” it.", "correct": false}, {"letter": "D", "text": "Claude Code caches CLAUDE.md after first read; original developers use cached versions. Everyone should clear the Claude Code cache.", "correct": false}], "correct": "A", "explanation": "If the guidance was added only to the original developers’ user-level configs and not to the project-level `.claude/CLAUDE.md`, new team members won’t receive it. Moving it to the project-level configuration ensures all current and future team members automatically get the guidance."}, {"scenario": "Code Generation with Claude Code", "global_n": 38, "situation": "You find that including 2–3 full endpoint implementation examples as context significantly improves consistency when generating new API endpoints. However, this context is useful only when creating new endpoints—not when debugging, reviewing code, or other work in the API directory.", "question": "Which configuration approach is most effective?", "options": [{"letter": "A", "text": "Add endpoint examples and pattern documentation to the project CLAUDE.md so they are always available.", "correct": false}, {"letter": "B", "text": "Manually reference endpoint examples in every generation request by copying code into the prompt.", "correct": false}, {"letter": "C", "text": "Configure path-specific rules in `.claude/rules/api/` that include endpoint examples and activate when working in the API directory.", "correct": false}, {"letter": "D", "text": "Create a skill that references the endpoint examples and contains pattern-following instructions, invoked on demand via a slash command.", "correct": true}], "correct": "D", "explanation": "A skill invoked on demand loads the example context only when generating new endpoints, not during unrelated tasks like debugging or review. This keeps the main context clean while preserving high-quality generation when needed."}, {"scenario": "Code Generation with Claude Code", "global_n": 39, "situation": "Your team created a `/migration` skill that generates database migration files. It takes the migration name via `$ARGUMENTS`. In production you observe three issues: (1) developers often run the skill without arguments, causing poorly named files, (2) the skill sometimes uses database schema details from unrelated prior conversations, and (3) a developer accidentally ran destructive test cleanup when the skill had broad tool access.", "question": "Which configuration approach fixes all three problems?", "options": [{"letter": "A", "text": "Use positional parameters `$1` and `$2` instead of `$ARGUMENTS` to enforce specific inputs, include explicit schema file references via `@` syntax for context control, and add a frontmatter description warning about destructive operations.", "correct": false}, {"letter": "B", "text": "Add `argument-hint` in frontmatter to request required parameters, use `context: fork` to isolate execution, and restrict `allowed-tools` to file-write operations.", "correct": true}, {"letter": "C", "text": "Split into `/migration-create` and `/migration-apply` skills, add validation instructions to request migration name if missing, and use different `allowed-tools` scopes for each.", "correct": false}, {"letter": "D", "text": "Add validation instructions in the skill SKILL.md to ensure `$ARGUMENTS` is a valid name, add prompts to ignore prior conversation context, and list prohibited operations to avoid.", "correct": false}], "correct": "B", "explanation": "This uses three separate configuration features to address each problem: `argument-hint` improves argument entry and reduces missing arguments, `context: fork` prevents context leakage from prior conversations, and `allowed-tools` constrains the skill to safe file-writing operations, preventing destructive actions."}, {"scenario": "Code Generation with Claude Code", "global_n": 40, "situation": "Your codebase contains areas with different coding conventions: React components use functional style with hooks, API handlers use async/await with specific error handling, and database models follow the repository pattern. Test files are distributed across the codebase next to the code under test (e.g., `Button.test.tsx` next to `Button.tsx`), and you want all tests to follow the same conventions regardless of location.", "question": "What is the most supported way to ensure Claude automatically applies the correct conventions when generating code?", "options": [{"letter": "A", "text": "Put all conventions in the root CLAUDE.md under headings for each area and rely on Claude to infer which section applies.", "correct": false}, {"letter": "B", "text": "Create skills in `.claude/skills/` for each code type, embedding conventions in each SKILL.md.", "correct": false}, {"letter": "C", "text": "Place a separate CLAUDE.md file in each subdirectory containing conventions for that area.", "correct": false}, {"letter": "D", "text": "Create rule files under `.claude/rules/` with YAML frontmatter specifying glob patterns to conditionally apply conventions based on file paths.", "correct": true}], "correct": "D", "explanation": "`.claude/rules/` files with YAML frontmatter and glob patterns (e.g., `**/*.test.tsx`, `src/api/**/*.ts`) enable deterministic, path-based convention application regardless of directory structure. This is the most supported approach for cross-cutting patterns like distributed test files."}, {"scenario": "Code Generation with Claude Code", "global_n": 41, "situation": "You want to create a custom slash command `/review` that runs your team’s standard code review checklist. It should be available to every developer when they clone or update the repository.", "question": "Where should you create the command file?", "options": [{"letter": "A", "text": "In `~/.claude/commands/` in each developer’s home directory.", "correct": false}, {"letter": "B", "text": "In the project repository under `.claude/commands/`.", "correct": true}, {"letter": "C", "text": "In `.claude/config.json` as an array of commands.", "correct": false}, {"letter": "D", "text": "In the root project CLAUDE.md.", "correct": false}], "correct": "B", "explanation": "Putting custom slash commands under `.claude/commands/` inside the project repository ensures they are version-controlled and automatically available to every developer who clones or updates the repo. This is the intended location for project-level custom commands in Claude Code."}, {"scenario": "Code Generation with Claude Code", "global_n": 42, "situation": "Your team’s CLAUDE.md grew beyond 500 lines mixing TypeScript conventions, testing guidance, API patterns, and deployment procedures. Developers find it hard to locate and update the right sections.", "question": "What approach does Claude Code support to organize project-level instructions into focused topical modules?", "options": [{"letter": "A", "text": "Define a `.claude/config.yaml` mapping file patterns to specific sections inside CLAUDE.md.", "correct": false}, {"letter": "B", "text": "Create separate Markdown files in `.claude/rules/`, each covering one topic (e.g., `testing.md`, `api-conventions.md`).", "correct": true}, {"letter": "C", "text": "Split instructions into README.md files in relevant subdirectories that Claude automatically loads as instructions.", "correct": false}, {"letter": "D", "text": "Create multiple files named CLAUDE.md at different levels of the directory tree, each overriding parent instructions.", "correct": false}], "correct": "B", "explanation": "Claude Code supports a `.claude/rules/` directory where you can create separate Markdown files for topical guidance (e.g., `testing.md`, `api-conventions.md`), allowing teams to organize large instruction sets into focused, maintainable modules."}, {"scenario": "Code Generation with Claude Code", "global_n": 43, "situation": "You create a custom skill `/explore-alternatives` that your team uses to brainstorm and evaluate implementation approaches before choosing one. Developers report that after running the skill, subsequent Claude responses are influenced by the alternatives discussion—sometimes referencing rejected approaches or retaining exploration context that interferes with actual implementation.", "question": "How should you most effectively configure this skill?", "options": [{"letter": "A", "text": "Use the `!` prefix in the skill to run exploration logic as a bash subprocess.", "correct": false}, {"letter": "B", "text": "Add `context: fork` in the skill frontmatter.", "correct": true}, {"letter": "C", "text": "Split into two skills—`/explore-start` and `/explore-end`—to mark boundaries when exploration context should be discarded.", "correct": false}, {"letter": "D", "text": "Create the skill in `~/.claude/skills/` instead of `.claude/skills/`.", "correct": false}], "correct": "B", "explanation": "`context: fork` runs the skill in an isolated subagent context so exploration discussions do not pollute the main conversation history. This prevents rejected approaches and brainstorming context from influencing subsequent implementation work."}, {"scenario": "Code Generation with Claude Code", "global_n": 44, "situation": "Your team wants to add a GitHub MCP server for searching PRs and checking CI status via Claude Code. Each of six developers has their own personal GitHub access token. You want consistent tooling across the team without committing credentials to version control.", "question": "Which configuration approach is most effective?", "options": [{"letter": "A", "text": "Have each developer add the server in user scope via `claude mcp add --scope user`.", "correct": false}, {"letter": "B", "text": "Create an MCP server wrapper that reads tokens from a `.env` file and proxies GitHub API calls, then add the wrapper to the project `.mcp.json`.", "correct": false}, {"letter": "C", "text": "Add the server to the project `.mcp.json` using environment variable substitution (`${GITHUB_TOKEN}`) for auth and document the required environment variable in the project README.", "correct": true}, {"letter": "D", "text": "Configure the server in project scope with a placeholder token, then tell developers to override it in their local config.", "correct": false}], "correct": "C", "explanation": "A project `.mcp.json` with environment variable substitution is idiomatic: it provides a single version-controlled source of truth for MCP configuration while letting each developer supply credentials via environment variables. Documenting the variable makes onboarding easy without committing secrets."}, {"scenario": "Code Generation with Claude Code", "global_n": 45, "situation": "You’re adding error-handling wrappers around external API calls across a 120-file codebase. The work has three phases: (1) discover all call sites and patterns, (2) collaboratively design the error-handling approach, and (3) implement wrappers consistently. In Phase 1, Claude generates large output listing hundreds of call sites with context, quickly filling the context window before discovery finishes.", "question": "Which approach is most effective to complete the task while maintaining implementation consistency?", "options": [{"letter": "A", "text": "Use an Explore subagent for Phase 1 to isolate verbose discovery output and return a summary, then continue Phases 2–3 in the main conversation.", "correct": true}, {"letter": "B", "text": "Do all phases in the main conversation, periodically using `/compact` to reduce context usage while moving through files.", "correct": false}, {"letter": "C", "text": "Switch to headless mode with `--continue`, passing explicit context summaries between batch calls to maintain continuity.", "correct": false}, {"letter": "D", "text": "Define the error-handling pattern in CLAUDE.md, then process files in batches across multiple sessions relying on the shared memory file for consistency.", "correct": false}], "correct": "A", "explanation": "An Explore subagent isolates the verbose discovery output in a separate context and returns only a concise summary to the main conversation. This preserves the main context window for the collaborative design and consistent implementation phases where retained context is most valuable."}, {"scenario": "Customer Support Agent", "global_n": 46, "situation": "While testing, you notice the agent often calls `get_customer` when users ask about order status, even though `lookup_order` would be more appropriate. What should you check first to address this problem?", "question": "What should you check first?", "options": [{"letter": "A", "text": "Implement a preprocessing classifier to detect order-related requests and route them directly to `lookup_order`.", "correct": false}, {"letter": "B", "text": "Reduce the number of tools available to the agent to simplify choice.", "correct": false}, {"letter": "C", "text": "Add few-shot examples to the system prompt covering all possible order request patterns to improve tool selection.", "correct": false}, {"letter": "D", "text": "Check the tool descriptions to ensure they clearly differentiate each tool’s purpose.", "correct": true}], "correct": "D", "explanation": "Tool descriptions are the primary input the model uses to decide which tool to call. When an agent consistently picks the wrong tool, the first diagnostic step is to verify that tool descriptions clearly separate each tool’s purpose and usage boundaries."}, {"scenario": "Customer Support Agent", "global_n": 47, "situation": "Your agent handles single-issue requests with 94% accuracy (e.g., “I need a refund for order #1234”). But when customers include multiple issues in one message (e.g., “I need a refund for order #1234 and also want to update the shipping address for order #5678”), tool selection accuracy drops to 58%. The agent usually solves only one issue or mixes parameters across requests. What approach most effectively improves reliability for multi-issue requests?", "question": "What approach is most effective?", "options": [{"letter": "A", "text": "Implement a preprocessing layer that uses a separate model call to decompose multi-issue messages into separate requests, handle each independently, and merge results.", "correct": false}, {"letter": "B", "text": "Combine related tools into fewer universal tools.", "correct": false}, {"letter": "C", "text": "Add few-shot examples to the prompt demonstrating correct reasoning and tool sequencing for multi-issue requests.", "correct": true}, {"letter": "D", "text": "Implement response validation that detects incomplete answers and automatically reprompts the agent to resolve missed issues.", "correct": false}], "correct": "C", "explanation": "Few-shot examples that demonstrate correct reasoning and tool sequencing for multi-issue requests are most effective because the agent already performs well on single issues—what it needs is guidance on the pattern for decomposing and routing multiple issues and kee
