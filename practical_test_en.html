ping parameters separated."}, {"scenario": "Customer Support Agent", "global_n": 48, "situation": "Production logs show that for simple requests like “refund for order #1234,” your agent resolves the issue in 3–4 tool calls with 91% success. But for complex requests like “I was billed twice, my discount didn’t apply, and I want to cancel,” the agent averages 12+ tool calls with only 54% success—often investigating issues sequentially and fetching redundant customer data for each. What change most effectively improves handling of complex requests?", "question": "What change is most effective?", "options": [{"letter": "A", "text": "Add explicit verification checkpoints between stages, requiring the agent to record progress after resolving each issue before moving to the next.", "correct": false}, {"letter": "B", "text": "Reduce the number of tools by combining `get_customer`, `lookup_order`, and billing-related tools into a single `investigate_issue` tool.", "correct": false}, {"letter": "C", "text": "Decompose the request into separate issues, then investigate each in parallel using shared customer context before synthesizing a final resolution.", "correct": true}, {"letter": "D", "text": "Add few-shot examples to the system prompt demonstrating ideal tool-call sequences for various multi-faceted billing scenarios.", "correct": false}], "correct": "C", "explanation": "Decomposing into separate issues and investigating in parallel with shared customer context fixes both key problems: it eliminates redundant data retrieval by reusing shared context across issues and reduces total tool-call loops by parallelizing investigation before synthesizing a single resolution."}, {"scenario": "Customer Support Agent", "global_n": 49, "situation": "Your agent achieves 55% first-contact resolution, well below the 80% target. Logs show it escalates simple cases (standard replacements for damaged goods with photo proof) while trying to handle complex situations requiring policy exceptions autonomously. What is the most effective way to improve escalation calibration?", "question": "What is the most effective way to improve escalation calibration?", "options": [{"letter": "A", "text": "Require the agent to self-rate confidence on a 1–10 scale before each response and automatically route to humans when confidence drops below a threshold.", "correct": false}, {"letter": "B", "text": "Deploy a separate classifier model trained on historical tickets to predict which requests need escalation before the main agent starts processing.", "correct": false}, {"letter": "C", "text": "Add explicit escalation criteria to the system prompt with few-shot examples showing when to escalate versus resolve autonomously.", "correct": true}, {"letter": "D", "text": "Implement sentiment analysis to determine customer frustration level and automatically escalate past a negative sentiment threshold.", "correct": false}], "correct": "C", "explanation": "Explicit escalation criteria with few-shot examples directly address the root cause—unclear decision boundaries between simple and complex cases. It’s the most proportional, effective first intervention that teaches the agent when to escalate and when to resolve autonomously without extra infrastructure."}, {"scenario": "Customer Support Agent", "global_n": 50, "situation": "After calling `get_customer` and `lookup_order`, the agent has all available system data but still faces uncertainty. Which situation is the most justified trigger for calling `escalate_to_human`?", "question": "Which situation is most justified for escalation?", "options": [{"letter": "A", "text": "A customer wants to cancel an order shipped yesterday and arriving tomorrow. The agent should escalate because the customer might change their mind after receiving the package.", "correct": false}, {"letter": "B", "text": "A customer claims they didn’t receive an order, but tracking shows it was delivered and signed for at their address three days ago. The agent should escalate because presenting contradictory evidence could harm the customer relationship.", "correct": false}, {"letter": "C", "text": "A customer requests competitor price matching. Your policies allow price adjustments for price drops on your own site within 14 days, but say nothing about competitor prices. The agent should escalate for policy interpretation.", "correct": true}, {"letter": "D", "text": "A customer message contains both a billing question and a product return. The agent should escalate so a human can coordinate both issues in one interaction.", "correct": false}], "correct": "C", "explanation": "This is a genuine policy gap: company rules cover price drops on your own site but do not address competitor price matching. The agent must not invent policy and should escalate for human judgment on how to interpret or extend existing rules."}, {"scenario": "Customer Support Agent", "global_n": 51, "situation": "Production logs show that in 12% of cases your agent skips `get_customer` and calls `lookup_order` directly using only the customer-provided name, sometimes leading to misidentified accounts and incorrect refunds. What change most effectively fixes this reliability problem?", "question": "What change is most effective?", "options": [{"letter": "A", "text": "Add few-shot examples showing that the agent always calls `get_customer` first, even when customers voluntarily provide order details.", "correct": false}, {"letter": "B", "text": "Implement a routing classifier that analyzes each request and enables only a subset of tools appropriate for that request type.", "correct": false}, {"letter": "C", "text": "Add a programmatic precondition that blocks `lookup_order` and `process_refund` until `get_customer` returns a verified customer identifier.", "correct": true}, {"letter": "D", "text": "Strengthen the system prompt stating that customer verification via `get_customer` is mandatory before any order operations.", "correct": false}], "correct": "C", "explanation": "A programmatic precondition provides a deterministic guarantee that required sequencing is followed. It’s the most effective approach because it eliminates the possibility of skipping verification, regardless of LLM behavior."}, {"scenario": "Customer Support Agent", "global_n": 52, "situation": "Production metrics show that when resolving complex billing disputes or multi-order returns, customer satisfaction scores are 15% lower than for simple cases—even when the resolution is technically correct. Root-cause analysis shows the agent provides accurate solutions but inconsistently explains rationale: sometimes omitting relevant policy details, sometimes missing timeline info or next steps. The specific context gaps vary case by case. You want to improve solution quality without adding human oversight. What approach is most effective?", "question": "What approach is most effective?", "options": [{"letter": "A", "text": "Add a self-critique stage where the agent evaluates a draft response for completeness—ensuring it resolves the customer’s issue, includes relevant context, and anticipates follow-up questions.", "correct": true}, {"letter": "B", "text": "Add a confirmation stage where the agent asks “Does this fully resolve your issue?” before closing, allowing customers to request additional information if needed.", "correct": false}, {"letter": "C", "text": "Upgrade the model from Haiku to Sonnet for complex cases, routing based on a defined complexity metric.", "correct": false}, {"letter": "D", "text": "Implement few-shot examples in the system prompt showing complete explanations for five common complex case types, demonstrating how to include policy context, timelines, and next steps.", "correct": false}], "correct": "A", "explanation": "A self-critique stage (the evaluator-optimizer pattern) directly addresses inconsistent explanation completeness by forcing the agent to assess its own draft against concrete criteria—such as policy context, timelines, and next steps—before presenting it. This catches case-specific gaps without human oversight."}, {"scenario": "Customer Support Agent", "global_n": 53, "situation": "Production metrics show your agent averages 4+ API loops per resolution. Analysis reveals Claude often requests `get_customer` and `lookup_order` in separate sequential turns even when both are needed initially. What is the most effective way to reduce the number of loops?", "question": "What is the most effective way to reduce loops?", "options": [{"letter": "A", "text": "Implement speculative execution that automatically calls likely-needed tools in parallel with any requested tool and returns all results regardless of what was requested.", "correct": false}, {"letter": "B", "text": "Increase `max_tokens` to give Claude more room to plan and naturally combine tool requests.", "correct": false}, {"letter": "C", "text": "Create composite tools like `get_customer_with_orders` that bundle common lookup combinations into single calls.", "correct": false}, {"letter": "D", "text": "Instruct Claude in the prompt to bundle tool requests into one turn and return all results together before the next API call.", "correct": true}], "correct": "D", "explanation": "Prompting Claude to bundle related tool requests into a single turn leverages its native ability to request multiple tools at once. It directly fixes the sequential-call pattern with minimal architectural change."}, {"scenario": "Customer Support Agent", "global_n": 54, "situation": "Production logs show a pattern: customers reference specific amounts (e.g., “the 15% discount I mentioned”), but the agent responds with incorrect values. Investigation shows these details were mentioned 20+ turns ago and condensed into vague summaries like “promotional pricing was discussed.” What fix is most effective?", "question": "What fix is most effective?", "options": [{"letter": "A", "text": "Increase the summarization threshold from 70% to 85% so conversations have more room before summarization triggers.", "correct": false}, {"letter": "B", "text": "Store full conversation history in external storage and implement retrieval when the agent detects references like “as I mentioned.”", "correct": false}, {"letter": "C", "text": "Extract transactional facts (amounts, dates, order numbers) into a persistent “case facts” block included in every prompt outside the summarized history.", "correct": true}, {"letter": "D", "text": "Revise the summarization prompt to explicitly preserve all numbers, percentages, dates, and customer-stated expectations verbatim.", "correct": false}], "correct": "C", "explanation": "Summarization inherently loses precise details. Extracting transactional facts into a structured “case facts” block outside the summarized history preserves critical information so it’s reliably available in every prompt regardless of how many turns have been summarized."}, {"scenario": "Customer Support Agent", "global_n": 55, "situation": "Your `get_customer` tool returns all matches when searching by name. Currently, when there are multiple results, Claude picks the customer with the most recent order, but production data shows this selects the wrong account 15% of the time for ambiguous matches. How should you address this?", "question": "How should you address this?", "options": [{"letter": "A", "text": "Implement a confidence scoring system that acts autonomously above 85% confidence and requests clarification below the threshold.", "correct": false}, {"letter": "B", "text": "Instruct Claude to request an additional identifier (email, phone, or order number) when `get_customer` returns multiple matches before taking any customer-specific action.", "correct": true}, {"letter": "C", "text": "Modify `get_customer` to return only a single most-likely match based on a ranking algorithm, eliminating ambiguity.", "correct": false}, {"letter": "D", "text": "Add few-shot examples to the prompt demonstrating correct reasoning and tool sequencing for ambiguous matches.", "correct": false}], "correct": "B", "explanation": "Asking the user for an additional identifier is the most reliable way to resolve ambiguity because the user has definitive knowledge of their identity. One extra conversational turn is a small price to pay to eliminate a 15% error rate caused by choosing the wrong account."}, {"scenario": "Customer Support Agent", "global_n": 56, "situation": "Production logs show a consistent pattern: when customers include the word “account” in their message (e.g., “I want to check my account for an order I made yesterday”), the agent calls `get_customer` first 78% of the time. When customers phrase similar requests without “account” (e.g., “I want to check an order I made yesterday”), it calls `lookup_order` first 93% of the time. Tool descriptions are clear and unambiguous. What is the most likely root cause of this discrepancy?", "question": "What is the most likely root cause?", "options": [{"letter": "A", "text": "The system prompt contains keyword-sensitive instructions that steer behavior based on terms like “account,” creating unintended tool-selection patterns.", "correct": true}, {"letter": "B", "text": "The model’s base training creates associations between “account” terminology and customer-related operations that override tool descriptions.", "correct": false}, {"letter": "C", "text": "The model needs more training data on multi-concept messages and should be fine-tuned on examples containing both account and order terminology.", "correct": false}, {"letter": "D", "text": "Tool descriptions need additional negative examples specifying when NOT to use each tool to prevent this keyword-induced confusion.", "correct": false}], "correct": "A", "explanation": "The systematic keyword-driven pattern (78% vs 93%) strongly indicates explicit routing logic in the system prompt reacting to the word “account” and steering the agent toward customer-related tools. Since tool descriptions are already clear, the discrepancy points to prompt-level instructions creating unintended behavioral steering."}, {"scenario": "Customer Support Agent", "global_n": 57, "situation": "Production logs show the agent often calls `get_customer` when users ask about orders (e.g., “check my order #12345”) instead of calling `lookup_order`. Both tools have minimal descriptions (“Gets customer information” / “Gets order details”) and accept similar-looking identifier formats. What is the most effective first step to improve tool selection reliability?", "question": "What is the most effective first step?", "options": [{"letter": "A", "text": "Implement a routing layer that analyzes user input before each turn and preselects the correct tool based on detected keywords and ID patterns.", "correct": false}, {"letter": "B", "text": "Combine both tools into a single `lookup_entity` that accepts any identifier and internally decides which backend to query.", "correct": false}, {"letter": "C", "text": "Add few-shot examples to the system prompt demonstrating correct tool selection patterns, with 5–8 examples routing order-related queries to `lookup_order`.", "correct": false}, {"letter": "D", "text": "Expand each tool’s description to include input formats, example queries, edge cases, and boundaries explaining when to use it versus similar tools.", "correct": true}], "correct": "D", "explanation": "Expanding tool descriptions with input formats, example queries, edge cases, and clear boundaries directly fixes the root cause—minimal descriptions that don’t give the LLM enough information to distinguish similar tools. It’s a low-effort, high-impact first step that improves the primary mechanism the LLM uses for tool selection."}, {"scenario": "Customer Support Agent", "global_n": 58, "situation": "You are implementing the agent loop for your support agent. After each Claude API call, you must decide whether to continue the loop (run requested tools and call Claude again) or stop (present the final answer to the customer). What determines this decision?", "question": "What determines this decision?", "options": [{"letter": "A", "text": "Check the `stop_reason` field in Claude’s response—continue if it is `tool_use` and stop if it is `end_turn`.", "correct": true}, {"letter": "B", "text": "Parse Claude’s text for phrases like “I’m done” or “Can I help with anything else?”—natural language signals indicate task completion.", "correct": false}, {"letter": "C", "text": "Set a maximum iteration count (e.g., 10 calls) and stop when reached, regardless of whether Claude indicates more work is needed.", "correct": false}, {"letter": "D", "text": "Check whether the response contains assistant text content—if Claude generated explanatory text, the loop should terminate.", "correct": false}], "correct": "A", "explanation": "`stop_reason` is Claude’s explicit structured signal for loop control: `tool_use` indicates Claude wants to run a tool and receive results back, while `end_turn` indicates Claude has completed its response and the loop should end."}, {"scenario": "Customer Support Agent", "global_n": 59, "situation": "Production logs show the agent misinterprets outputs from your MCP tools: Unix timestamps from `get_customer`, ISO 8601 dates from `lookup_order`, and numeric status codes (1=pending, 2=shipped). Some tools are third-party MCP servers you cannot modify. Which approach to data format normalization is most maintainable?", "question": "Which approach is most maintainable?", "options": [{"letter": "A", "text": "Use a PostToolUse hook to intercept tool outputs and apply formatting transformations before the agent processes them.", "correct": true}, {"letter": "B", "text": "Modify tools you control to return human-readable formats and create wrappers for third-party tools.", "correct": false}, {"letter": "C", "text": "Create a `normalize_data` tool that the agent calls after every data retrieval to transform values.", "correct": false}, {"letter": "D", "text": "Add detailed format documentation to the system prompt explaining each tool’s data conventions.", "correct": false}], "correct": "A", "explanation": "A PostToolUse hook provides a centralized, deterministic point to intercept and normalize all tool outputs—including third-party MCP server data—before the agent processes them. It’s more maintainable because transformations live in code and apply uniformly, rather than relying on LLM interpretation."}, {"scenario": "Customer Support Agent", "global_n": 60, "situation": "Production logs show the agent sometimes chooses `get_customer` when `lookup_order` would be more appropriate, especially for ambiguous queries like “I need help with my recent purchase.” You decide to add few-shot examples to the system prompt to improve tool selection. Which approach most effectively addresses the problem?", "question": "Which approach is most effective?", "options": [{"letter": "A", "text": "Add explicit “use when” and “don’t use when” guidance in each tool description covering ambiguous cases.", "correct": false}, {"letter": "B", "text": "Add examples grouped by tool—all `get_customer` scenarios together, then all `lookup_order` scenarios.", "correct": false}, {"letter": "C", "text": "Add 4–6 examples targeted at ambiguous scenarios, each with rationale for why one tool was chosen over plausible alternatives.", "correct": true}, {"letter": "D", "text": "Add 10–15 examples of clear, unambiguous requests demonstrating correct tool choice for typical scenarios for each tool.", "correct": false}], "correct": "C", "explanation": "Targeting few-shot examples at the specific ambiguous scenarios where errors occur, with explicit rationale for why one tool is preferable to alternatives, teaches the model the comparative decision process needed for edge cases. This is more effective than generic examples or declarative rules."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 61, "situation": "Your `remove_team_member` tool uses a `dry_run: boolean` parameter for previewing impacts before execution. Production monitoring shows the agent bypasses the preview step by calling with `dry_run=false` directly. You need to ensure every removal is preceded by a preview that the user explicitly confirms.", "question": "What is the most reliable approach?", "options": [{"letter": "A", "text": "Add server-side validation that permits `dry_run=false` only when a `dry_run=true` call with identical parameters occurred within the past 60 seconds.", "correct": false}, {"letter": "B", "text": "Annotate the tool as requiring confirmation and configure the orchestration layer to prompt the user for approval before forwarding any calls to annotated tools.", "correct": false}, {"letter": "C", "text": "Add detailed instructions and few-shot examples to the tool description requiring the agent to always call with `dry_run=true` first and wait for user confirmation before calling again.", "correct": false}, {"letter": "D", "text": "Replace with two tools: `preview_remove_member` returns impact details and a single-use confirmation token; `execute_remove_member` requires that token, binding execution to the preview.", "correct": true}], "correct": "D", "explanation": "The two-tool token-binding approach makes it architecturally impossible to execute without a prior preview—the execute tool literally requires a token that only the preview tool can generate. This is the only approach that enforces the constraint at the code level rather than relying on LLM compliance with instructions (C), timing heuristics (A), or orchestration infrastructure (B)."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 62, "situation": "Production monitoring shows your `search_catalog` tool fails 12% of the time: 8% are network timeouts that succeed when retried, and 4% are query syntax errors that never succeed regardless of retries. Currently both error types are returned identically, causing wasted retries.", "question": "How should you modify the tool's error handling?", "options": [{"letter": "A", "text": "Add few-shot examples to your system prompt demonstrating how to distinguish network errors from syntax errors.", "correct": false}, {"letter": "B", "text": "Apply exponential backoff retry logic to all errors uniformly.", "correct": false}, {"letter": "C", "text": "Implement automatic retry with backoff for network timeouts inside the tool; return syntax errors immediately with parameter validation details.", "correct": true}, {"letter": "D", "text": "Return all errors with a `retryable` boolean flag and error type details.", "correct": false}], "correct": "C", "explanation": "Handling retries at the tool level for transient errors is the correct abstraction boundary—the tool has definitive knowledge of the error type and can implement deterministic retry logic without relying on the agent to interpret a flag (D) or follow prompt-level instructions (A). Uniform backoff (B) wastes time on syntax errors that will never succeed."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 63, "situation": "Over several turns discussing investment strategy, a user stated \"I have a very low risk tolerance\" and later \"I want to maximize my returns.\" They now ask: \"What should I invest in?\"", "question": "Which approach best ensures the recommendation aligns with the user's actual priority?", "options": [{"letter": "A", "text": "Surface the contradiction and ask the user to clarify which matters more.", "correct": true}, {"letter": "B", "text": "Provide separate recommendations for both scenarios.", "correct": false}, {"letter": "C", "text": "Proceed with the most recently stated preference.", "correct": false}, {"letter": "D", "text": "Recommend a balanced portfolio without addressing the conflict.", "correct": false}], "correct": "A", "explanation": "When user preferences directly contradict each other, surfacing the conflict and asking for clarification is the only way to guarantee the recommendation aligns with the user's true intent. Any other approach involves making an assumption that may be wrong—maximizing returns and low risk tolerance are fundamentally incompatible goals that require a human decision."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 64, "situation": "Users refine playlist preferences over multiple conversation turns. Two messages after a user said \"I love jazz,\" Claude asks \"What genres do you enjoy?\"", "question": "What is the most likely cause?", "options": [{"letter": "A", "text": "Claude requires a vector database connection to maintain conversation memory.", "correct": false}, {"letter": "B", "text": "The model's context window has been exceeded.", "correct": false}, {"letter": "C", "text": "The Claude API requires a `session_id` parameter.", "correct": false}, {"letter": "D", "text": "Your application isn't including prior messages in the `messages` array.", "correct": true}], "correct": "D", "explanation": "Claude has no server-side memory—every API call is stateless. Without including the full conversation history in the `messages` array of each request, Claude has no knowledge of prior turns. Vector databases (A) and `session_id` (C) are not part of Claude's architecture; context window overflow (B) is impossible for two-message exchanges."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 65, "situation": "After a 40-minute cooking session, the conversation reaches 78,000 tokens. History includes allergies, recipe scaling, clarified cooking terms, and general discussion. You must reduce tokens while preserving important information.", "question": "What approach best balances preservation with token reduction?", "options": [{"letter": "A", "text": "Summarize the entire conversation history.", "correct": false}, {"letter": "B", "text": "Keep only the most recent 20,000 tokens.", "correct": false}, {"letter": "C", "text": "Extract critical structured data (allergies, quantities, preferences), summarize general discussion, and keep recent exchanges verbatim.", "correct": true}, {"letter": "D", "text": "Store the full conversation externally and retrieve relevant parts via semantic search.", "correct": false}], "correct": "C", "explanation": "The hybrid approach preserves the highest-value information at the lowest cost. Critical facts like allergies and recipe quantities are extracted into a compact structured block (preventing the precision loss that occurs during summarization), general discussion is summarized, and recent exchanges are kept verbatim for conversational coherence. Options A and B risk losing critical dietary information; D is architectural overkill for a single cooking session."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 66, "situation": "Users report that during extended conversations the assistant loses track of earlier topics and preferences. Your current implementation keeps only the last 25 message pairs.", "question": "What is the most effective solution?", "options": [{"letter": "A", "text": "Hybrid approach: summarize older messages while keeping recent ones verbatim.", "correct": true}, {"letter": "B", "text": "Vector similarity search over the full conversation history.", "correct": false}, {"letter": "C", "text": "Increase the window to 50 message pairs.", "correct": false}, {"letter": "D", "text": "Summarize dropped messages every turn and prepend the running summary.", "correct": false}], "correct": "A", "explanation": "The hybrid approach addresses both dimensions of the problem: retaining exact recent context (critical for conversational coherence) while maintaining a compressed representation of earlier preferences (preventing total loss when pairs are dropped). Increasing the window (C) simply delays the same problem. Vector search (B) may miss important context that isn't semantically similar to the current query. Full per-turn summarization (D) adds overhead and accumulates summarization errors."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 67, "situation": "Users report that latency increases and costs rise when conversations exceed 50 turns.", "question": "What is the primary cause?", "options": [{"letter": "A", "text": "The entire conversation history is included with each API request.", "correct": true}, {"letter": "B", "text": "The model generates progressively longer responses.", "correct": false}, {"letter": "C", "text": "Database operations slow down as history grows.", "correct": false}, {"letter": "D", "text": "The model builds an internal user profile requiring more processing.", "correct": false}], "correct": "A", "explanation": "Claude's API is fully stateless—every request must include the complete conversation history in the `messages` array. As conversations grow, each request carries more tokens, which directly increases both processing latency and cost. The model does not maintain any internal state between calls (D is false), and response length is not inherently tied to conversation length (B)."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 68, "situation": "After three months of weekly sessions, conversation history grows to 85,000 tokens. When a user asks \"What did we conclude about the theme of isolation?\", the assistant gives generic answers instead of referencing previous discussions.", "question": "What is the most effective approach?", "options": [{"letter": "A", "text": "Rolling window truncation.", "correct": false}, {"letter": "B", "text": "Progressive summarization capturing key conclusions.", "correct": false}, {"letter": "C", "text": "Semantic embeddings with retrieval of relevant exchanges.", "correct": true}, {"letter": "D", "text": "Add structured XML tags marking discussion conclusions.", "correct": false}], "correct": "C", "explanation": "Semantic search over conversation history is the only approach that scales to three months of discussion while being able to surface specific relevant exchanges on demand. Rolling window (A) would discard most of the history. Progressive summarization (B) compresses discussions into abstractions that lose the specific conclusions users are asking about. XML tags (D) require restructuring all past content and don't solve the retrieval problem at this scale."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 69, "situation": "During QA testing, Claude follows system prompt guidelines for the first 10–15 turns, but later responses deviate. The conversation is still within token limits.", "question": "What is the best solution?", "options": [{"letter": "A", "text": "Move behavioral guidelines into the first user message.", "correct": false}, {"letter": "B", "text": "Start a new conversation after 20 turns.", "correct": false}, {"letter": "C", "text": "Insert user-role messages reinforcing guidelines at conversation breakpoints.", "correct": true}, {"letter": "D", "text": "Use post-response validation to regenerate non-compliant responses.", "correct": false}], "correct": "C", "explanation": "Periodic injection of behavioral reminders directly combats instruction drift by re-establishing constraints at regular intervals as conversation history accumulates. Moving guidelines to the first user message (A) reduces their authority. Starting a new conversation (B) destroys context. Post-response validation (D) is corrective rather than preventive and adds significant latency."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 70, "situation": "Your AI tutor has a 2,800-token system prompt defining teaching methodology and adaptation rules. After 12 turns, the assistant starts ignoring proficiency levels.", "question": "What is the most effective fix?", "options": [{"letter": "A", "text": "Inject reminders every 4–5 turns.", "correct": false}, {"letter": "B", "text": "Replace verbose rules with few-shot examples demonstrating proficiency-level adaptation.", "correct": true}, {"letter": "C", "text": "Place critical rules at the end of the system prompt.", "correct": false}, {"letter": "D", "text": "Evaluate responses and regenerate if difficulty level mismatches.", "correct": false}], "correct": "B", "explanation": "A 2,800-token system prompt with declarative rules is vulnerable to drift because abstract rules require the model to reason about them on every turn. Replacing verbose rules with concrete few-shot examples that demonstrate correct proficiency-level adaptation gives the model clear behavioral patterns to match—this is more reliably followed across many turns than abstract instructions. Reminder injection (A) helps but addresses symptoms; end-placement (C) helps initially but not with turn-level drift; regeneration (D) is expensive and corrective."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 71, "situation": "Your assistant must maintain an enthusiastic tone, explain its reasoning, and ask clarifying questions. Where should these behavioral guidelines be defined?", "question": "Where should these behavioral guidelines be defined?", "options": [{"letter": "A", "text": "Prepended to each user message.", "correct": false}, {"letter": "B", "text": "In the system prompt.", "correct": true}, {"letter": "C", "text": "In the first assistant message.", "correct": false}, {"letter": "D", "text": "In environment variables.", "correct": false}], "correct": "B", "explanation": "The system prompt is specifically designed for persistent behavioral constraints and guidelines that apply throughout the entire conversation. Prepending to each user message (A) is redundant overhead. The first assistant message (C) is unreliable because the model can deviate from its own prior statements. Environment variables (D) have no effect on model behavior."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 72, "situation": "Users report repetitive response openings like \"Certainly!\" and \"I'd be happy to help!\"", "question": "What is the most effective approach?", "options": [{"letter": "A", "text": "Append a partial assistant message with a direct response opening.", "correct": true}, {"letter": "B", "text": "Lower the temperature setting.", "correct": false}, {"letter": "C", "text": "Post-process responses to remove greetings.", "correct": false}, {"letter": "D", "text": "Add system prompt instructions to avoid those phrases.", "correct": false}], "correct": "A", "explanation": "Prefilling the assistant's response with the beginning of a direct answer prevents greeting patterns at the generation level—the model continues from the prefill rather than generating new opening phrases. System prompt instructions (D) can help but are less reliable since the model may still produce variants. Post-processing (C) is a fragile workaround. Temperature (B) controls randomness, not specific phrase patterns."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 73, "situation": "A webhook notifies your system that a user's package has shipped while the user is actively chatting. You want the assistant to incorporate this naturally into the next response.", "question": "What is the best approach?", "options": [{"letter": "A", "text": "Add shipping status to the system prompt.", "correct": false}, {"letter": "B", "text": "Send an immediate synthetic user message.", "correct": false}, {"letter": "C", "text": "Force the assistant to call a status tool on each turn.", "correct": false}, {"letter": "D", "text": "Append the status update as a prefix to the next user message.", "correct": true}], "correct": "D", "explanation": "Prefixing the status update to the next user message injects real-time context at a natural conversation boundary without disrupting the flow. Modifying the system prompt (A) requires rebuilding the session or is architecturally cumbersome. A synthetic user message (B) can break the natural dialogue flow and confuse attribution. Forcing a tool call each turn (C) is wasteful when events are rare."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 74, "situation": "Users frequently send requests like \"Book a venue for the party.\" The assistant asks 4+ clarifying questions, causing 35% abandonment.", "question": "What approach best improves the trade-off?", "options": [{"letter": "A", "text": "Proceed with hidden defaults.", "correct": false}, {"letter": "B", "text": "Ask all clarifying questions in one compound message.", "correct": false}, {"letter": "C", "text": "State assumptions explicitly and proceed while inviting corrections.", "correct": true}, {"letter": "D", "text": "Use a structured intake form.", "correct": false}], "correct": "C", "explanation": "Stating assumptions explicitly and proceeding gives the user an immediate, useful response while preserving their ability to correct wrong assumptions. Hidden defaults (A) leave the user unaware of what was assumed. A compound question list (B) still demands upfront effort from the user. A structured form (D) adds more friction, not less—contradicting the goal of reducing abandonment."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 75, "situation": "Your assistant uses a contractor-persona system prompt. Early turns follow the rules, but by turn 7 the assistant gives generic advice. Conversation length is only 2,500 tokens.", "question": "What is the most likely cause?", "options": [{"letter": "A", "text": "System prompts only establish initial behavior.", "correct": false}, {"letter": "B", "text": "Model attention weakens as turns accumulate.", "correct": false}, {"letter": "C", "text": "Accumulated assistant responses dilute system prompt influence.", "correct": true}, {"letter": "D", "text": "The system prompt is only sent once.", "correct": false}], "correct": "C", "explanation": "As assistant responses accumulate in the conversation history, the proportion of text reflecting the system prompt's behavioral constraints decreases relative to the growing body of assistant-generated content. The model increasingly pattern-matches to its own prior outputs rather than the system prompt, compounding drift even at short token lengths. The system prompt is included in every API call (D is false as a standalone explanation), and model attention degradation (B) doesn't operate at 2,500 tokens."}, {"scenario": "Conversational AI Architecture Patterns", "global_n": 76, "situation": "Users ask vague requests like \"Can you help with the report?\" The assistant responds by asking multiple questions (which report? what help? deadline?), causing 40% abandonment.", "question": "What is the best solution?", "options": [{"letter": "A", "text": "Make reasonable assumptions, state them explicitly, and offer to adjust.", "correct": true}, {"letter": "B", "text": "Classify ambiguity with a smaller model before responding.", "correct": false}, {"letter": "C", "text": "Use predefined interpretations without stating assumptions.", "correct": false}, {"letter": "D", "text": "Limit the assistant to one clarifying question per turn.", "correct": false}], "correct": "A", "explanation": "Proceeding with reasonable stated assumptions eliminates the back-and-forth entirely while keeping the user informed and in control. Predefined silent interpretations (C) leave users confused when the response doesn't match their intent. A single-question limit (D) still requires turns of back-and-forth. A smaller classification model (B) adds latency and infrastructure complexity without solving the core UX problem."}, {"scenario": "Developer Productivity Tools", "global_n": 77, "situation": "An engineer asks the agent to find every place a function `calculate_tax` is defined and called across a 2,000-file repository. The agent has Read, Write, Edit, Bash, Grep, and Glob available.", "question": "Which approach is most effective?", "options": [{"letter": "A", "text": "Read every file in the repository sequentially and scan the contents for the function name.", "correct": false}, {"letter": "B", "text": "Use Grep to search file contents for `calculate_tax`, narrowing file types with Glob if needed.", "correct": true}, {"letter": "C", "text": "Use Bash to run `find . | xargs cat` and look for the function in the combined output.", "correct": false}, {"letter": "D", "text": "Ask the user to paste the relevant files into the conversation.", "correct": false}], "correct": "B", "explanation": "Grep is purpose-built for content search across many files and returns just the matching lines with locations, keeping the context window small. Reading every file (A) wastes context and is slow; piping everything through Bash `cat` (C) dumps unstructured output and loses file/line attribution; asking the user to paste files (D) defeats the point of an automated tool with repository access."}, {"scenario": "Developer Productivity Tools", "global_n": 78, "situation": "To map an unfamiliar codebase, the agent runs a broad discovery pass that lists hundreds of modules with descriptions. The raw output is enormous and starts crowding out the main conversation before the engineer's actual task begins.", "question": "What is the best way to handle the discovery output?", "options": [{"letter": "A", "text": "Delegate discovery to an Explore subagent (or a `context: fork` skill) that returns a concise summary to the main session.", "correct": true}, {"letter": "B", "text": "Increase `max_tokens` so the full discovery output fits.", "correct": false}, {"letter": "C", "text": "Truncate the discovery output to the first 50 modules and proceed.", "correct": false}, {"letter": "D", "text": "Restart the session after discovery so the context is fresh.", "correct": false}], "correct": "A", "explanation": "A subagent isolates the verbose discovery in a separate context and returns only a distilled summary, preserving the main context window for the real work. `max_tokens` (B) governs output length, not context pressure. Truncating (C) silently drops modules that may matter. Restarting (D) throws away the discovery you just paid for."}, {"scenario": "Developer Productivity Tools", "global_n": 79, "situation": "Generated boilerplate keeps diverging from the team's conventions (import ordering, error-handling style, test layout). Different engineers get different output for the same request.", "question": "What is the most durable fix?", "options": [{"letter": "A", "text": "Add the conventions to a CLAUDE.md so they load automatically for every request in the project.", "correct": true}, {"letter": "B", "text": "Ask each engineer to restate the conventions in their prompt each time.", "correct": false}, {"letter": "C", "text": "Lower the temperature so output is more consistent.", "correct": false}, {"letter": "D", "text": "Run a formatter after generation to reshape the code.", "correct": false}], "correct": "A", "explanation": "CLAUDE.md is the project's persistent memory—conventions placed there apply to every session and every engineer automatically, fixing the root cause. Restating conventions per prompt (B) is error-prone and unscalable. Temperature (C) affects variability, not adherence to unstated rules. A formatter (D) catches formatting but not error-handling style or structural conventions."}, {"scenario": "Developer Productivity Tools", "global_n": 80, "situation": "An engineer requests a refactor that will touch ~15 files and involves a non-trivial design decision (how to split a module). They want to review the approach before any code changes.", "question": "Which Claude Code capability fits best?", "options": [{"letter": "A", "text": "Use planning mode to produce and confirm an approach before making edits.", "correct": true}, {"letter": "B", "text": "Start editing immediately and let the engineer review the diff afterward.", "correct": false}, {"letter": "C", "text": "Use a single Bash command to apply all changes at once.", "correct": false}, {"letter": "D", "text": "Generate the whole refactor in one message without tool calls.", "correct": false}], "correct": "A", "explanation": "Planning mode separates design from execution, letting the engineer approve the approach for an ambiguous, multi-file change before any file is touched—exactly when up-front alignment pays off. Editing first (B) risks large rework if the approach is wrong. A bulk Bash apply (C) skips review entirely. One-shot generation (D) gives no checkpoint and no tool-verified edits."}, {"scenario": "Developer Productivity Tools", "global_n": 81, "situation": "The agent tries to Edit a file but the operation is rejected because the file changed since it was last read in this session.", "question": "What is the correct response?", "options": [{"letter": "A", "text": "Re-read the file to get current contents, then reapply the edit against the new state.", "correct": true}, {"letter": "B", "text": "Force the edit by switching to a Bash `sed` command.", "correct": false}, {"letter": "C", "text": "Retry the identical Edit until it succeeds.", "correct": false}, {"letter": "D", "text": "Overwrite the whole file with Write using the agent's last known version.", "correct": false}], "correct": "A", "explanation": "The staleness guard fires because the on-disk content no longer matches what the agent last saw; re-reading restores an accurate basis for the edit. Forcing it through Bash `sed` (B) bypasses the safety check and can corrupt concurrent changes. Retrying the identical Edit (C) keeps failing for the same reason. Overwriting with a stale version via Write (D) discards whatever changed the file."}, {"scenario": "Developer Productivity Tools", "global_n": 82, "situation": "The team wants the agent to look up and update tickets in an internal issue tracker that exposes a REST API. Engineers should not paste ticket data by hand, and API credentials must not be embedded in prompts.", "question": "What is the best integration approach?", "options": [{"letter": "A", "text": "Expose the tracker through an MCP server so the agent gets structured tools with credentials handled outside the conversation.", "correct": true}, {"letter": "B", "text": "Have engineers copy ticket JSON into the chat whenever it's needed.", "correct": false}, {"letter": "C", "text": "Put the API key in CLAUDE.md so the agent can `curl` the API via Bash.", "correct": false}, {"letter": "D", "text": "Hardcode ticket contents into a skill file.", "correct": false}], "correct": "A", "explanation": "An MCP server is the standard way to give an agent typed tools backed by a backend service, with authentication managed by the server rather than the prompt. Manual pasting (B) is unscalable and goes stale. Putting the key in CLAUDE.md (C) leaks a secret into a committed file. Hardcoding tickets in a skill (D) can't reflect live data."}, {"scenario": "Developer Productivity Tools", "global_n": 83, "situation": "Every release, an engineer walks the agent through the same six steps (bump version, update changelog, run tests, tag, build notes, open PR). They want to invoke it as one repeatable action.", "question": "What should they create?", "options": [{"letter": "A", "text": "A custom slash command (or skill) in `.claude/` that encodes the six-step workflow.", "correct": true}, {"letter": "B", "text": "A longer CLAUDE.md describing the steps in prose.", "correct": false}, {"letter": "C", "text": "A saved chat transcript they re-read each release.", "correct": false}, {"letter": "D", "text": "A Bash script that bypasses the agent entirely.", "correct": false}], "correct": "A", "explanation": "A custom command/skill captures a repeatable, parameterizable workflow that the engineer invokes by name—purpose-built for exactly this. Describing it in CLAUDE.md (B) provides background context but isn't an invokable action. Re-reading a transcript (C) is manual and brittle. A pure Bash script (D) loses the agent's judgment for steps like changelog and PR text."}, {"scenario": "Developer Productivity Tools", "global_n": 84, "situation": "The team wants a set of strict API-design rules to apply only when the agent works on files under `src/api/`, without polluting every other file's context.", "question": "Which mechanism fits?", "options": [{"letter": "A", "text": "Add a rule file in `.claude/rules/` with a `paths` glob scoping it to `src/api/**`.", "correct": true}, {"letter": "B", "text": "Put the rules in the top-level CLAUDE.md so they always load.", "correct": false}, {"letter": "C", "text": "Paste the rules into every prompt that touches the API.", "correct": false}, {"letter": "D", "text": "Create a separate repository for API code.", "correct": false}], "correct": "A", "explanation": "Path-scoped rule files load conditionally based on which files are in play, so the API rules apply under `src/api/` and nowhere else—keeping other contexts clean. Top-level CLAUDE.md (B) loads everywhere, the opposite of what's wanted. Per-prompt pasting (C) is manual and inconsistent. Splitting the repo (D) is a heavy structural change to solve a context-scoping problem."}, {"scenario": "Structured Data Extraction", "global_n": 85, "situation": "A pipeline extracts fields from invoices, and downstream code needs reliably parseable, well-typed output. Free-text responses occasionally break the parser.", "question": "Which approach gives the most reliable structured output?", "options": [{"letter": "A", "text": "Define the fields as a JSON schema and have the model return them via `tool_use`.", "correct": true}, {"letter": "B", "text": "Ask the model to \"respond in JSON\" in the system prompt and parse the text.", "correct": false}, {"letter": "C", "text": "Parse the model's prose answer with regular expressions.", "correct": false}, {"letter": "D", "text": "Lower `max_tokens` so the model stays terse.", "correct": false}], "correct": "A", "explanation": "Driving extraction through a `tool_use` JSON schema constrains the output's shape and types, so downstream parsing is dependable. A prose \"respond in JSON\" instruction (B) is not enforced and drifts. Regex over prose (C) is brittle and breaks on any phrasing change. `max_tokens` (D) controls length, not structure."}, {"scenario": "Structured Data Extraction", "global_n": 86, "situation": "Some invoices have no purchase-order number. The current schema marks `po_number` as required, so the model fabricates plausible-looking values to satisfy it.", "question": "What is the correct schema design?", "options": [{"letter": "A", "text": "Make `po_number` optional/nullable so the model can return null when it's absent.", "correct": true}, {"letter": "B", "text": "Keep it required and accept the occasional invented value.", "correct": false}, {"letter": "C", "text": "Remove `po_number` from the schema entirely.", "correct": false}, {"letter": "D", "text": "Add an instruction saying \"never guess\" while keeping the field required.", "correct": false}], "correct": "A", "explanation": "Marking the field nullable/optional gives the model a correct way to represent \"not present,\" removing the pressure to fabricate. Keeping it required (B) guarantees hallucinated values. Removing the field (C) discards data when it does exist. A \"never guess\" instruction while the field is still required (D) conflicts with the schema and is unreliable—the structure should make the right answer expressible."}, {"scenario": "Structured Data Extraction", "global_n": 87, "situation": "A `document_type` field usually falls into a known set (invoice, receipt, statement), but occasionally a document matches none of them.", "question": "How should the schema handle this best?", "options": [{"letter": "A", "text": "Use an enum of known types plus an \"other\" value paired with a free-text detail field.", "correct": true}, {"letter": "B", "text": "Use a free-text string with no constraints.", "correct": false}, {"letter": "C", "text": "Use an enum of only the three known types and force a choice.", "correct": false}, {"letter": "D", "text": "Add a new enum value every time an unexpected type appears.", "correct": false}], "correct": "A", "explanation": "An enum captures the common cases for clean downstream handling, while \"other\" + a detail field gives a correct, inspectable home for the long tail. A pure free-text string (B) loses the consistency an enum provides. A closed three-value enum (C) forces miscategorization of genuine outliers. Continuously expanding the enum (D) is reactive and unmaintainable."}, {"scenario": "Structured Data Extraction", "global_n": 88, "situation": "Extracted output is schema-valid, but line-item amounts sometimes don't sum to the stated invoice total—an error the JSON schema cannot catch.", "question": "What is the most effective safeguard?", "options": [{"letter": "A", "text": "Add semantic validation (e.g., Pydantic checks) and feed failures back to the model in a retry loop.", "correct": true}, {"letter": "B", "text": "Tighten the JSON schema with more field types.", "correct": false}, {"letter": "C", "text": "Lower the temperature to reduce arithmetic mistakes.", "correct": false}, {"letter": "D", "text": "Accept the output since it is schema-valid.", "correct": false}], "correct": "A", "explanation": "Schema validation checks shape and types, not cross-field business rules; a semantic validator catches the sum mismatch, and a retry-with-feedback loop lets the model correct itself. More field types (B) still can't express \"items must sum to total.\" Temperature (C) doesn't guarantee arithmetic consistency. Accepting schema-valid-but-wrong data (D) ships the error."}, {"scenario": "Structured Data Extraction", "global_n": 89, "situation": "You must extract fields from 50,000 archived documents. The job is a one-time backfill with no latency requirement, and cost matters.", "question": "Which mechanism fits best?", "options": [{"letter": "A", "text": "Submit the work through the Message Batches API.", "correct": true}, {"letter": "B", "text": "Send 50,000 individual synchronous requests as fast as possible.", "correct": false}, {"letter": "C", "text": "Concatenate all documents into one request.", "correct": false}, {"letter": "D", "text": "Process them interactively, one at a time, by hand.", "correct": false}], "correct": "A", "explanation": "The Message Batches API is built for large, non-latency-sensitive volume and runs at roughly half the cost—ideal for a one-time backfill. Firing 50,000 synchronous requests (B) is costlier and pressures rate limits. Concatenating everything (C) blows past the context window and entangles documents. Manual processing (D) doesn't scale."}, {"scenario": "Structured Data Extraction", "global_n": 90, "situation": "Downstream code requires that the model's tool input conform *exactly* to the schema—no missing required keys, no extra properties—every time.", "question": "Which option provides the strongest guarantee?", "options": [{"letter": "A", "text": "Enable strict mode on the tool so inputs are validated against the schema at generation time.", "correct": true}, {"letter": "B", "text": "Add \"follow the schema exactly\" to the system prompt.", "correct": false}, {"letter": "C", "text": "Validate after the fact and discard non-conforming results.", "correct": false}, {"letter": "D", "text": "Provide a few-shot example of a correct payload.", "correct": false}], "correct": "A", "explanation": "Strict tool use enforces the schema as the model generates the tool input, guaranteeing conformant payloads. A prompt instruction (B) is advisory, not guaranteed. Post-hoc discard (C) wastes calls and still needs a fallback. A few-shot example (D) nudges format but provides no guarantee."}, {"scenario": "Structured Data Extraction", "global_n": 91, "situation": "A scanned contract is too degraded to determine the effective date with confidence, yet the schema lists `effective_date` as required.", "question": "What is the most responsible behavior?", "options": [{"letter": "A", "text": "Return null (or a flag) for the field with low confidence so it can be routed for human review.", "correct": true}, {"letter": "B", "text": "Output the most plausible date to satisfy the required field.", "correct": false}, {"letter": "C", "text": "Skip the document silently.", "correct": false}, {"letter": "D", "text": "Halt the entire batch until a human intervenes.", "correct": false}], "correct": "A", "explanation": "Surfacing \"unknown\" with low confidence lets a human resolve the genuinely ambiguous case without corrupting the dataset (which is also why the field should be nullable). Emitting a plausible guess (B) injects silent errors. Skipping silently (C) loses the record with no trace. Halting the whole batch (D) blocks thousands of good extractions for one bad scan."}, {"scenario": "Structured Data Extraction", "global_n": 92, "situation": "Before trusting the pipeline, you need to know how accurate extraction is per field and set confidence thresholds for auto-accept vs. human review.", "question": "Which approach gives a trustworthy measure?", "options": [{"letter": "A", "text": "Score per-field confidence and calibrate it against a labeled set, sampling documents in a stratified way across types.", "correct": true}, {"letter": "B", "text": "Use one overall confidence score for the whole document.", "correct": false}, {"letter": "C", "text": "Trust the model's self-reported confidence without checking it.", "correct": false}, {"letter": "D", "text": "Spot-check a handful of easy documents.", "correct": false}], "correct": "A", "explanation": "Field-level scoring calibrated on labeled data shows where the pipeline is reliable, and stratified sampling ensures every document type is represented—so thresholds reflect real accuracy. A single document-level score (B) hides which fields fail. Uncalibrated self-reported confidence (C) may not match reality. Spot-checking easy cases (D) yields a biased, optimistic estimate."}, {"scenario": "Agentic AI Tools", "global_n": 93, "situation": "An agent must be able to issue refunds. Refunds are irreversible and must be gated by a confirmation/permission step before they execute.", "question": "How should this capability be exposed?", "options": [{"letter": "A", "text": "As a dedicated `process_refund` tool the harness can gate, validate, and require confirmation for.", "correct": true}, {"letter": "B", "text": "As a general `bash` capability the model composes (e.g., a `curl` to the refund endpoint).", "correct": false}, {"letter": "C", "text": "By instructing the model in the system prompt to always ask before refunding.", "correct": false}, {"letter": "D", "text": "By trusting the model to refund only when appropriate.", "correct": false}], "correct": "A", "explanation": "A dedicated tool gives the harness a typed, interceptable hook where it can enforce confirmation and permissions before a destructive, irreversible action—control the prompt alone cannot guarantee. A generic `bash` capability (B) is an opaque command string the harness can't reliably gate. A system-prompt instruction (C) and pure trust (D) are not enforcement; the model can still act without the gate."}, {"scenario": "Agentic AI Tools", "global_n": 94, "situation": "An agent frequently calls `get_customer` when it should call `lookup_order`. The two tools have terse, similar descriptions.", "question": "What should you try first?", "options": [{"letter": "A", "text": "Rewrite the tool descriptions so each clearly states when to use it and how it differs from the other.", "correct": true}, {"letter": "B", "text": "Add a routing classifier model in front of the agent.", "correct": false}, {"letter": "C", "text": "Remove one of the tools.", "correct": false}, {"letter": "D", "text": "Force `tool_choice` to `lookup_order` for all requests.", "correct": false}], "correct": "A", "explanation": "The model selects tools largely from their descriptions, so disambiguating the descriptions targets the root cause at the lowest cost. A separate classifier (B) adds latency and infrastructure for a problem solvable in text. Removing a tool (C) loses needed capability. Forcing `lookup_order` everywhere (D) breaks the legitimate cases that need `get_customer`."}, {"scenario": "Agentic AI Tools", "global_n": 95, "situation": "You are writing the loop that decides when an agent's turn is complete after tool calls.", "question": "What is the correct termination signal?", "options": [{"letter": "A", "text": "Continue while `stop_reason` is `tool_use`, and stop when it is `end_turn`.", "correct": true}, {"letter": "B", "text": "Stop after a fixed number of iterations regardless of state.", "correct": false}, {"letter": "C", "text": "Parse the assistant's text for phrases like \"I'm done.\"", "correct": false}, {"letter": "D", "text": "Stop as soon as any tool returns a result.", "correct": false}], "correct": "A", "explanation": "`stop_reason` is the API's explicit, reliable signal: `tool_use` means run the tool and continue; `end_turn` means the model is finished. A fixed iteration cap (B) either cuts off legitimate work or loops needlessly. Parsing text for \"done\" (C) is fragile and easily wrong. Stopping after the first tool result (D) ends multi-step tasks prematurely."}, {"scenario": "Agentic AI Tools", "global_n": 96, "situation": "To answer a request, the agent needs three independent lookups (customer, order, inventory) that don't depend on one another's results.", "question": "What is the most efficient pattern?", "options": [{"letter": "A", "text": "Issue the three tool calls in parallel in one turn and return all three results together in the next user message.", "correct": true}, {"letter": "B", "text": "Call them strictly one at a time across three turns.", "correct": false}, {"letter": "C", "text": "Combine all three into a single overloaded tool.", "correct": false}, {"letter": "D", "text": "Ask the user to choose which lookup matters most.", "correct": false}], "correct": "A", "explanation": "Independent calls can run in parallel within one assistant turn, and returning all `tool_result` blocks together in a single user message is the supported pattern—minimizing round-trips. Sequential calls (B) waste turns for work with no dependencies. One overloaded tool (C) muddies responsibilities and schemas. Asking the user to pick (D) discards needed information."}, {"scenario": "Agentic AI Tools", "global_n": 97, "situation": "A `get_account` tool returns 40+ fields, but the agent only ever needs five. Over a long session, the unused fields pile up and crowd the context window.", "question": "What is the best fix?", "options": [{"letter": "A", "text": "Change the tool to return only the fields the agent needs.", "correct": true}, {"letter": "B", "text": "Increase the context window by switching to a larger model.", "correct": false}, {"letter": "C", "text": "Tell the model to ignore the extra fields.", "correct": false}, {"letter": "D", "text": "Summarize the whole conversation more often.", "correct": false}], "correct": "A", "explanation": "Trimming the tool's output at the source removes the wasted tokens on every call—fixing the root cause. A bigger context window (B) just delays the same accumulation at higher cost. Telling the model to ignore fields (C) still pays to carry them in context. More frequent summarization (D) treats the symptom and risks dropping detail."}, {"scenario": "Agentic AI Tools", "global_n": 98, "situation": "A tool wraps a flaky external API. Sometimes it times out (worth a retry); sometimes it returns a permanent \"not found\" (not worth retrying). Right now every failure looks identical to the model.", "question": "How should tool errors be propagated?", "options": [{"letter": "A", "text": "Return structured errors with a category and a retryable flag so the model retries transient failures and escalates permanent ones.", "correct": true}, {"letter": "B", "text": "Return a generic \"error\" string for every failure.", "correct": false}, {"letter": "C", "text": "Silently return empty results on any failure.", "correct": false}, {"letter": "D", "text": "Discard the tool call and end the turn.", "correct": false}], "correct": "A", "explanation": "Distinguishing transient from permanent failures—via a category and a retryable flag—lets the model make the right recovery decision per case. A generic error (B) erases that distinction. Silent empties (C) hide failures and mislead the model into thinking the call succeeded. Ending the turn (D) abandons recoverable work."}, {"scenario": "Agentic AI Tools", "global_n": 99, "situation": "For a specific workflow step, the agent must call the `validate_address` tool before proceeding—skipping it is not acceptable.", "question": "Which mechanism enforces this?", "options": [{"letter": "A", "text": "Set `tool_choice` to force the `validate_address` tool for that request.", "correct": true}, {"letter": "B", "text": "Add \"always validate the address\" to the system prompt and hope it complies.", "correct": false}, {"letter": "C", "text": "Lower the temperature so the model is more obedient.", "correct": false}, {"letter": "D", "text": "Remove every other tool for the whole session.", "correct": false}], "correct": "A", "explanation": "`tool_choice` can require a specific tool, guaranteeing the call happens for that step. A prompt instruction (B) is not a guarantee. Temperature (C) doesn't control tool selection. Removing all other tools for the entire session (D) is a blunt, over-broad change that breaks every other step."}, {"scenario": "Agentic AI Tools", "global_n": 100, "situation": "A support agent reaches a case with no matching policy and has already failed to make progress after several attempts.", "question": "Steps:", "options": [{"letter": "A", "text": "Invoke `escalate_to_human` with the gathered context so a person can take over.", "correct": true}, {"letter": "B", "text": "Keep retrying the same tools until something works.", "correct": false}, {"letter": "C", "text": "Make a best-guess decision and act on it.", "correct": false}, {"letter": "D", "text": "End the conversation without resolution or handoff.", "correct": false}], "correct": "A", "explanation": "1 (Agent architecture), 2 (Tools and MCP), 5 (Context and reliability) | Technology | Key aspects | |---|---| | **Claude Agent SDK** | AgentDefinition, agent loops, `stop_reason`, hooks (PostToolUse), spawning subagents via Task, `allowedTools` | | **Model Context Protocol (MCP)** | MCP servers, tools, resources, `isError`, tool descriptions, `.mcp.json`, environment variables | | **Claude Code** | CLAUDE.md hierarchy, `.claude/rules/` with glob patterns, `.claude/commands/`, `.claude/skills/` with SKILL.md, planning mode, `/compact`, `--resume`, `fork_session` | | **Claude Code CLI** | `-p` / `--print` for non-interactive mode, `--output-format json`, `--json-schema` | | **Claude API** | `tool_use` with JSON schemas, `tool_choice` (\"auto\"/\"any\"/forced), `stop_reason`, `max_tokens`, system prompts | | **Message Batches API** | 50% savings, up to 24-hour window, `custom_id`, no multi-turn tool calling | | **JSON Schema** | Required vs optional, nullable fields, enum types, \"other\" + detail, strict mode | | **Pydantic** | Schema validation, semantic errors, validation/retry loops | | **Built-in tools** | Read, Write, Edit, Bash, Grep, Glob — purpose and selection criteria | | **Few-shot prompting** | Targeted examples for ambiguous situations, generalization to new patterns | | **Prompt chaining** | Sequential decomposition into focused passes | | **Context window** | Token budgets, progressive summarization, \"lost in the middle\", scratchpad files | | **Session management** | Resume, `fork_session`, named sessions, context isolation | | **Confidence calibration** | Field-level scoring, calibration on labeled sets, stratified sampling | The following adjacent topics will **NOT** be on the exam: - Fine-tuning Claude models or training custom models - Claude API authentication, billing, or account management - Detailed implementation in specific programming languages or frameworks (beyond what’s needed for tool/schema configuration) - Deploying or hosting MCP servers (infrastructure, networking, container orchestration) - Claude’s internal architecture, training process, or model weights - Constitutional AI, RLHF, or safety training methodologies - Embedding models or vector database implementation details - Computer use (browser automation, desktop interaction) - Image analysis capabilities (Vision) - Streaming API or server-sent events - Rate limiting, quotas, or detailed API cost calculations - OAuth, API key rotation, or authentication protocol details - Cloud-provider-specific configurations (AWS, GCP, Azure) - Performance benchmarks or model comparison metrics - Prompt caching implementation details (beyond knowing it exists) - Token counting algorithms or tokenization specifics 1. **Build an agent with the Claude Agent SDK** — implement a full agent loop with tool calling, error handling, and session management. Practice subagents and explicit context passing. 2. **Configure Claude Code for a real project** — use CLAUDE.md hierarchy, path-specific rules in `.claude/rules/`, skills with `context: fork` and `allowed-tools`, and MCP server integration. 3. **Design and test MCP tools** — write descriptions that differentiate similar tools, return structured errors with categories and retry flags, and test against ambiguous user requests. 4. **Build a data extraction pipeline** — use `tool_use` with JSON schemas, validation/retry loops, optional/nullable fields, and batch processing via the Message Batches API. 5. **Practice prompt engineering** — add few-shot examples for ambiguous scenarios, explicit review criteria, and multi-pass architectures for large code reviews. 6. **Study context management patterns** — extract facts from verbose outputs, use scratchpad files, and delegate discovery to subagents to handle context limits. 7. **Understand escalation and human-in-the-loop** — when to escalate (policy gaps, explicit user request, inability to make progress) and confidence-based routing workflows. 8. **Take a practice exam** before the real one. It uses the same scenarios and format."}];

const state = { current: 0, answers: {} };

function md(text) {
  if (!text) return '';
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, ' ');
}

function buildSidebar() {
  const list = document.getElementById('sidebarList');
  document.getElementById('totalCount').textContent = QUESTIONS.length;
  let currentScenario = null;
  let groupEl = null;
  QUESTIONS.forEach((q, idx) => {
    if (q.scenario !== currentScenario) {
      currentScenario = q.scenario;
      const sg = document.createElement('div');
      sg.className = 'scenario-group';
      const lbl = document.createElement('div');
      lbl.className = 'scenario-label';
      lbl.textContent = q.scenario;
      sg.appendChild(lbl);
      groupEl = sg;
      list.appendChild(sg);
    }
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.id = 'sb-' + idx;
    btn.onclick = () => goto(idx);
    btn.innerHTML = '<span class="q-dot"></span> Q' + q.global_n;
    groupEl.appendChild(btn);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, idx) => {
    const btn = document.getElementById('sb-' + idx);
    if (!btn) return;
    btn.className = 'q-btn';
    if (idx === state.current) btn.classList.add('active');
    const ans = state.answers[q.global_n];
    if (ans !== undefined) {
      btn.classList.add(ans === q.correct ? 'answered-correct' : 'answered-wrong');
    }
  });
  document.getElementById('answeredCount').textContent = Object.keys(state.answers).length;
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const chosen = state.answers[q.global_n];
  const locked = chosen !== undefined;

  document.getElementById('qCounter').textContent = (idx + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === QUESTIONS.length - 1;

  const optionsHtml = q.options.map(opt => {
    let cls = 'option';
    if (locked) {
      cls += ' locked';
      if (opt.correct) cls += ' correct';
      else if (opt.letter === chosen) cls += ' wrong';
      else cls += ' dimmed';
    }
    return '<div class="' + cls + '" data-letter="' + opt.letter + '" onclick="answer(' + q.global_n + ', \'' + opt.letter + '\')">' +
      '<div class="opt-letter">' + opt.letter + '</div>' +
      '<div class="opt-text">' + md(opt.text) + '</div></div>';
  }).join('');

  const expl = locked
    ? '<div class="explanation show"><strong>Why ' + q.correct + ':</strong> ' + md(q.explanation) + '</div>'
    : '<div class="explanation"></div>';

  document.getElementById('qCard').innerHTML =
    '<div class="q-number">Question ' + q.global_n + '</div>' +
    '<div class="q-scenario">' + q.scenario + '</div>' +
    '<div class="q-situation">' + md(q.situation) + '</div>' +
    '<div class="q-prompt">' + md(q.question) + '</div>' +
    '<div class="options">' + optionsHtml + '</div>' +
    expl;
}

function answer(globalN, letter) {
  if (state.answers[globalN] !== undefined) return;
  state.answers[globalN] = letter;
  renderQuestion(state.current);
  updateSidebar();
}

function navigate(dir) { goto(state.current + dir); }

function goto(idx) {
  if (idx < 0 || idx >= QUESTIONS.length) return;
  document.getElementById('questionScreen').classList.add('active');
  document.getElementById('summaryScreen').classList.remove('active');
  state.current = idx;
  renderQuestion(idx);
  updateSidebar();
}

function showSummary() {
  document.getElementById('questionScreen').classList.remove('active');
  document.getElementById('summaryScreen').classList.add('active');

  const total = QUESTIONS.length;
  const answered = Object.keys(state.answers).length;
  let correct = 0;
  const wrongByScenario = {};

  QUESTIONS.forEach(q => {
    const ans = state.answers[q.global_n];
    if (ans === undefined) return;
    if (ans === q.correct) {
      correct++;
    } else {
      if (!wrongByScenario[q.scenario]) wrongByScenario[q.scenario] = [];
      wrongByScenario[q.scenario].push({ q: q, chosen: ans });
    }
  });

  const wrong = answered - correct;
  const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;
  const unanswered = total - answered;

  let wrongGroupsHtml = '';
  for (const scenario in wrongByScenario) {
    const items = wrongByScenario[scenario];
    const rows = items.map(item => {
      const chosenOpt = item.q.options.find(o => o.letter === item.chosen);
      const correctOpt = item.q.options.find(o => o.letter === item.q.correct);
      return '<div class="wrong-item">' +
        '<div class="wi-n">Q' + item.q.global_n + '</div>' +
        '<div class="wi-q">' +
          '<div class="wi-situation">' + md(item.q.situation) + '</div>' +
          '<div class="wi-prompt">' + md(item.q.question) + '</div>' +
          '<div class="wi-ans">' +
            'Your answer: <span class="wi-wrong-tag">' + item.chosen + '</span> — ' + md(chosenOpt ? chosenOpt.text : '') + '<br>' +
            'Correct: <span class="wi-correct-tag">' + item.q.correct + '</span> — ' + md(correctOpt ? correctOpt.text : '') +
          '</div>' +
        '</div></div>';
    }).join('');
    wrongGroupsHtml +=
      '<div class="group-block">' +
        '<div class="group-title">' + scenario +
          '<span class="group-badge">' + items.length + ' incorrect</span></div>' +
        rows +
      '</div>';
  }

  const unansweredNote = unanswered > 0
    ? '<p style="color:#e53e3e;font-size:14px;margin-bottom:20px;font-weight:600;">&#9888; ' + unanswered + ' question(s) not answered.</p>'
    : '';

  document.getElementById('summaryContent').innerHTML =
    '<h1>Exam Complete</h1>' +
    '<p class="summary-subtitle">You answered ' + answered + ' of ' + total + ' questions.</p>' +
    unansweredNote +
    '<div class="score-grid">' +
      '<div class="score-card total"><div class="big">' + pct + '%</div><div class="label">Score</div></div>' +
      '<div class="score-card correct-c"><div class="big">' + correct + '</div><div class="label">Correct</div></div>' +
      '<div class="score-card wrong-c"><div class="big">' + wrong + '</div><div class="label">Incorrect</div></div>' +
    '</div>' +
    (wrong > 0
      ? '<div class="section-title">Incorrect answers by scenario</div>' + wrongGroupsHtml
      : '<p style="color:#38a169;font-weight:700;font-size:17px;">All answered questions correct!</p>') +
    '<button class="restart-btn" onclick="restart()">Restart Exam</button>';
}

function restart() {
  state.answers = {};
  state.current = 0;
  document.getElementById('questionScreen').classList.add('active');
  document.getElementById('summaryScreen').classList.remove('active');
  renderQuestion(0);
  updateSidebar();
}

buildSidebar();
renderQuestion(0);
updateSidebar();
</script>
</body>
</html>
