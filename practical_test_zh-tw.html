<!DOCTYPE html>
<html lang="zh-tw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Certified Architect — 模擬測驗</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

.shell { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 260px; min-width: 260px;
  background: #1a1a2e; color: #cdd3de;
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
  padding: 20px 16px 14px;
  font-size: 13px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  color: #7f8fa6; border-bottom: 1px solid #2c2c4a; flex-shrink: 0;
}
.sidebar-progress {
  padding: 10px 16px; font-size: 12px; color: #7f8fa6;
  border-bottom: 1px solid #2c2c4a; flex-shrink: 0;
}
.sidebar-progress span { color: #e2e8f0; font-weight: 600; }
.sidebar-scroll { overflow-y: auto; flex: 1; padding: 8px 0; }
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: #2c2c4a; border-radius: 2px; }

.scenario-group { margin-bottom: 4px; }
.scenario-label {
  padding: 6px 16px 4px; font-size: 10.5px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase; color: #4a5568;
}
.q-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 6px 16px;
  background: none; border: none; cursor: pointer;
  font-size: 13.5px; color: #a0aec0; text-align: left;
  transition: background .15s, color .15s;
  border-left: 3px solid transparent;
}
.q-btn:hover { background: #242447; color: #e2e8f0; }
.q-btn.active { background: #1e3a5f; color: #63b3ed; border-left-color: #63b3ed; }
.q-btn.answered-correct { color: #68d391; }
.q-btn.answered-correct .q-dot { background: #68d391; }
.q-btn.answered-wrong { color: #fc8181; }
.q-btn.answered-wrong .q-dot { background: #fc8181; }
.q-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4a5568; flex-shrink: 0; transition: background .2s;
}

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 12px 32px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.topbar-title { font-size: 15px; font-weight: 600; color: #2d3748; }
.topbar-nav { display: flex; gap: 10px; align-items: center; }
.nav-btn {
  padding: 7px 18px; border-radius: 8px;
  border: 1.5px solid #cbd5e0; background: #fff;
  font-size: 14px; cursor: pointer; color: #4a5568; font-weight: 500;
  transition: all .15s;
}
.nav-btn:hover { background: #edf2f7; border-color: #a0aec0; }
.nav-btn:disabled { opacity: .35; cursor: default; }
.nav-btn.finish { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }
.nav-btn.finish:hover { background: #2c5282; }
.q-counter { font-size: 13px; color: #718096; font-weight: 500; }

.content { flex: 1; overflow-y: auto; padding: 36px 48px; }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

/* Question card */
.q-card { max-width: 820px; margin: 0 auto; }
.q-scenario {
  display: inline-block; background: #ebf8ff; color: #2b6cb0;
  font-size: 12px; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; padding: 4px 12px;
  border-radius: 20px; margin-bottom: 16px;
}
.q-number { font-size: 13px; color: #a0aec0; margin-bottom: 6px; font-weight: 600; }
.q-situation {
  font-size: 16.5px; color: #1a202c;
  font-weight: 500; line-height: 1.7;
  background: #fff;
  border: 1.5px solid #d0dff0;
  border-radius: 10px;
  padding: 16px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  margin-bottom: 22px;
}
.q-situation code, .opt-text code, .explanation code {
  background: #e2e8f0; padding: 1px 5px; border-radius: 4px;
  font-family: "SF Mono", Menlo, Monaco, monospace;
  font-size: 13.5px; color: #2d3748;
}
.explanation code { background: #feebc8; }
.q-prompt { font-size: 17px; font-weight: 700; color: #1a202c; margin-bottom: 20px; }

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.option {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 18px; border: 2px solid #e2e8f0;
  border-radius: 12px; cursor: pointer; background: #fff;
  transition: border-color .15s, background .15s, transform .1s;
}
.option:hover:not(.locked) {
  border-color: #90cdf4; background: #ebf8ff; transform: translateX(2px);
}
.option.locked { cursor: default; }
.opt-letter {
  width: 30px; height: 30px; min-width: 30px; border-radius: 50%;
  background: #edf2f7; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #4a5568;
  transition: background .2s, color .2s; flex-shrink: 0;
}
.opt-text { font-size: 15px; color: #2d3748; line-height: 1.55; padding-top: 3px; }

.option.correct { border-color: #48bb78; background: #f0fff4; }
.option.correct .opt-letter { background: #48bb78; color: #fff; }
.option.wrong { border-color: #fc8181; background: #fff5f5; }
.option.wrong .opt-letter { background: #fc8181; color: #fff; }
.option.dimmed { opacity: .55; }

/* Explanation */
.explanation {
  margin-top: 4px; padding: 14px 18px;
  background: #fffbeb; border-left: 4px solid #f6ad55;
  border-radius: 0 10px 10px 0;
  font-size: 14.5px; color: #744210; line-height: 1.65; display: none;
}
.explanation.show { display: block; }
.explanation strong { color: #744210; }

/* Summary */
.summary { max-width: 820px; margin: 0 auto; display: none; }
.summary.show { display: block; }
.summary h1 { font-size: 26px; font-weight: 800; color: #1a202c; margin-bottom: 6px; }
.summary-subtitle { color: #718096; font-size: 15px; margin-bottom: 28px; }
.score-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 32px; }
.score-card {
  background: #fff; border-radius: 14px; padding: 20px;
  text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.07);
}
.score-card .big { font-size: 38px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
.score-card .label { font-size: 13px; color: #718096; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.score-card.total .big { color: #2b6cb0; }
.score-card.correct-c .big { color: #38a169; }
.score-card.wrong-c .big { color: #e53e3e; }

.section-title {
  font-size: 18px; font-weight: 700; color: #2d3748;
  margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #e2e8f0;
}
.group-block {
  background: #fff; border-radius: 12px; padding: 18px 20px;
  margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.group-title {
  font-size: 15px; font-weight: 700; color: #2d3748;
  margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.group-badge {
  font-size: 11px; padding: 2px 10px; border-radius: 20px;
  font-weight: 700; background: #fff5f5; color: #c53030;
}
.wrong-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 12px 0; border-bottom: 1px solid #f0f0f0;
  font-size: 14px; color: #4a5568;
}
.wrong-item:last-child { border-bottom: none; }
.wrong-item .wi-n { min-width: 32px; font-weight: 700; color: #a0aec0; font-size: 12px; padding-top: 2px; }
.wrong-item .wi-q { flex: 1; }
.wrong-item .wi-situation { font-size: 13.5px; color: #2d3748; font-weight: 500; margin-bottom: 4px; line-height: 1.5; }
.wrong-item .wi-situation code { background: #e2e8f0; padding: 1px 4px; border-radius: 3px; font-family: "SF Mono", Menlo, Monaco, monospace; font-size: 12.5px; }
.wrong-item .wi-prompt { font-size: 13px; color: #718096; font-style: italic; margin-bottom: 4px; }
.wrong-item .wi-ans { font-size: 12px; margin-top: 3px; color: #718096; }
.wi-wrong-tag { color: #e53e3e; font-weight: 700; }
.wi-correct-tag { color: #38a169; font-weight: 700; }

.restart-btn {
  margin-top: 28px; padding: 12px 32px;
  background: #2b6cb0; color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background .15s;
}
.restart-btn:hover { background: #2c5282; }

.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-header">Questions</div>
    <div class="sidebar-progress">Answered: <span id="answeredCount">0</span> / <span id="totalCount">0</span></div>
    <div class="sidebar-scroll" id="sidebarList"></div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Claude Certified Architect — 模擬測驗</div>
      <div class="topbar-nav">
        <span class="q-counter" id="qCounter"></span>
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>&#8592; Prev</button>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next &#8594;</button>
        <button class="nav-btn finish" id="finishBtn" onclick="showSummary()">Finish &amp; Review</button>
      </div>
    </div>
    <div class="content">
      <div class="screen active" id="questionScreen">
        <div class="q-card" id="qCard"></div>
      </div>
      <div class="screen" id="summaryScreen">
        <div class="summary show" id="summaryContent"></div>
      </div>
    </div>
  </div>
</div>
<script>
const QUESTIONS = [{"scenario": "多代理研究系統", "global_n": 1, "situation": "某文件分析代理發現兩個可信來源對於一項關鍵指標含有直接相互矛盾的統計數字:一份政府報告指出成長率為 40%,而一份產業分析則指出為 12%。兩個來源看起來都很可信,且此落差可能對研究結論造成實質影響。該文件分析代理應如何最有效地處理此情況?", "question": "哪種做法最有效?", "options": [{"letter": "A", "text": "套用可信度的經驗法則挑出最可能正確的數字,以該值完成分析,並加註腳說明此落差。", "correct": false}, {"letter": "B", "text": "在分析輸出中同時納入兩個數字,但不標記它們相互衝突,讓綜整代理根據更廣的上下文決定要採用哪一個。", "correct": false}, {"letter": "C", "text": "停止分析並立即升級至協調者,請它在繼續之前決定哪個來源更具權威性。", "correct": false}, {"letter": "D", "text": "以兩個數字一併完成分析,明確標註此衝突並附上來源出處標註,在傳遞給綜整之前,讓協調者決定如何調和這些資料。", "correct": true}], "correct": "D", "explanation": "此做法維持了職責分離:分析代理在不阻塞的情況下完成其核心工作,以清楚的出處標註保留兩個相互衝突的值,並正確地將調和工作交給擁有更廣上下文的協調者。"}, {"scenario": "多代理研究系統", "global_n": 2, "situation": "網頁搜尋代理與文件分析代理已完成各自的任務,並將結果回傳給協調者。建立整合研究報告的下一步是什麼?", "question": "下一步哪個最適當?", "options": [{"letter": "A", "text": "每個代理將其結果直接傳送給報告撰寫代理,略過協調者。", "correct": false}, {"letter": "B", "text": "文件分析代理向網頁搜尋代理索取搜尋結果,並在內部進行合併。", "correct": false}, {"letter": "C", "text": "協調者將兩組結果傳遞給綜整代理,進行統一整合。", "correct": true}, {"letter": "D", "text": "協調者將兩個代理的原始輸出串接起來,並將其作為最終結果回傳。", "correct": false}], "correct": "C", "explanation": "在協調者—子代理架構中,協調者將兩組結果轉交給綜整代理進行集中整合,既保有控制權,也確保高品質的合併。"}, {"scenario": "多代理研究系統", "global_n": 3, "situation": "某文件分析子代理在處理 PDF 檔案時經常失敗:有些檔案含有損毀的區段,會觸發剖析例外;有些則受密碼保護;有時剖析函式庫在處理大型檔案時會卡住。目前,任何例外都會立即終止子代理,並向協調者回傳一個錯誤,協調者必須決定要重試、略過,還是讓整個任務失敗。這導致協調者過度涉入例行的錯誤處理。哪項架構改進最有效?", "question": "哪項改進最有效?", "options": [{"letter": "A", "text": "建立一個專責的錯誤處理代理,透過共用佇列監控所有失敗並決定復原動作,直接向子代理發送重啟命令。", "correct": false}, {"letter": "B", "text": "設定子代理一律回傳帶有成功狀態的部分結果,並將錯誤細節嵌入中繼資料;協調者將所有回應都視為成功。", "correct": false}, {"letter": "C", "text": "讓協調者在將文件傳送給子代理之前先驗證所有文件,拒絕那些可能導致失敗的文件。", "correct": false}, {"letter": "D", "text": "在子代理內針對暫時性失敗實作本機復原,僅將其無法解決的錯誤升級至協調者,並附上嘗試過的步驟與部分結果。", "correct": true}], "correct": "D", "explanation": "在有能力解決錯誤的最低層級處理錯誤。本機復原可減輕協調者的工作負擔,同時仍能將真正無法復原的問題連同完整上下文與部分進度一併升級。"}, {"scenario": "多代理研究系統", "global_n": 4, "situation": "在以「AI 對創意產業的影響」執行系統後,你觀察到每個子代理都成功完成:網頁搜尋代理找到相關文章,文件分析代理正確地將它們摘要,綜整代理也產出了連貫的文字。然而,最終報告只涵蓋視覺藝術,完全遺漏了音樂、文學與電影。在協調者的記錄檔中,你看到它將主題分解為三個子任務:「AI 於數位藝術」、「AI 於平面設計」與「AI 於攝影」。最可能的根本原因是什麼?", "question": "最可能的根本原因是什麼?", "options": [{"letter": "A", "text": "綜整代理缺少偵測涵蓋範圍缺口的指令。", "correct": false}, {"letter": "B", "text": "文件分析代理因相關性標準過於嚴格,而濾除了非視覺類的來源。", "correct": false}, {"letter": "C", "text": "協調者的任務分解過於狹隘,指派給子代理的工作未涵蓋所有相關領域。", "correct": true}, {"letter": "D", "text": "網頁搜尋代理的查詢不足,應加以擴大以涵蓋更多領域。", "correct": false}], "correct": "C", "explanation": "協調者只將一個廣泛的主題分解為視覺藝術相關的子任務,完全遺漏了音樂、文學與電影。由於子代理都正確執行了各自的指派,狹隘的分解便是顯而易見的根本原因。"}, {"scenario": "多代理研究系統", "global_n": 5, "situation": "網頁搜尋子代理只回傳了 5 個請求來源類別中的 3 個(競爭對手網站與產業報告成功,但新聞檔案庫與社群動態逾時)。文件分析子代理成功處理了所有提供的文件。綜整子代理必須從品質不一的上游輸入產出摘要。哪種錯誤傳播策略最有效?", "question": "哪種錯誤傳播策略最有效?", "options": [{"letter": "A", "text": "僅使用成功的來源繼續綜整,並產出一份未提及哪些資料無法取得的輸出。", "correct": false}, {"letter": "B", "text": "綜整子代理向協調者回傳一個錯誤,因資料不完整而觸發完整重試或任務失敗。", "correct": false}, {"letter": "C", "text": "綜整子代理請協調者在開始綜整之前,以更長的逾時時間重試逾時的來源。", "correct": false}, {"letter": "D", "text": "在綜整輸出中加入涵蓋範圍標註,指出哪些結論有充分佐證,以及哪些地方因來源無法取得而存在缺口。", "correct": true}], "correct": "D", "explanation": "涵蓋範圍標註以透明的方式實作了優雅降級,既保留了已完成工作的價值,又能傳播不確定性,以利針對信心程度做出知情的決定。"}, {"scenario": "多代理研究系統", "global_n": 6, "situation": "文件分析子代理遇到一個它無法剖析的損毀 PDF 檔案。在設計系統的錯誤處理時,處理此失敗最有效的方式是什麼?", "question": "哪種做法最有效?", "options": [{"letter": "A", "text": "向協調者代理回傳一個帶有上下文的錯誤,讓它決定如何繼續進行。", "correct": true}, {"letter": "B", "text": "默默略過該損毀文件並繼續處理其餘檔案,以避免中斷工作流程。", "correct": false}, {"letter": "C", "text": "在回報失敗之前,以指數退避自動重試剖析該文件三次。", "correct": false}, {"letter": "D", "text": "拋出一個終止整個研究工作流程的例外。", "correct": false}], "correct": "A", "explanation": "向協調者回傳一個帶有上下文的錯誤是最有效的做法,因為它讓協調者能做出知情的決定——略過該檔案、嘗試替代的剖析方法,或通知使用者——同時保持對該失敗的可見性。"}, {"scenario": "多代理研究系統", "global_n": 7, "situation": "正式環境日誌顯示一個持續出現的模式:像「分析上傳的季度報告」這類請求,有 45% 的機率被路由到網頁搜尋代理,而不是文件分析代理。檢視工具定義後,你發現網頁搜尋代理有一個工具 `analyze_content`,描述為「analyzes content and extracts key information」,而文件分析代理有一個工具 `analyze_document`,描述為「analyzes documents and extracts key information」。你該如何修正這個路由錯誤的問題?", "question": "你該如何修正這個路由錯誤的問題?", "options": [{"letter": "A", "text": "加入一個前置路由分類器,在協調者決定委派之前,先偵測使用者指的是上傳的檔案還是網頁內容。", "correct": false}, {"letter": "B", "text": "將網頁搜尋工具重新命名為 `extract_web_results`,並將其描述更新為「processes and returns information retrieved from web search and URLs」。", "correct": true}, {"letter": "C", "text": "在協調者提示中加入少樣本範例,展示正確的路由:「使用者上傳季度報告 → 文件分析代理」以及「使用者詢問某個網頁 → 網頁搜尋代理」。", "correct": false}, {"letter": "D", "text": "用使用範例擴充文件分析工具的描述,例如「用於上傳的 PDF、Word 文件和試算表」,而網頁搜尋工具則維持不變。", "correct": false}], "correct": "B", "explanation": "將網頁搜尋工具重新命名為 `extract_web_results`,並更新其描述以明確指涉網頁搜尋與 URL,這直接消除了兩個工具名稱與描述之間的語意重疊,從而根除問題的根本原因。這使每個工具的用途都明確無歧義,讓協調者能可靠地區分文件分析與網頁搜尋。"}, {"scenario": "多代理研究系統", "global_n": 8, "situation": "一位同事提議讓文件分析代理直接將其結果送給綜整代理,繞過協調者。將協調者保留為所有子代理之間通訊的中央樞紐,主要優勢是什麼?", "question": "將協調者保留為中央樞紐的主要優勢是什麼?", "options": [{"letter": "A", "text": "協調者可以觀察所有互動、統一處理錯誤,並決定每個子代理應該接收哪些資訊。", "correct": true}, {"letter": "B", "text": "協調者將對子代理的多個請求批次化,減少 API 呼叫總數與整體延遲。", "correct": false}, {"letter": "C", "text": "透過協調者路由能啟用直接代理間呼叫無法支援的自動重試邏輯。", "correct": false}, {"letter": "D", "text": "子代理使用隔離的記憶體,直接通訊會需要複雜的序列化,而只有協調者能執行序列化。", "correct": false}], "correct": "A", "explanation": "協調者模式提供對所有互動的集中可見性、整個系統一致的錯誤處理,以及對每個子代理接收哪些資訊的細緻控制——這些正是星形通訊拓撲的主要優勢。"}, {"scenario": "多代理研究系統", "global_n": 9, "situation": "網頁搜尋子代理在研究一個複雜主題時逾時。你需要設計如何將這次失敗的相關資訊回傳給協調者。哪種錯誤傳播方式最能促成智慧型的復原?", "question": "哪種錯誤傳播方式最能促成智慧型的復原?", "options": [{"letter": "A", "text": "將結構化的錯誤上下文回傳給協調者,包含失敗類型、執行的查詢、任何部分結果,以及可能的替代方法。", "correct": true}, {"letter": "B", "text": "在子代理內部攔截逾時,並回傳一個標記為成功的空結果集。", "correct": false}, {"letter": "C", "text": "在子代理內部實作自動指數退避重試,只有在重試耗盡後才回傳一個一般性的「search unavailable」狀態。", "correct": false}, {"letter": "D", "text": "將逾時例外直接傳播到最上層的處理常式,終止整個研究工作流程。", "correct": false}], "correct": "A", "explanation": "回傳結構化的錯誤上下文——包含失敗類型、執行的查詢、部分結果以及替代方法——給予協調者做出智慧型復原決策所需的一切(例如,以修改後的查詢重試,或以部分結果繼續)。它為協調層級的明智決策保留了最大量的上下文。"}, {"scenario": "多代理研究系統", "global_n": 10, "situation": "在你的系統設計中,你讓文件分析代理可以存取一個通用工具 `fetch_url`,以便它能透過 URL 下載文件。正式環境日誌顯示,這個代理現在經常下載搜尋引擎結果頁面來執行臨時的網頁搜尋——這種行為本應路由到網頁搜尋代理——導致結果不一致。哪種修正最有效?", "question": "哪種修正最有效?", "options": [{"letter": "A", "text": "將 `fetch_url` 替換為一個 `load_document` 工具,該工具會驗證 URL 是否指向文件格式。", "correct": true}, {"letter": "B", "text": "從文件分析代理移除 `fetch_url`,並將所有 URL 抓取透過協調者路由到網頁搜尋代理。", "correct": false}, {"letter": "C", "text": "實作過濾機制,封鎖對已知搜尋引擎網域的 `fetch_url` 呼叫,同時允許其他 URL。", "correct": false}, {"letter": "D", "text": "在文件分析代理的提示中加入指令,說明 `fetch_url` 只應用於下載文件 URL,而非搜尋。", "correct": false}], "correct": "A", "explanation": "將通用工具替換為一個會驗證 URL 是否符合文件格式的文件專用工具,透過在介面層級約束能力來修正根本原因。這遵循最小權限原則,使不想要的搜尋行為變成不可能,而非僅僅是不鼓勵。"}, {"scenario": "多代理研究系統", "global_n": 11, "situation": "在研究一個廣泛主題時,你觀察到網頁搜尋代理與文件分析代理調查了相同的子主題,導致它們的輸出有大量重複。token 用量幾乎翻倍,但研究的廣度或深度卻沒有相應地增加。處理這個問題最有效的方式是什麼?", "question": "處理這個問題最有效的方式是什麼?", "options": [{"letter": "A", "text": "讓兩個代理平行完成,然後由協調者在將結果傳給綜整代理之前,先對重疊的結果去重。", "correct": false}, {"letter": "B", "text": "協調者在委派之前明確劃分研究空間,為每個代理分配不同的子主題或來源類型。", "correct": true}, {"letter": "C", "text": "實作一個共享狀態機制,讓代理記錄其當前的關注領域,使其他代理能在執行期間動態地避免重複。", "correct": false}, {"letter": "D", "text": "改用循序執行,讓文件分析只在網頁搜尋完成後才執行,並以網頁搜尋結果作為上下文以避免重複。", "correct": false}], "correct": "B", "explanation": "讓協調者在委派之前明確劃分研究空間最為有效,因為它在任何工作開始之前就處理了根本原因——任務邊界不明確。它在防止重複工作與浪費 token 的同時,保留了平行性。"}, {"scenario": "多代理研究系統", "global_n": 12, "situation": "在研究期間,網頁搜尋子代理查詢了三個來源類別,結果各不相同:學術資料庫回傳 15 篇相關論文,產業報告回傳「0 results」,而專利資料庫回傳「Connection timeout」。在設計向協調者的錯誤傳播時,哪種方式能促成最佳的復原決策?", "question": "哪種方式能促成最佳的復原決策?", "options": [{"letter": "A", "text": "將結果彙整成單一的成功百分比指標(例如「67% source coverage」),並提供可隨需取用的詳細日誌。", "correct": false}, {"letter": "B", "text": "將「timeout」和「0 results」都回報為需要協調者介入的失敗。", "correct": false}, {"letter": "C", "text": "在內部重試暫時性失敗,只回報持續性的錯誤。", "correct": false}, {"letter": "D", "text": "區分需要重試決策的存取失敗(timeout)與代表查詢成功的有效空結果(「0 results」)。", "correct": true}], "correct": "D", "explanation": "逾時(存取失敗)與「0 results」(有效的空結果)在語意上是不同的結果,需要不同的回應。區分它們能讓協調者重試專利資料庫,同時接受產業報告的「0 results」為有效且有資訊價值的發現。"}, {"scenario": "多代理研究系統", "global_n": 13, "situation": "正式環境監控顯示綜整品質不一致。當彙整後的結果約為 75K tokens 時,綜整代理能可靠地引用前 15K tokens(網頁搜尋的標題/摘錄)和最後 10K tokens(文件分析的結論)中的資訊,但經常遺漏中間 50K tokens 裡的關鍵發現——即使這些發現直接回答了研究問題。你該如何重新組織彙整後的輸入?", "question": "你該如何重新組織彙整後的輸入?", "options": [{"letter": "A", "text": "在彙整之前,將所有子代理的輸出摘要到 20K tokens 以下,以使內容保持在模型可靠的處理範圍內。", "correct": false}, {"letter": "B", "text": "將子代理結果以增量方式串流給綜整代理,先將網頁搜尋結果處理到完成,再加入文件分析結果。", "correct": false}, {"letter": "C", "text": "在彙整後輸入的開頭放置一份關鍵發現摘要,並以明確的章節標題組織詳細結果以利瀏覽。", "correct": true}, {"letter": "D", "text": "實作輪替機制,在不同研究任務間交替讓哪一個子代理的結果出現在最前面,以確保兩個來源長期下來都能獲得同等的頂端位置。", "correct": false}], "correct": "C", "explanation": "在開頭放置關鍵發現摘要能善用初始效應,使關鍵資訊位於處理最可靠的位置。在通篇加入明確的章節標題有助於模型瀏覽並關注輸入中段的內容,直接緩解「迷失在中間」的現象。"}, {"scenario": "多代理研究系統", "global_n": 14, "situation": "在測試中,web-search 代理的輸出(85K tokens,包含頁面內容)與文件分析代理的輸出(70K tokens,包含思考鏈)合計共 155K tokens,但 綜整代理在輸入低於 50K tokens 時表現最佳。哪個解決方案最有效?", "question": "哪個解決方案最有效?", "options": [{"letter": "A", "text": "修改上游代理,使其回傳結構化資料(關鍵事實、引述、相關性分數),而非冗長的內容與推理過程。", "correct": true}, {"letter": "B", "text": "新增一個中介摘要代理,在將結果傳給 綜整 之前先加以精簡。", "correct": false}, {"letter": "C", "text": "讓 綜整代理以連續批次的方式處理結果,並在各次呼叫之間維持狀態。", "correct": false}, {"letter": "D", "text": "將結果儲存在向量資料庫中,並給 綜整代理搜尋工具,使其能在工作過程中查詢。", "correct": false}], "correct": "A", "explanation": "修改上游代理回傳結構化資料,能在源頭減少 token 量並保留必要資訊,從而解決根本原因。它避免傳遞龐大的頁面內容與推理軌跡,這些內容會膨脹 tokens 卻無助於 綜整 步驟。"}, {"scenario": "多代理研究系統", "global_n": 15, "situation": "在測試中,你觀察到 綜整代理在合併結果時經常需要驗證特定主張。目前當需要驗證時,綜整代理會將控制權交還給協調者,協調者再呼叫 web-search 代理,然後帶著結果重新呼叫 綜整。這會使每個任務多出 2–3 個額外迴圈,並使延遲增加 40%。你的評估顯示,這些驗證中有 85% 是簡單的事實查核(日期、姓名、統計數字),15% 則需要更深入的研究。哪種做法能最有效地降低開銷,同時保有系統可靠性?", "question": "哪種做法最有效?", "options": [{"letter": "A", "text": "讓 綜整代理存取所有 web-search 工具,使其能直接處理任何驗證需求,而無需經過協調者迴圈。", "correct": false}, {"letter": "B", "text": "讓 綜整代理累積所有驗證需求,並在最後以批次形式回傳給協調者,再由協調者一次將它們全部送給 web-search 代理。", "correct": false}, {"letter": "C", "text": "讓 web-search 代理在初始研究期間,主動快取每個來源周邊的額外上下文,以預先因應 綜整 可能需要的驗證。", "correct": false}, {"letter": "D", "text": "給 綜整代理一個範圍受限的 `verify_fact` 工具來進行簡單查核,同時將複雜的驗證透過協調者轉送給 web-search 代理。", "correct": true}], "correct": "D", "explanation": "範圍受限的事實驗證工具讓 綜整代理能直接處理 85% 的簡單查核,消除了大多數迴圈,同時為那 15% 的複雜驗證保留協調者委派路徑。這套做法在大幅降低延遲的同時,落實了最小權限原則。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 16, "situation": "你的 CI 管線執行 Claude Code CLI(以 `--print` 模式),並使用 CLAUDE.md 為程式碼審查提供專案上下文,而開發者普遍認為這些審查很有實質內容。然而,他們回報將審查結果整合進工作流程很困難——Claude 輸出的是敘述性段落,必須手動複製到 PR 留言中。團隊希望能自動將每個發現以獨立的行內 PR 留言形式,張貼在程式碼中相關的位置,這需要包含檔案路徑、行號、嚴重程度與建議修正的結構化資料。哪種做法最有效?", "question": "哪種做法最有效?", "options": [{"letter": "A", "text": "在 CLAUDE.md 中新增一個「審查輸出格式」章節,並附上結構化發現的範例,讓 Claude 從專案上下文中學習預期的格式。", "correct": false}, {"letter": "B", "text": "使用 CLI 旗標 `--output-format json` 與 `--json-schema` 來強制產生結構化發現,然後解析輸出,透過 GitHub API 張貼行內留言。", "correct": true}, {"letter": "C", "text": "在審查提示中加入明確的格式化指令,要求每個發現遵循一個可解析的範本,例如 `[FILE:path] [LINE:n] [SEVERITY:level] ...`。", "correct": false}, {"letter": "D", "text": "保留敘述性審查格式,但新增一個摘要步驟,使用 Claude 產生發現的結構化 JSON 摘要。", "correct": false}], "correct": "B", "explanation": "使用 `--output-format json` 搭配 `--json-schema`,能在 CLI 層級強制結構化輸出,保證產生格式良好且具備所需欄位(檔案路徑、行號、嚴重程度、建議修正)的 JSON,可被可靠地解析並透過 GitHub API 張貼為行內 PR 留言。它善用了專為結構化輸出而設計的內建 CLI 功能。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 17, "situation": "你的團隊使用 Claude Code 來產生程式碼建議,但你注意到一種模式:不明顯的問題——會破壞邊界案例的效能最佳化、會意外改變行為的清理動作——只有在另一位團隊成員審查 PR 時才會被發現。Claude 在產生過程中的推理顯示,它確實考慮過這些情況,卻得出自己的做法正確的結論。哪種做法能直接解決這種自我檢查侷限的根本原因?", "question": "哪種做法能直接解決根本原因?", "options": [{"letter": "A", "text": "執行第二個獨立的 Claude Code 實例來審查變更,且不讓它存取產生器的推理過程。", "correct": true}, {"letter": "B", "text": "為產生階段啟用擴展思考模式,以便在產出建議前進行更周詳的審議。", "correct": false}, {"letter": "C", "text": "在產生提示中加入明確的自我審查指令,要求 Claude 在定稿輸出前批評自己的建議。", "correct": false}, {"letter": "D", "text": "在提示上下文中納入完整的測試檔案與文件,讓 Claude 在產生時更能理解預期行為。", "correct": false}], "correct": "A", "explanation": "第二個獨立的 Claude Code 實例在不存取產生器推理過程的情況下,透過避免確認偏誤,直接解決了根本原因。這種「新視角」的觀點反映了人類同儕審查的精神,亦即由另一位審查者抓出作者已為其自圓其說的問題。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 18, "situation": "你的程式碼審查元件是迭代式的:Claude 分析變更後的檔案,接著可能透過工具呼叫請求相關檔案(匯入、基底類別、測試),以在提供最終回饋前理解上下文。你的應用程式定義了一個工具,讓 Claude 能請求檔案內容;Claude 呼叫該工具、取得結果,然後繼續分析。你正在評估以批次處理來降低 API 成本。在考慮為此工作流程採用批次處理時,主要的技術限制是什麼?", "question": "主要的技術限制是什麼?", "options": [{"letter": "A", "text": "批次處理不包含關聯 ID,無法將輸出對應回輸入請求。", "correct": false}, {"letter": "B", "text": "非同步模型無法在請求進行中執行工具並回傳結果,供 Claude 繼續分析。", "correct": true}, {"letter": "C", "text": "Batch API 不支援在請求參數中提供工具定義。", "correct": false}, {"letter": "D", "text": "批次處理長達 24 小時的延遲對 pull request 回饋而言太慢,儘管該工作流程在其他方面仍可運作。", "correct": false}], "correct": "B", "explanation": "「射後不理」式的非同步 Batch API 模型,沒有任何機制能在請求進行中攔截工具呼叫、執行工具,並回傳結果供 Claude 繼續分析。這與需要在單一邏輯互動中進行多輪工具請求/回應的迭代式工具呼叫工作流程根本上不相容。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 19, "situation": "你的 CI/CD 系統執行三種以 Claude 為基礎的分析:(1) 在每個 PR 上進行快速風格檢查,並在完成前阻擋合併;(2) 對整個程式碼庫進行每週的全面安全稽核;(3) 對近期變更的模組進行每晚的測試案例產生。Message Batches API 可節省 50% 成本,但處理可能長達 24 小時。你希望在維持可接受的開發者體驗的同時最佳化 API 成本。哪個組合正確地將每項任務對應到一種 API 做法?", "question": "哪個組合正確?", "options": [{"letter": "A", "text": "三項任務全部使用 Message Batches API 以最大化 50% 的節省,並設定管線輪詢批次完成狀態。", "correct": false}, {"letter": "B", "text": "PR 風格檢查使用同步呼叫;每週安全稽核與每晚測試產生使用 Message Batches API。", "correct": true}, {"letter": "C", "text": "三項任務全部使用同步呼叫以獲得一致的回應時間,並依靠提示快取來降低各工作負載的成本。", "correct": false}, {"letter": "D", "text": "PR 風格檢查與每晚測試產生使用同步呼叫;只有每週安全稽核使用 Message Batches API。", "correct": false}], "correct": "B", "explanation": "PR 風格檢查會阻擋開發者,需要透過同步呼叫立即回應;而每週安全稽核與每晚測試產生是排程任務,期限有彈性,能容忍長達 24 小時的批次視窗——兩者皆可取得 50% 的節省。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 20, "situation": "你的自動化審查找出了真正的問題,但開發者回報這些回饋不具可行動性。發現中包含像「複雜的工單路由邏輯」或「潛在的空指標」這類語句,卻沒有明確指出究竟該改什麼。當你加入詳細指令,例如「務必納入具體的修正建議」時,模型仍會產生不一致的輸出——時而詳細,時而含糊。哪種提示技巧最能可靠地產生一致且可行動的回饋?", "question": "哪種提示技巧最可靠?", "options": [{"letter": "A", "text": "進一步精修指令,對回饋格式的各部分(位置、問題、嚴重程度、建議修正)提出更明確的要求。", "correct": false}, {"letter": "B", "text": "擴大上下文視窗以納入更多周邊程式碼庫,讓模型有足夠資訊提出具體修正。", "correct": false}, {"letter": "C", "text": "實作兩遍式做法,由一個提示找出問題、第二個提示產生修正,讓兩者各司其職。", "correct": false}, {"letter": "D", "text": "加入 3–4 個少樣本範例,展示確切要求的格式:找出的問題、程式碼中的位置、具體的修正建議。", "correct": true}], "correct": "D", "explanation": "當僅靠指令會產生不一致結果時,少樣本範例是達成一致輸出格式最有效的技巧。提供 3–4 個展示確切預期結構(問題、位置、具體修正)的範例,能給模型一個具體的模式可循,這比抽象的指令更可靠。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 21, "situation": "你的 CI 管線包含兩種以 Claude 為基礎的程式碼審查模式:一種是 pre-merge-commit hook,會在完成前阻擋 PR 合併;另一種是「深度分析」,於夜間執行、輪詢批次完成狀態,並將詳細建議張貼到 PR。你想透過 Message Batches API 來降低 API 成本,它提供 50% 的節省,但需要輪詢且最多可能耗時 24 小時。哪一種模式應該使用批次處理?", "question": "哪一種模式應該使用批次處理?", "options": [{"letter": "A", "text": "只有 pre-merge-commit hook。", "correct": false}, {"letter": "B", "text": "只有深度分析。", "correct": true}, {"letter": "C", "text": "兩種模式皆是。", "correct": false}, {"letter": "D", "text": "兩種模式皆否。", "correct": false}], "correct": "B", "explanation": "深度分析是批次處理的理想對象,因為它本來就在夜間執行、能容忍延遲,並在發佈結果前採用輪詢模型——這與 Message Batches API 那種非同步、以輪詢為基礎的架構相符,同時還能取得 50% 的節省。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 22, "situation": "你的自動化審查會分析註解與 docstring。目前的提示指示 Claude「檢查註解是否準確且為最新狀態」。審查結果經常標記可接受的模式(TODO 標記、簡單描述),卻漏掉那些描述程式碼已不再實作之行為的註解。什麼變更能解決這種不一致分析的根本原因?", "question": "什麼變更能解決根本原因?", "options": [{"letter": "A", "text": "納入 `git blame` 資料,讓 Claude 能找出早於近期程式碼變更的註解。", "correct": false}, {"letter": "B", "text": "加入具誤導性註解的少樣本範例,協助模型在程式碼庫中辨識類似的模式。", "correct": false}, {"letter": "C", "text": "在分析前過濾掉 TODO、FIXME 與描述性註解模式,以減少雜訊。", "correct": false}, {"letter": "D", "text": "指定明確的判定標準:只有當註解所宣稱的行為與程式碼實際行為矛盾時才標記。", "correct": true}], "correct": "D", "explanation": "明確的判定標準——只有當註解所宣稱的行為與程式碼實際行為矛盾時才標記——以對「何謂問題」的精確定義取代模糊的指示,直接解決了根本原因。這能減少對可接受模式的誤報,以及對真正具誤導性註解的遺漏。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 23, "situation": "你的自動化程式碼審查系統顯示出不一致的嚴重性評級——類似的問題(如 null pointer 風險)在某些 理能力來避免對已修正程式碼提出冗餘的回饋。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 26, "situation": "你的管線指令稿執行 `claude \"Analyze this pull request for security issues\"`,但作業卻無限期地卡住。日誌顯示 Claude Code 正在等待互動式輸入。在自動化管線中執行 Claude Code 的正確做法是什麼?", "question": "正確的做法是什麼?", "options": [{"letter": "A", "text": "加上 `--batch` 旗標:`claude --batch \"Analyze this pull request for security issues\"`。", "correct": false}, {"letter": "B", "text": "加上 `-p` 旗標:`claude -p \"Analyze this pull request for security issues\"`。", "correct": true}, {"letter": "C", "text": "將 stdin 從 `/dev/null` 重新導向:`claude \"Analyze this pull request for security issues\" < /dev/null`。", "correct": false}, {"letter": "D", "text": "在執行指令前設定環境變數 `CLAUDE_HEADLESS=true`。", "correct": false}], "correct": "B", "explanation": "`-p`(或 `--print`)旗標是以非互動方式執行 Claude Code 的官方記載做法。它會處理提示、將結果印至 stdout,並在不等待使用者輸入的情況下結束——非常適合 CI/CD 管線。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 27, "situation": "一個 pull request 變更了庫存追蹤模組中的 14 個檔案。將所有檔案一起分析的單遍審查產生了不一致的結果:對某些檔案有詳細回饋,對其他檔案卻只有膚淺的留言,漏掉了明顯的 bug,還出現矛盾的回饋(某個模式在一個檔案被標記,但同一個 PR 中另一個檔案的相同程式碼卻被核可)。你應該如何重新建構這個審查?", "question": "你應該如何重新建構這個審查?", "options": [{"letter": "A", "text": "執行三次獨立的全 PR 審查遍次,只標記在三次執行中至少出現兩次的問題。", "correct": false}, {"letter": "B", "text": "拆分成專注的遍次:逐一審查每個檔案的局部問題,然後執行另一個以整合為導向的遍次,檢查跨檔案的資料流。", "correct": true}, {"letter": "C", "text": "要求開發者在執行自動化審查前,先將大型 PR 拆分成 3~4 個檔案的較小提交。", "correct": false}, {"letter": "D", "text": "改用具有更大上下文視窗的較大模型,讓它能在單一遍次中對全部 14 個檔案投入足夠的注意力。", "correct": false}], "correct": "B", "explanation": "專注的逐檔案遍次透過確保一致的深度與可靠的局部問題偵測,解決了根本原因——注意力稀釋。接著,另一個以整合為導向的遍次則涵蓋跨檔案的考量,例如相依性與資料流的互動。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 28, "situation": "你的自動化程式碼審查平均每個 pull request 產出 15 項發現,而開發人員回報有 40% 的誤報率。瓶頸在於調查時間:開發人員必須點進每一項發現,閱讀 Claude 的理由說明,才能決定要修正還是駁回。你的 CLAUDE.md 已經包含可接受模式的完整規則,而且利害關係人否決了任何在開發人員看到發現之前就先過濾的做法。哪一項變更最能解決調查時間的問題?", "question": "哪一項變更最能解決調查時間的問題?", "options": [{"letter": "A", "text": "要求 Claude 直接在每一項發現中附上其理由說明與信心估計值。", "correct": true}, {"letter": "B", "text": "加入一個後處理器,分析發現的模式,並自動抑制那些符合歷史誤報特徵的發現。", "correct": false}, {"letter": "C", "text": "將發現分類為「阻擋性問題」與「建議」,並依層級設定不同的審查要求。", "correct": false}, {"letter": "D", "text": "設定 Claude 只顯示高信心的發現,在開發人員看到之前先過濾掉不確定的標記。", "correct": false}], "correct": "A", "explanation": "在每一項發現中直接附上理由說明與信心,可讓開發人員快速分流而不必逐項點開,進而減少調查時間。它滿足「不過濾」的限制條件,因為所有發現都仍然可見,同時加速了開發人員的決策。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 29, "situation": "對你的自動化程式碼審查所做的分析顯示,不同發現類別之間的誤報率差異很大:安全性/正確性發現有 8% 誤報,效能發現 18%,風格/命名發現 52%,而文件發現 48%。開發人員調查顯示不信任感日益升高——許多人開始連看都不看就駁回發現,因為「有一半都是錯的」。高誤報的類別侵蝕了人們對準確類別的信任。哪一種做法最能恢復開發人員的信任,同時改善整個系統?", "question": "哪一種做法最能恢復開發人員的信任?", "options": [{"letter": "A", "text": "暫時停用高誤報類別(風格、命名、文件),只保留高精準度的類別,同時改善提示。", "correct": true}, {"letter": "B", "text": "保持所有類別啟用,但在每一項發現旁顯示信心分數,讓開發人員自行決定要調查哪些。", "correct": false}, {"letter": "C", "text": "保持所有類別啟用,並在接下來幾週內加入少樣本範例,以提升各類別的準確度。", "correct": false}, {"letter": "D", "text": "對所有類別套用一致的嚴格度調降,使整體誤報率下降。", "correct": false}], "correct": "A", "explanation": "暫時停用高誤報類別,能立即透過移除那些導致開發人員一律駁回的雜訊發現,來阻止信任的侵蝕,同時保留安全性與正確性等高精準度類別所帶來的價值。它也為在重新啟用之前改善問題類別的提示創造了空間。"}, {"scenario": "用於持續整合的 Claude Code", "global_n": 30, "situation": "你的團隊想要降低自動化分析的 API 成本。目前,同步的 Claude 呼叫支援兩種工作流程:(1) 一個阻擋式的合併前檢查,必須在開發人員能夠合併之前完成;以及 (2) 一份在夜間產生、供隔天早上審閱的技術債報告。你的經理提議將兩者都改用 Message Batches API 以節省 50%。你應該如何評估這項提議?", "question": "你應該如何評估這項提議?", "options": [{"letter": "A", "text": "將兩者都改用批次處理,並在批次耗時過久時回退到同步呼叫。", "correct": false}, {"letter": "B", "text": "將兩種工作流程都改用批次處理,並以狀態輪詢來確認完成。", "correct": false}, {"letter": "C", "text": "只對技術債報告使用批次處理;合併前檢查則保留同步呼叫。", "correct": true}, {"letter": "D", "text": "兩種工作流程都保留同步呼叫,以避免批次結果排序的問題。", "correct": false}], "correct": "C", "explanation": "Message Batches API 的處理最長可能需要 24 小時,且沒有延遲 SLA,這對夜間的技術債報告是可接受的,但對開發人員必須等待的阻擋式合併前檢查則無法接受。這做法依據延遲需求,將每種工作流程對應到正確的 API。"}, {"scenario": "使用 Claude Code 生成程式碼", "global_n": 31, "situation": "你要求 Claude Code 實作一個函式,將 API 回應轉換成內部的正規化格式。經過兩次迭代後,輸出結構仍然不符合預期——有些欄位的巢狀方式不同,而時間戳記的格式也不正確。你以散文 itHub 存取 token。你希望團隊間擁有一致的工具,同時不將憑證提交到版本控制中。", "question": "哪種設定做法最有效?", "options": [{"letter": "A", "text": "讓每位開發人員透過 `claude mcp add --scope user` 在使用者範圍中新增該伺服器。", "correct": false}, {"letter": "B", "text": "建立一個 MCP 伺服器包裝層,從 `.env` 檔案讀取 token 並代理 GitHub API 呼叫,然後將該包裝層加入專案的 `.mcp.json`。", "correct": false}, {"letter": "C", "text": "將伺服器加入專案的 `.mcp.json`,使用環境變數替換(`${GITHUB_TOKEN}`)進行驗證,並在專案 README 中說明所需的環境變數。", "correct": true}, {"letter": "D", "text": "在專案範圍中以佔位 token 設定伺服器,然後告知開發人員在其本機設定中覆寫它。", "correct": false}], "correct": "C", "explanation": "採用環境變數替換的專案 `.mcp.json` 是慣用做法:它為 MCP 設定提供單一、受版本控制的真實來源,同時讓每位開發人員透過環境變數提供憑證。說明該變數可讓新人上手變得容易,而無須提交機密。"}, {"scenario": "使用 Claude Code 生成程式碼", "global_n": 45, "situation": "你正在一個 120 個檔案的程式碼庫中,為外部 API 呼叫加上錯誤處理包裝層。這項工作分為三個階段:(1)找出所有呼叫點與模式,(2)協同設計錯誤處理方法,(3)一致地實作包裝層。在第 1 階段,Claude 產生了大量輸出,列出數百個帶有上下文的呼叫點,在探索完成前就迅速填滿了上下文視窗。", "question": "哪種做法最能有效完成任務,同時維持實作一致性?", "options": [{"letter": "A", "text": "在第 1 階段使用 Explore 子代理,以隔離冗長的探索輸出並回傳摘要,然後在主對話中繼續進行第 2–3 階段。", "correct": true}, {"letter": "B", "text": "在主對話中執行所有階段,逐步處理檔案時定期使用 `/compact` 來降低上下文用量。", "correct": false}, {"letter": "C", "text": "切換到無頭模式並使用 `--continue`,在批次呼叫之間傳遞明確的上下文摘要以維持連續性。", "correct": false}, {"letter": "D", "text": "在 CLAUDE.md 中定義錯誤處理模式,然後跨多個工作階段分批處理檔案,依賴共用的記憶檔案來維持一致性。", "correct": false}], "correct": "A", "explanation": "Explore 子代理會將冗長的探索輸出隔離在獨立的上下文中,只回傳精簡的摘要給主對話。這保留了主上下文視窗,供協同設計與一致實作這兩個最需要保留上下文的階段使用。"}, {"scenario": "客戶支援代理", "global_n": 46, "situation": "在測試時,你注意到當使用者詢問訂單狀態時,代理經常呼叫 `get_customer`,即使 `lookup_order` 會更適合。為了解決這個問題,你應該先檢查什麼?", "question": "你應該先檢查什麼?", "options": [{"letter": "A", "text": "實作一個前置處理分類器,以偵測與訂單相關的請求並將其直接路由到 `lookup_order`。", "correct": false}, {"letter": "B", "text": "減少代理可用的工具數量,以簡化選擇。", "correct": false}, {"letter": "C", "text": "在系統提示中加入少樣本範例,涵蓋所有可能的訂單請求模式,以改善工具選擇。", "correct": false}, {"letter": "D", "text": "檢查工具描述,確保它們清楚區分每個工具的用途。", "correct": true}], "correct": "D", "explanation": "工具描述是模型用來決定要呼叫哪個工具的主要輸入。當代理持續挑選錯誤的工具時,第一個診斷步驟就是驗證工具描述是否清楚劃分每個工具的用途與使用界線。"}, {"scenario": "客戶支援代理", "global_n": 47, "situation": "你的代理在處理單一問題的請求時準確率達 94%(例如「我需要為訂單 #1234 退款」)。但當客戶在一則訊息中包含多個問題時(例如「我需要為訂單 #1234 退款,同時也想更新訂單 #5678 的寄送地址」),工具選擇準確率降至 58%。代理通常只解決一個問題,或在不同請求間混用參數。哪種做法最能有效提升多問題請求的可靠性?", "question": "哪種做法最有效?", "options": [{"letter": "A", "text": "實作一個前置處理層,使用另一次獨立的模型呼叫,將多問題訊息分解為各自獨立的請求,各自獨立處理後再合併結果。", "correct": false}, {"letter": "B", "text": "將相關的工具合併為較少的通用工具。", "correct": false}, {"letter": "C", "text": "在提示中加入少樣本範例,示範多問題請求的正確推理與工具呼叫順序。", "correct": true}, {"letter": "D", "text": "實作回應驗證,偵測不完整的答案並自動重新提示代理以解決遺漏的問題。", "correct": false}], "correct": "C", "explanation": "示範多問題請求正確推理與工具呼叫順序的少樣本範例最為有效,因為代理在單一問題上已表現良好——它所需要的是分解並路由多個問題、並保持參數分離的模式指引。"}, {"scenario": "客戶支援代理", "global_n": 48, "situation": "正式環境日誌顯示,對於像「為訂單 #1234 退款」這類簡單請求,你的代理以 3–4 次工具呼叫解決問題,成功率達 91%。但對於像「我被重複扣款、我的折扣沒有套用,而且我想取消」這類複雜請求,代理平均需要 12 次以上的工具呼叫,成功率僅 54%——往往是逐一依序調查各問題,並為每個問題重複擷取相同的客戶資料。哪種變更最能有效改善複雜請求的處理?", "question": "哪種變更最有效?", "options": [{"letter": "A", "text": "在各階段之間加入明確的驗證檢查點,要求代理在解決每個問題後先記錄進度,再進行下一個。", "correct": false}, {"letter": "B", "text": "透過將 `get_customer`、`lookup_order` 與計費相關工具合併為單一的 `investigate_issue` 工具,減少工具數量。", "correct": false}, {"letter": "C", "text": "將請求分解為各自獨立的問題,然後利用共用的客戶上下文平行調查每一個,再綜合出最終的解決方案。", "correct": true}, {"letter": "D", "text": "在系統提示中加入少樣本範例,示範各種多面向計費情境的理想工具呼叫順序。", "correct": false}], "correct": "C", "explanation": "分解為各自獨立的問題並以共用客戶上下文平行調查,能修正兩個關鍵問題:它透過在各問題間重複使用共用上下文,消除了重複的資料擷取;並透過在綜合單一解決方案前平行化調查,減少了工具呼叫的總迴圈次數。"}, {"scenario": "客戶支援代理", "global_n": 49, "situation": "你的代理達到 55% 的首次接觸解決率,遠低於 80% 的目標。日誌顯示它把簡單案例(附照片佐證的受損商品標準換貨)升級,卻試圖自主處理需要政策例外的複雜情況。改善升級校準最有效的方式是什麼?", "question": "改善升級校準最有效的方式是什麼?", "options": [{"letter": "A", "text": "要求代理在每次回應前以 1–10 分自評信心,並在信心低於某個門檻時自動轉交真人。", "correct": false}, {"letter": "B", "text": "部署一個以歷史工單訓練的獨立分類器模型,在主代理開始處理前先預測哪些請求需要升級。", "correct": false}, {"letter": "C", "text": "在系統提示中加入明確的升級準則,並附上少樣本範例,說明何時該升級、何時該自主解決。", "correct": true}, {"letter": "D", "text": "實作情緒分析以判斷客戶的不滿程度,並在超過某個負面情緒門檻時自動升級。", "correct": false}], "correct": "C", "explanation": "帶有少樣本範例的明確升級準則直接針對根本原因——簡單與複雜案例之間不清楚的決策邊界。它是最相稱、最有效的首要介入手段,能在不增加額外基礎設施的情況下,教會代理何時該升級、何時該自主解決。"}, {"scenario": "客戶支援代理", "global_n": 50, "situation": "在呼叫 `get_customer` 與 `lookup_order` 之後,代理已取得所有可用的系統資料,但仍面臨不確定性。哪一種情況最有正當理由觸發呼叫 `escalate_to_human`?", "question": "哪一種情況最有正當理由升級?", "options": [{"letter": "A", "text": "客戶想取消一筆昨天出貨、明天就會送達的訂單。代理應該升級,因為客戶在收到包裹後可能會改變心意。", "correct": false}, {"letter": "B", "text": "客戶聲稱自己沒有收到訂單,但追蹤紀錄顯示三天前已送達其地址並有簽收。代理應該升級,因為提出相互矛盾的證據可能損害客戶關係。", "correct": false}, {"letter": "C", "text": "客戶要求比照競爭對手的價格。你的政策允許在 14 天內針對自家網站的降價做價格調整,但對競爭對手的價格隻字未提。代理應該升級以進行政策解讀。", "correct": true}, {"letter": "D", "text": "客戶訊息同時包含一個帳單問題與一筆商品退貨。代理應該升級,讓真人在一次互動中協調這兩個議題。", "correct": false}], "correct": "C", "explanation": "這是一個真正的政策缺口:公司規則涵蓋自家網站的降價,但並未處理比照競爭對手價格的情形。代理絕不能自行發明政策,而應升級,讓真人判斷如何解讀或延伸既有規則。"}, {"scenario": "客戶支援代理", "global_n": 51, "situation": "正式環境日誌顯示,在 12% 的案例中,你的代理跳過 `get_customer`,僅憑客戶提供的姓名直接呼叫 `lookup_order`,有時導致帳戶辨識錯誤與退款錯誤。哪一項變更最能有效修正這個可靠性問題?", "question": "哪一項變更最有效?", "options": [{"letter": "A", "text": "加入少樣本範例,示範代理一律先呼叫 `get_customer`,即使客戶主動提供了訂單細節也一樣。", "correct": false}, {"letter": "B", "text": "實作一個路由分類器,分析每個請求,並只啟用適合該請求類型的工具子集。", "correct": false}, {"letter": "C", "text": "加入一個程式化的前置條件,在 `get_customer` 回傳經驗證的客戶識別碼之前,阻擋 `lookup_order` 與 `process_refund`。", "correct": true}, {"letter": "D", "text": "強化系統提示,聲明在任何訂單操作之前都必須透過 `get_customer` 進行客戶驗證。", "correct": false}], "correct": "C", "explanation": "程式化的前置條件提供了確定性的保證,確保遵循必要的執行順序。它是最有效的做法,因為無論 LLM 行為如何,都能消除跳過驗證的可能性。"}, {"scenario": "客戶支援代理", "global_n": 52, "situation": "正式環境指標顯示,在處理複雜的帳單爭議或多筆訂單退貨時,客戶滿意度分數比簡單案例低 15%——即使解決方案在技術上是正確的。根因分析顯示代理提供了正確的解決方案,但在說明理由時前後不一致:有時省略相關的政策細節,有時遺漏時程資訊或後續步驟。具體的上下文缺口因案例而異。你想在不增加人工監督的前提下改善解決方案品質。哪一種做法最有效?", "question": "哪一種做法最有效?", "options": [{"letter": "A", "text": "加入一個自我批判階段,讓代理評估草稿回應的完整性——確保它解決了客戶的問題、包含相關上下文,並預先設想後續問題。", "correct": true}, {"letter": "B", "text": "加入一個確認階段,讓代理在結案前詢問「這是否已完全解決你的問題?」,讓客戶在需要時可以要求額外資訊。", "correct": false}, {"letter": "C", "text": "針對複雜案例,將模型從 Haiku 升級到 Sonnet,並依據定義好的複雜度指標進行路由。", "correct": false}, {"letter": "D", "text": "在系統提示中實作少樣本範例,針對五種常見的複雜案例類型展示完整說明,示範如何納入政策上下文、時程與後續步驟。", "correct": false}], "correct": "A", "explanation": "自我批判階段(評估者—最佳化者模式)直接針對說明完整性不一致的問題,強迫代理在呈現草稿前,依照具體準則——例如政策上下文、時程與後續步驟——評估自己的草稿。這能在不需人工監督的情況下,捕捉到因案例而異的缺口。"}, {"scenario": "客戶支援代理", "global_n": 53, "situation": "正式環境指標顯示你的代理平均每次解決需要 4 次以上的 API 迴圈。分析發現,即使一開始就同時需要 `get_customer` 與 `lookup_order`,Claude 往往仍在分開的連續輪次中分別請求這兩者。減少迴圈數量最有效的方式是什麼?", "question": "減少迴圈最有效的方式是什麼?", "options": [{"letter": "A", "text": "實作推測性執行,自動與任何被請求的工具平行呼叫可能需要的工具,並回傳所有結果,無論實際請求的是什麼。", "correct": false}, {"letter": "B", "text": "提高 `max_tokens`,給 Claude 更多空間進行規劃並自然地合併工具請求。", "correct": false}, {"letter": "C", "text": "建立像 `get_customer_with_orders` 這樣的複合工具,將常見的查詢組合捆綁成單次呼叫。", "correct": false}, {"letter": "D", "text": "在提示中指示 Claude 把工具請求捆綁進單一輪次,並在下一次 API 呼叫前一併回傳所有結果。", "correct": true}], "correct": "D", "explanation": "提示 Claude 將相關的工具請求捆綁進單一輪次,善用了它一次請求多個工具的原生能力。它以最小的架構變更直接修正了連續呼叫的模式。"}, {"scenario": "客戶支援代理", "global_n": 54, "situation": "正式環境日誌顯示一種模式:客戶引用特定金額(例如「我先前提到的 15% 折扣」),但代理卻以錯誤的數值回應。調查發現這些細節是在 20 多輪以前提到的,並被濃縮成像「曾討論過促銷定價」這類含糊的摘要。哪一項修正最有效?", "question": "哪一項修正最有效?", "options": [{"letter": "A", "text": "將摘要門檻從 70% 提高到 85%,讓對話在觸發摘要之前有更多空間。", "correct": false}, {"letter": "B", "text": "將完整的對話歷史儲存在外部儲存中,並在代理偵測到像「如我先前所提」這類引用時實作檢索。", "correct": false}, {"letter": "C", "text": "將交易性事實(金額、日期、訂單編號)擷取到一個持續性的「案例事實」區塊,於每則提示中納入,且置於摘要過的歷史之外。", "correct": true}, {"letter": "D", "text": "修改摘要提示,明確要求逐字保留所有數字、百分比、日期與客戶陳述的期望。", "correct": false}], "correct": "C", "explanation": "摘要本質上會遺失精確的細節。將交易性事實擷取到摘要過的歷史之外的一個結構化「案例事實」區塊,能保留關鍵資訊,使其無論已摘要了多少輪次,都能在每則提示中可靠地取用。"}, {"scenario": "客戶支援代理", "global_n": 55, "situation": "你的 `get_customer` 工具在以姓名搜尋時會回傳所有相符項目。目前當有多筆結果時,Claude 會挑選最近有訂單的客戶,但正式環境資料顯示,對於不明確的相符項目,這種做法有 15% 的機率選錯帳戶。你該如何處理這個問題?", "question": "你該如何處理這個問題?", "options": [{"letter": "A", "text": "實作一套信心評分系統,在信心高於 85% 時自主行動,低於門檻時則要求澄清。", "correct": false}, {"letter": "B", "text": "指示 Claude 在 `get_customer` 回傳多筆相符項目時,於採取任何客戶專屬動作之前,先要求一個額外的識別資訊(電子郵件、電話或訂單編號)。", "correct": true}, {"letter": "C", "text": "修改 `get_customer`,使其依據排序演算法只回傳單一最可能的相符項目,藉此消除不明確性。", "correct": false}, {"letter": "D", "text": "在提示中加入少樣本範例,針對不明確的相符項目示範正確的推理與工具排序。", "correct": false}], "correct": "B", "explanation": "向使用者詢問額外的識別資訊是化解不明確性最可靠的方式,因為使用者對自己的身分擁有確定的認知。多一次對話輪次,是消除因選錯帳戶而造成的 15% 錯誤率的微小代價。"}, {"scenario": "客戶支援代理", "global_n": 56, "situation": "正式環境日誌顯示一個固定模式:當客戶在訊息中包含「account」這個字（例如「I want to check my account for an order I made yesterday」）時,代理有 78% 的機率會先呼叫 `get_customer`。當客戶以不含「account」的方式提出類似請求(例如「I want to check an order I made yesterday」)時,則有 93% 的機率會先呼叫 `lookup_order`。工具描述清楚且毫不含糊。這個差異最可能的根本原因是什麼?", "question": "最可能的根本原因是什麼?", "options": [{"letter": "A", "text": "系統提示包含對關鍵字敏感的指令,會根據「account」之類的詞彙引導行為,造成非預期的工具選擇模式。", "correct": true}, {"letter": "B", "text": "模型的基礎訓練在「account」術語與客戶相關操作之間建立了關聯,凌駕於工具描述之上。", "correct": false}, {"letter": "C", "text": "模型需要更多關於多概念訊息的訓練資料,並應以同時包含 account 與 order 術語的範例進行微調。", "correct": false}, {"letter": "D", "text": "工具描述需要額外的負面範例,明確指出何時「不該」使用各工具,以防止這種由關鍵字引發的混淆。", "correct": false}], "correct": "A", "explanation": "這種有系統、由關鍵字驅動的模式(78% 對 93%)強烈顯示系統提示中存在明確的路由邏輯,會對「account」這個字產生反應並將代理引導至客戶相關工具。由於工具描述本就清楚,這個差異指向提示層級的指令造成了非預期的行為引導。"}, {"scenario": "客戶支援代理", "global_n": 57, "situation": "正式環境日誌顯示,當使用者詢問訂單時(例如「check my order #12345」),代理經常呼叫 `get_customer` 而非呼叫 `lookup_order`。兩個工具都只有極簡描述(「Gets customer information」/「Gets order details」),且接受外觀相似的識別碼格式。要提升工具選擇可靠性,最有效的第一步是什麼?", "question": "最有效的第一步是什麼?", "options": [{"letter": "A", "text": "實作一個路由層,在每一輪之前分析使用者輸入,並根據偵測到的關鍵字與 ID 模式預先選定正確的工具。", "correct": false}, {"letter": "B", "text": "將兩個工具合併為單一的 `lookup_entity`,接受任何識別碼並在內部決定要查詢哪個後端。", "correct": false}, {"letter": "C", "text": "在系統提示中加入少樣本範例以示範正確的工具選擇模式,以 5–8 個範例將訂單相關查詢路由至 `lookup_order`。", "correct": false}, {"letter": "D", "text": "擴充每個工具的描述,納入輸入格式、範例查詢、邊界案例,以及說明何時該使用它而非類似工具的界線。", "correct": true}], "correct": "D", "explanation": "以輸入格式、範例查詢、邊界案例與清楚界線來擴充工具描述,直接修正了根本原因——極簡的描述無法提供足夠資訊讓 LLM 區分相似的工具。這是一個低投入、高影響的第一步,能改善 LLM 用於工具選擇的主要機制。"}, {"scenario": "客戶支援代理", "global_n": 58, "situation": "你正在為你的支援代理實作代理迴圈。在每次 Claude API 呼叫之後,你必須決定要繼續迴圈(執行所請求的工具並再次呼叫 Claude)或停止(向客戶呈現最終答案)。是什麼決定了這個判斷?", "question": "是什麼決定了這個判斷?", "options": [{"letter": "A", "text": "檢查 Claude 回應中的 `stop_reason` 欄位——若為 `tool_use` 則繼續,若為 `end_turn` 則停止。", "correct": true}, {"letter": "B", "text": "解析 Claude 的文字,尋找「I’m done」或「Can I help with anything else?」之類的片語——自然語言訊號代表任務完成。", "correct": false}, {"letter": "C", "text": "設定最大迭代次數(例如 10 次呼叫),達到上限即停止,無論 Claude 是否表示還需要更多工作。", "correct": false}, {"letter": "D", "text": "檢查回應是否包含 assistant 文字內容——若 Claude 產生了說明性文字,迴圈就應該終止。", "correct": false}], "correct": "A", "explanation": "`stop_reason` 是 Claude 用於迴圈控制的明確結構化訊號:`tool_use` 表示 Claude 想執行工具並取回結果,而 `end_turn` 表示 Claude 已完成其回應,迴圈應該結束。"}, {"scenario": "客戶支援代理", "global_n": 59, "situation": "正式環境日誌顯示代理會誤解你的 MCP 工具輸出:來自 `get_customer` 的 Unix 時間戳記、來自 `lookup_order` 的 ISO 8601 日期,以及數字狀態碼(1=pending、2=shipped)。有些工具是你無法修改的第三方 MCP 伺服器。哪一種資料格式正規化的方法最易於維護?", "question": "哪一種方法最易於維護?", "options": [{"letter": "A", "text": "使用 PostToolUse hook 攔截工具輸出,並在代理處理之前套用格式轉換。", "correct": true}, {"letter": "B", "text": "修改你能控制的工具使其回傳人類可讀的格式,並為第三方工具建立包裝層。", "correct": false}, {"letter": "C", "text": "建立一個 `normalize_data` 工具,讓代理在每次資料擷取後呼叫它來轉換數值。", "correct": false}, {"letter": "D", "text": "在系統提示中加入詳細的格式文件,說明每個工具的資料慣例。", "correct": false}], "correct": "A", "explanation": "PostToolUse hook 提供一個集中、確定性的攔截點,可在代理處理之前正規化所有工具輸出——包括第三方 MCP 伺服器的資料。它更易於維護,因為轉換存在於程式碼中並一致地套用,而非仰賴 LLM 的解讀。"}, {"scenario": "客戶支援代理", "global_n": 60, "situation": "正式環境日誌顯示,代理有時會在 `lookup_order` 更為合適時選擇 `get_customer`,尤其是在「I need help with my recent purchase.」這類模糊的查詢上。你決定在系統提示中加入少樣本範例以改善工具選擇。哪一種方法最能有效解決問題?", "question": "哪一種方法最有效?", "options": [{"letter": "A", "text": "在每個工具描述中加入明確的「use when」與「don’t use when」指引,涵蓋模糊的情況。", "correct": false}, {"letter": "B", "text": "加入依工具分組的範例——所有 `get_customer` 情境放在一起,接著是所有 `lookup_order` 情境。", "correct": false}, {"letter": "C", "text": "加入 4–6 個針對模糊情境的範例,每個都附上為何選擇某工具而非其他合理替代方案的理由。", "correct": true}, {"letter": "D", "text": "加入 10–15 個清楚、毫不含糊的請求範例,為每個工具示範典型情境下的正確工具選擇。", "correct": false}], "correct": "C", "explanation": "將少樣本範例針對實際發生錯誤的特定模糊情境,並明確說明為何某工具優於替代方案,能教會模型在邊界案例中所需的比較式決策過程。這比通用範例或宣告式規則更為有效。"}, {"scenario": "對話式 AI 架構模式", "global_n": 61, "situation": "你的 `remove_team_member` 工具使用 `dry_run: boolean` 參數,在執行前預覽影響。正式環境監控顯示代理會直接以 `dry_run=false` 呼叫,藉此略過預覽步驟。你需要確保每一次移除都先經過使用者明確確認的預覽。", "question": "最可靠的方法是什麼?", "options": [{"letter": "A", "text": "加入伺服器端驗證,僅當過去 60 秒內曾發生過具有相同參數的 `dry_run=true` 呼叫時,才允許 `dry_run=false`。", "correct": false}, {"letter": "B", "text": "將該工具標註為需要確認,並設定編排層,在將任何呼叫轉送至被標註的工具之前,先提示使用者核准。", "correct": false}, {"letter": "C", "text": "在工具描述中加入詳細指令與少樣本範例,要求代理一律先以 `dry_run=true` 呼叫,並等待使用者確認後才再次呼叫。", "correct": false}, {"letter": "D", "text": "改用兩個工具:`preview_remove_member` 回傳影響細節與一個一次性的確認 token;`execute_remove_member` 則需要該 token,將執行綁定至預覽。", "correct": true}], "correct": "D", "explanation": "兩工具的 token 綁定方法在架構上讓人無法在未先預覽的情況下執行——execute 工具確實需要一個只有 preview 工具才能產生的 token。這是唯一在程式碼層級強制執行此約束的方法,而非仰賴 LLM 遵守指令(C)、時間啟發式(A)或編排基礎設施(B)。"}, {"scenario": "對話式 AI 架構模式", "global_n": 62, "situation": "正式環境監控顯示你的 `search_catalog` 工具有 12% 的時間會失敗:其中 8% 是重試後會成功的網路逾時,4% 則是無論如何重試都不會成功的查詢語法錯誤。目前兩種錯誤類型的回傳方式完全相同,導致無謂的重試。", "question": "你應該如何修改該工具的錯誤處理?", "options": [{"letter": "A", "text": "在你的系統提示中加入少樣本範例,示範如何區分網路錯誤與語法錯誤。", "correct": false}, {"letter": "B", "text": "對所有錯誤一致地套用指數退避重試邏輯。", "correct": false}, {"letter": "C", "text": "在工具內部對網路逾時實作帶退避的自動重試;對語法錯誤則立即回傳並附上參數驗證細節。", "correct": true}, {"letter": "D", "text": "為所有錯誤回傳一個 `retryable` 布林旗標與錯誤類型細節。", "correct": false}], "correct": "C", "explanation": "在工具層級處理暫時性錯誤的重試是正確的抽象界線——工具對錯誤類型有確切的認知,且能實作確定性的重試邏輯,而不必仰賴代理解讀旗標(D)或遵循提示層級的指令(A)。一致的退避(B)會在永遠不會成功的語法錯誤上浪費時間。"}, {"scenario": "對話式 AI 架構模式", "global_n": 63, "situation": "在討論投資策略的數輪對話中,某位使用者先表示「我的風險承受度非常低」,後來又說「我想要讓報酬最大化」。他們現在問:「我應該投資什麼?」", "question": "哪種做法最能確保建議符合使用者真正的優先考量?", "options": [{"letter": "A", "text": "點出這項矛盾,並請使用者釐清何者更重要。", "correct": true}, {"letter": "B", "text": "針對兩種情境分別提供建議。", "correct": false}, {"letter": "C", "text": "以最近一次陳述的偏好繼續進行。", "correct": false}, {"letter": "D", "text": "在不處理衝突的情況下,推薦一個平衡型投資組合。", "correct": false}], "correct": "A", "explanation": "當使用者偏好彼此直接矛盾時,點出衝突並請求釐清是唯一能保證建議符合使用者真實意圖的方式。任何其他做法都涉及一項可能錯誤的假設——報酬最大化與低風險承受度是本質上不相容的目標,需要由真人做出決定。"}, {"scenario": "對話式 AI 架構模式", "global_n": 64, "situation": "使用者在多輪對話中逐步調整播放清單偏好。在某位使用者說「我愛爵士樂」後的兩則訊息,Claude 卻問「你喜歡哪些曲風?」", "question": "最可能的原因為何?", "options": [{"letter": "A", "text": "Claude 需要連接向量資料庫才能維持對話記憶。", "correct": false}, {"letter": "B", "text": "已超出模型的上下文視窗。", "correct": false}, {"letter": "C", "text": "Claude API 需要一個 `session_id` 參數。", "correct": false}, {"letter": "D", "text": "你的應用程式沒有把先前的訊息納入 `messages` 陣列。", "correct": true}], "correct": "D", "explanation": "Claude 沒有伺服器端記憶——每次 API 呼叫都是無狀態的。若未在每個請求的 `messages` 陣列中納入完整的對話歷史,Claude 就無從得知先前的輪次。向量資料庫(A)與 `session_id`(C)都不是 Claude 架構的一部分;對於只有兩則訊息的往來而言,上下文視窗溢位(B)是不可能發生的。"}, {"scenario": "對話式 AI 架構模式", "global_n": 65, "situation": "在一場 40 分鐘的烹飪工作階段後,對話達到 78,000 個 tokens。歷史內容包含過敏資訊、食譜份量縮放、已釐清的烹飪術語,以及一般討論。你必須在保留重要資訊的同時減少 tokens。", "question": "哪種做法最能在保留資訊與減少 token 之間取得平衡?", "options": [{"letter": "A", "text": "摘要整段對話歷史。", "correct": false}, {"letter": "B", "text": "只保留最近的 20,000 個 tokens。", "correct": false}, {"letter": "C", "text": "擷取關鍵的結構化資料(過敏資訊、數量、偏好),摘要一般討論,並逐字保留近期的往來。", "correct": true}, {"letter": "D", "text": "將完整對話儲存於外部,並透過語意搜尋擷取相關部分。", "correct": false}], "correct": "C", "explanation": "混合式做法以最低成本保留最高價值的資訊。像過敏資訊與食譜數量這類關鍵事實會被擷取進一個精簡的結構化區塊(避免摘要過程中發生的精確度損失),一般討論則加以摘要,而近期的往來則逐字保留以維持對話連貫性。選項 A 與 B 有遺失關鍵飲食資訊的風險;D 對於單一一場烹飪工作階段而言則是架構上的過度設計。"}, {"scenario": "對話式 AI 架構模式", "global_n": 66, "situation": "使用者回報,在較長的對話中,助理會弄丟對先前主題與偏好的掌握。你目前的實作只保留最後 25 組訊息對。", "question": "最有效的解決方案為何?", "options": [{"letter": "A", "text": "混合式做法:摘要較舊的訊息,同時逐字保留近期的訊息。", "correct": true}, {"letter": "B", "text": "在完整對話歷史上進行向量相似度搜尋。", "correct": false}, {"letter": "C", "text": "將視窗增加到 50 組訊息對。", "correct": false}, {"letter": "D", "text": "每輪都摘要被捨棄的訊息,並把持續累積的摘要前置加入。", "correct": false}], "correct": "A", "explanation": "混合式做法同時處理問題的兩個面向:保留精確的近期上下文(對對話連貫性至關重要),同時維持對較早偏好的壓縮表示(避免在捨棄訊息對時造成全面遺失)。增加視窗(C)只是把同樣的問題往後延。向量搜尋(B)可能漏掉與目前查詢在語意上不相似、卻很重要的上下文。每輪完整摘要(D)會增加額外負擔,並累積摘要誤差。"}, {"scenario": "對話式 AI 架構模式", "global_n": 67, "situation": "使用者回報,當對話超過 50 輪時,延遲會增加且成本會上升。", "question": "主要原因為何?", "options": [{"letter": "A", "text": "每次 API 請求都會納入整段對話歷史。", "correct": true}, {"letter": "B", "text": "模型產生的回應逐漸變長。", "correct": false}, {"letter": "C", "text": "隨著歷史增長,資料庫操作變慢。", "correct": false}, {"letter": "D", "text": "模型建立一份內部使用者檔案,需要更多處理。", "correct": false}], "correct": "A", "explanation": "Claude 的 API 完全是無狀態的——每個請求都必須在 `messages` 陣列中納入完整的對話歷史。隨著對話增長,每個請求都會攜帶更多 tokens,這直接增加了處理延遲與成本。模型不會在呼叫之間維持任何內部狀態(D 為假),而回應長度本質上也與對話長度無關(B)。"}, {"scenario": "對話式 AI 架構模式", "global_n": 68, "situation": "經過三個月的每週工作階段後,對話歷史增長到 85,000 個 tokens。當使用者問「我們對於孤立這個主題做出了什麼結論?」時,助理給出的是籠統的答案,而非引用先前的討論。", "question": "最有效的做法為何?", "options": [{"letter": "A", "text": "滾動視窗截斷。", "correct": false}, {"letter": "B", "text": "擷取關鍵結論的漸進式摘要。", "correct": false}, {"letter": "C", "text": "以語意嵌入搭配相關往來的擷取。", "correct": true}, {"letter": "D", "text": "加入結構化 XML 標籤來標記討論結論。", "correct": false}], "correct": "C", "explanation": "在對話歷史上進行語意搜尋,是唯一能擴展至三個月討論量、同時又能按需求呈現特定相關往來的做法。滾動視窗(A)會捨棄大部分的歷史。漸進式摘要(B)會把討論壓縮成抽象內容,而遺失使用者正在詢問的特定結論。XML 標籤(D)需要重新編排所有過往內容,且在此規模下無法解決擷取問題。"}, {"scenario": "對話式 AI 架構模式", "global_n": 69, "situation": "在 QA 測試期間,Claude 在前 10–15 輪會遵循系統提示的指引,但後續的回應卻有所偏離。對話仍在 token 上限之內。", "question": "最佳的解決方案為何?", "options": [{"letter": "A", "text": "把行為指引移到第一則使用者訊息中。", "correct": false}, {"letter": "B", "text": "在 20 輪後開始一段新對話。", "correct": false}, {"letter": "C", "text": "在對話的斷點處插入使用者角色的訊息以強化指引。", "correct": true}, {"letter": "D", "text": "使用回應後驗證來重新產生不符合規範的回應。", "correct": false}], "correct": "C", "explanation": "定期注入行為提醒,可在對話歷史累積時以固定間隔重新確立約束,直接對抗指令漂移。將指引移到第一則使用者訊息(A)會降低其權威性。開始一段新對話(B)會摧毀上下文。回應後驗證(D)屬於事後矯正而非事前預防,並會增加可觀的延遲。"}, {"scenario": "對話式 AI 架構模式", "global_n": 70, "situation": "你的 AI 家教有一段 2,800 token 的系統提示,用來定義教學方法與調適規則。在 12 輪之後,助理開始忽略熟練度等級。", "question": "最有效的修正方式是什麼?", "options": [{"letter": "A", "text": "每 4–5 輪注入一次提醒。", "correct": false}, {"letter": "B", "text": "以示範熟練度等級調適的少樣本範例取代冗長的規則。", "correct": true}, {"letter": "C", "text": "將關鍵規則放在系統提示的結尾。", "correct": false}, {"letter": "D", "text": "評估回應,若難度等級不符就重新產生。", "correct": false}], "correct": "B", "explanation": "一段帶有宣告式規則的 2,800 token 系統提示容易發生漂移,因為抽象規則需要模型在每一輪都對其進行推理。以具體的少樣本範例(示範正確的熟練度等級調適)取代冗長的規則,能給模型清楚的行為模式去比對——相較於抽象指令,這種做法在多輪對話中能被更可靠地遵循。注入提醒(A)有幫助,但只處理症狀;放在結尾(C)在初期有幫助,但無法解決逐輪累積的漂移;重新產生(D)成本高昂且屬於事後補救。"}, {"scenario": "對話式 AI 架構模式", "global_n": 71, "situation": "你的助理必須維持熱情的語氣、解釋其推理,並提出釐清問題。這些行為準則應該在哪裡定義?", "question": "這些行為準則應該在哪裡定義?", "options": [{"letter": "A", "text": "前置到每一則使用者訊息。", "correct": false}, {"letter": "B", "text": "在系統提示中。", "correct": true}, {"letter": "C", "text": "在第一則助理訊息中。", "correct": false}, {"letter": "D", "text": "在環境變數中。", "correct": false}], "correct": "B", "explanation": "系統提示專門設計用於整段對話中持續適用的行為約束與準則。前置到每一則使用者訊息(A)是多餘的額外負擔。第一則助理訊息(C)並不可靠,因為模型可能偏離它自己先前的陳述。環境變數(D)對模型行為沒有任何影響。"}, {"scenario": "對話式 AI 架構模式", "global_n": 72, "situation": "使用者回報回應開頭重複出現像「Certainly!」和「I'd be happy to help!」這樣的句子。", "question": "最有效的做法是什麼?", "options": [{"letter": "A", "text": "附加一則帶有直接回應開頭的部分助理訊息。", "correct": true}, {"letter": "B", "text": "調低 temperature 設定。", "correct": false}, {"letter": "C", "text": "後處理回應以移除問候語。", "correct": false}, {"letter": "D", "text": "在系統提示中加入指令以避免那些用語。", "correct": false}], "correct": "A", "explanation": "以直接答覆的開頭預填助理回應,可在產生階段就防止問候語模式——模型會從預填內容接續往下,而不是產生新的開頭用語。系統提示指令(D)有幫助,但較不可靠,因為模型仍可能產生變體。後處理(C)是脆弱的權宜之計。temperature(B)控制的是隨機性,而非特定的用語模式。"}, {"scenario": "對話式 AI 架構模式", "global_n": 73, "situation": "在使用者正在聊天時,一個 webhook 通知你的系統:該使用者的包裹已出貨。你希望助理在下一則回應中自然地把這項資訊納入。", "question": "最佳做法是什麼?", "options": [{"letter": "A", "text": "將出貨狀態加入系統提示。", "correct": false}, {"letter": "B", "text": "立即送出一則合成的使用者訊息。", "correct": false}, {"letter": "C", "text": "強制助理在每一輪都呼叫一個狀態工具。", "correct": false}, {"letter": "D", "text": "將狀態更新附加為下一則使用者訊息的前綴。", "correct": true}], "correct": "D", "explanation": "把狀態更新前綴到下一則使用者訊息,可在自然的對話邊界注入即時上下文,而不會打斷流程。修改系統提示(A)需要重建工作階段,或在架構上很麻煩。合成的使用者訊息(B)可能破壞自然的對話流程並混淆出處標註。強制每一輪都呼叫工具(C)在事件罕見時很浪費。"}, {"scenario": "對話式 AI 架構模式", "global_n": 74, "situation": "使用者經常送出像「幫派對訂一個場地」這樣的請求。助理會問 4 個以上的釐清問題,導致 35% 的放棄率。", "question": "哪種做法最能改善這個權衡取捨?", "options": [{"letter": "A", "text": "以隱藏的預設值逕行進行。", "correct": false}, {"letter": "B", "text": "在一則複合訊息中問完所有釐清問題。", "correct": false}, {"letter": "C", "text": "明確陳述假設並逕行進行,同時邀請使用者更正。", "correct": true}, {"letter": "D", "text": "使用結構化的填寫表單。", "correct": false}], "correct": "C", "explanation": "明確陳述假設並逕行進行,能立即給使用者一個有用的回應,同時保留他們更正錯誤假設的能力。隱藏的預設值(A)讓使用者不知道系統假設了什麼。複合式的問題清單(B)仍要求使用者預先付出心力。結構化表單(D)增加而非減少摩擦——與降低放棄率的目標相矛盾。"}, {"scenario": "對話式 AI 架構模式", "global_n": 75, "situation": "你的助理使用一段承包商人設的系統提示。前幾輪都遵循規則,但到了第 7 輪,助理開始給出籠統的建議。對話長度只有 2,500 token。", "question": "最可能的原因是什麼?", "options": [{"letter": "A", "text": "系統提示只建立初始行為。", "correct": false}, {"letter": "B", "text": "隨著輪數累積,模型注意力減弱。", "correct": false}, {"letter": "C", "text": "累積的助理回應稀釋了系統提示的影響力。", "correct": true}, {"letter": "D", "text": "系統提示只送出一次。", "correct": false}], "correct": "C", "explanation": "隨著助理回應在對話歷史中累積,反映系統提示行為約束的文字比例,相對於不斷增長的助理產生內容而下降。模型會越來越傾向比對自己先前的輸出,而非系統提示,即使在較短的 token 長度下也會加劇漂移。系統提示包含在每一次 API 呼叫中(就單獨解釋而言,D 是錯的),而模型注意力衰退(B)在 2,500 token 下並不會發生。"}, {"scenario": "對話式 AI 架構模式", "global_n": 76, "situation": "使用者提出像「你能幫忙處理那份報告嗎?」這樣模糊的請求。助理以提出多個問題作為回應(哪份報告?需要什麼幫助?截止期限?),導致 40% 的放棄率。", "question": "最佳解決方案是什麼?", "options": [{"letter": "A", "text": "做出合理的假設、明確陳述,並提議進行調整。", "correct": true}, {"letter": "B", "text": "在回應前用較小的模型對模糊性進行分類。", "correct": false}, {"letter": "C", "text": "使用預先定義的詮釋,但不陳述假設。", "correct": false}, {"letter": "D", "text": "限制助理每輪只能問一個釐清問題。", "correct": false}], "correct": "A", "explanation": "以合理且明說的假設逕行進行,可完全消除來回往返,同時讓使用者知情並保有掌控。預先定義且不明說的詮釋(C)在回應不符合使用者意圖時讓他們困惑。每輪一個問題的限制(D)仍需要多輪來回往返。較小的分類模型(B)增加延遲與基礎架構複雜度,卻沒有解決核心的使用者體驗問題。"}, {"scenario": "開發者生產力工具", "global_n": 77, "situation": "一位工程師請代理在一個 2,000 個檔案的儲存庫中找出函式 `calculate_tax` 被定義與被呼叫的所有位置。代理可使用 Read、Write、Edit、Bash、Grep 與 Glob。", "question": "哪一種做法最有效?", "options": [{"letter": "A", "text": "依序讀取儲存庫中的每個檔案,逐一掃描內容尋找函式名稱。", "correct": false}, {"letter": "B", "text": "使用 Grep 搜尋檔案內容中的 `calculate_tax`,必要時以 Glob 縮小檔案類型範圍。", "correct": true}, {"letter": "C", "text": "使用 Bash 執行 `find . | xargs cat`,在合併後的輸出中尋找該函式。", "correct": false}, {"letter": "D", "text": "請使用者把相關檔案貼進對話。", "correct": false}], "correct": "B", "explanation": "Grep 專為跨多檔案的內容搜尋而設計,只回傳含位置資訊的符合行,讓上下文視窗維持精簡。讀取每個檔案(A)浪費上下文且緩慢;把所有內容透過 Bash `cat` 倒出(C)產生無結構輸出並失去檔案/行號歸屬;請使用者貼檔案(D)違背了「具備儲存庫存取權的自動化工具」的初衷。"}, {"scenario": "開發者生產力工具", "global_n": 78, "situation": "為了摸清一個不熟悉的程式碼庫,代理執行一次廣泛的探索,列出數百個模組及其說明。原始輸出極為龐大,在工程師真正的任務開始前就開始排擠主對話。", "question": "處理這份探索輸出的最佳方式為何?", "options": [{"letter": "A", "text": "將探索委派給 Explore 子代理(或設定 `context: fork` 的技能),由其回傳精簡摘要至主工作階段。", "correct": true}, {"letter": "B", "text": "提高 `max_tokens`,讓完整的探索輸出能容納進去。", "correct": false}, {"letter": "C", "text": "將探索輸出截斷為前 50 個模組後繼續。", "correct": false}, {"letter": "D", "text": "探索完成後重啟工作階段,讓上下文清空。", "correct": false}], "correct": "A", "explanation": "子代理把冗長的探索隔離在獨立上下文中,只回傳提煉後的摘要,為真正的工作保留主上下文視窗。`max_tokens`(B)控制的是輸出長度,而非上下文壓力。截斷(C)會默默丟掉可能重要的模組。重啟(D)則丟棄了你剛付出代價取得的探索成果。"}, {"scenario": "開發者生產力工具", "global_n": 79, "situation": "產生的樣板程式碼一再偏離團隊慣例(import 排序、錯誤處理風格、測試版面配置)。同樣的請求,不同工程師得到不同的輸出。", "question": "最持久的解法為何?", "options": [{"letter": "A", "text": "將慣例寫入 CLAUDE.md,使其在該專案的每次請求都自動載入。", "correct": true}, {"letter": "B", "text": "要求每位工程師每次都在提示中重述慣例。", "correct": false}, {"letter": "C", "text": "調低 temperature,讓輸出更一致。", "correct": false}, {"letter": "D", "text": "在產生之後執行格式化工具來重塑程式碼。", "correct": false}], "correct": "A", "explanation": "CLAUDE.md 是專案的持久記憶——放在其中的慣例會自動套用到每個工作階段與每位工程師,從根源解決問題。每次提示重述慣例(B)易出錯且無法規模化。temperature(C)影響的是變異性,而非對未明說規則的遵循。格式化工具(D)能處理排版,卻管不到錯誤處理風格或結構性慣例。"}, {"scenario": "開發者生產力工具", "global_n": 80, "situation": "一位工程師要求進行一項會動到約 15 個檔案、且涉及不平凡設計決策(如何拆分某模組)的重構。他希望在任何程式碼變更前先審視做法。", "question": "哪一項 Claude Code 能力最合適?", "options": [{"letter": "A", "text": "使用規劃模式,在進行編輯前先產出並確認做法。", "correct": true}, {"letter": "B", "text": "立刻開始編輯,事後再讓工程師審視差異。", "correct": false}, {"letter": "C", "text": "用單一 Bash 命令一次套用所有變更。", "correct": false}, {"letter": "D", "text": "在一則訊息中產出整個重構,不使用工具呼叫。", "correct": false}], "correct": "A", "explanation": "規劃模式把設計與執行分開,讓工程師在任何檔案被動到之前,先核可這種模糊、多檔案變更的做法——正是前期對齊最有價值的時機。先編輯(B)在做法錯誤時會招致大量返工。用 Bash 批次套用(C)完全跳過審查。一次性產生(D)沒有檢查點,也沒有經工具驗證的編輯。"}, {"scenario": "開發者生產力工具", "global_n": 81, "situation": "代理嘗試 Edit 某檔案,但因該檔案自本工作階段上次讀取後已被變更而遭拒絕。", "question": "正確的回應為何?", "options": [{"letter": "A", "text": "重新讀取該檔案取得目前內容,再針對新狀態重新套用編輯。", "correct": true}, {"letter": "B", "text": "改用 Bash `sed` 命令強行編輯。", "correct": false}, {"letter": "C", "text": "不斷重試完全相同的 Edit 直到成功。", "correct": false}, {"letter": "D", "text": "用代理上次已知的版本以 Write 覆寫整個檔案。", "correct": false}], "correct": "A", "explanation": "過時防護之所以觸發,是因為磁碟上的內容已不符代理上次所見;重新讀取可還原編輯的正確基準。透過 Bash `sed` 強行寫入(B)繞過了安全檢查,可能破壞並行的變更。重試相同的 Edit(C)會因同樣原因持續失敗。用過時版本以 Write 覆寫(D)會丟棄一切變更該檔案的內容。"}, {"scenario": "開發者生產力工具", "global_n": 82, "situation": "團隊希望代理能在一個提供 REST API 的內部問題追蹤系統中查詢與更新工單。工程師不應手動貼上工單資料,且 API 憑證不得嵌入提示中。", "question": "最佳整合做法為何?", "options": [{"letter": "A", "text": "透過 MCP 伺服器公開該追蹤系統,讓代理取得結構化工具,並由伺服器在對話之外處理憑證。", "correct": true}, {"letter": "B", "text": "每當需要時,請工程師把工單 JSON 複製進聊天。", "correct": false}, {"letter": "C", "text": "把 API 金鑰放進 CLAUDE.md,讓代理能用 Bash `curl` 呼叫 API。", "correct": false}, {"letter": "D", "text": "把工單內容硬寫進技能檔。", "correct": false}], "correct": "A", "explanation": "MCP 伺服器是把後端服務以具型別工具提供給代理的標準方式,並由伺服器而非提示來管理驗證。手動貼上(B)無法規模化且會過時。把金鑰放進 CLAUDE.md(C)會把祕密洩漏到一個會被提交的檔案。把工單硬寫進技能(D)無法反映即時資料。"}, {"scenario": "開發者生產力工具", "global_n": 83, "situation": "每次發版,一位工程師都帶著代理走同樣的六個步驟(更新版本號、更新變更日誌、執行測試、打標籤、撰寫發版說明、開 PR)。他希望能以單一可重複的動作來叫用。", "question": "他應該建立什麼?", "options": [{"letter": "A", "text": "在 `.claude/` 中建立一個編碼了這六步流程的自訂斜線命令(或技能)。", "correct": true}, {"letter": "B", "text": "寫一份更長、以散文描述這些步驟的 CLAUDE.md。", "correct": false}, {"letter": "C", "text": "保存一份聊天逐字稿,每次發版時重讀。", "correct": false}, {"letter": "D", "text": "寫一支完全繞過代理的 Bash 腳本。", "correct": false}], "correct": "A", "explanation": "自訂命令/技能能擷取一個可重複、可帶參數的流程,讓工程師以名稱叫用——正是為此而生。以 CLAUDE.md 描述(B)提供的是背景脈絡,而非可叫用的動作。重讀逐字稿(C)既手動又脆弱。純 Bash 腳本(D)會喪失代理在變更日誌與 PR 文字等步驟上的判斷力。"}, {"scenario": "開發者生產力工具", "global_n": 84, "situation": "團隊希望一組嚴格的 API 設計規則,只在代理處理 `src/api/` 底下的檔案時套用,而不污染其他每個檔案的上下文。", "question": "哪一種機制合適?", "options": [{"letter": "A", "text": "在 `.claude/rules/` 中新增一個規則檔,並以 `paths` glob 將其範圍限定在 `src/api/**`。", "correct": true}, {"letter": "B", "text": "把規則放進頂層 CLAUDE.md,讓它總是載入。", "correct": false}, {"letter": "C", "text": "在每個碰到 API 的提示中貼上這些規則。", "correct": false}, {"letter": "D", "text": "為 API 程式碼另建一個獨立的儲存庫。", "correct": false}], "correct": "A", "explanation": "路徑範圍化的規則檔會依當下涉及哪些檔案而條件式載入,因此 API 規則只在 `src/api/` 底下生效、其他地方不生效——讓其他上下文保持乾淨。頂層 CLAUDE.md(B)到處都載入,正好相反。逐提示貼上(C)既手動又不一致。拆分儲存庫(D)是為了解決上下文範圍問題而做的沉重結構性變更。"}, {"scenario": "結構化資料擷取", "global_n": 85, "situation": "一條管線從發票擷取欄位,下游程式碼需要可靠、可解析且型別良好的輸出。自由文字回應偶爾會讓解析器出錯。", "question": "哪一種做法能得到最可靠的結構化輸出?", "options": [{"letter": "A", "text": "將欄位定義為 JSON 結構描述,並讓模型透過 `tool_use` 回傳。", "correct": true}, {"letter": "B", "text": "在系統提示中要求模型「以 JSON 回應」,再解析其文字。", "correct": false}, {"letter": "C", "text": "用正規表示式解析模型的散文回答。", "correct": false}, {"letter": "D", "text": "調低 `max_tokens`,讓模型保持精簡。", "correct": false}], "correct": "A", "explanation": "透過 `tool_use` JSON 結構描述驅動擷取,會約束輸出的形狀與型別,使下游解析可靠。散文式的「以 JSON 回應」指示(B)不具強制力且會飄移。對散文用正規表示式(C)脆弱,任何措辭改變都會壞掉。`max_tokens`(D)控制的是長度,而非結構。"}, {"scenario": "結構化資料擷取", "global_n": 86, "situation": "有些發票沒有採購單號。目前的結構描述把 `po_number` 標為必填,因此模型會捏造看似合理的值來滿足它。", "question": "正確的結構描述設計為何?", "options": [{"letter": "A", "text": "把 `po_number` 設為選填/可為 null,讓模型在欄位不存在時回傳 null。", "correct": true}, {"letter": "B", "text": "維持必填,並接受偶爾出現的捏造值。", "correct": false}, {"letter": "C", "text": "把 `po_number` 從結構描述中整個移除。", "correct": false}, {"letter": "D", "text": "加上「絕不臆測」的指示,但仍維持該欄位必填。", "correct": false}], "correct": "A", "explanation": "把欄位設為可為 null/選填,給了模型一個表示「不存在」的正確方式,消除了捏造的壓力。維持必填(B)保證會出現幻覺值。移除欄位(C)會在資料確實存在時丟棄它。在欄位仍必填的情況下加「絕不臆測」指示(D)與結構描述相互矛盾且不可靠——應由結構讓正確答案得以被表達。"}, {"scenario": "結構化資料擷取", "global_n": 87, "situation": "`document_type` 欄位通常落在已知集合(invoice、receipt、statement)內,但偶爾有文件不屬於任何一種。", "question": "結構描述如何處理最好?", "options": [{"letter": "A", "text": "使用已知類型的 enum,外加一個「other」值並搭配自由文字的細節欄位。", "correct": true}, {"letter": "B", "text": "使用沒有任何約束的自由文字字串。", "correct": false}, {"letter": "C", "text": "使用只含三種已知類型的 enum,強制擇一。", "correct": false}, {"letter": "D", "text": "每出現一種未預期的類型,就新增一個 enum 值。", "correct": false}], "correct": "A", "explanation": "enum 擷取常見情況以利下游乾淨處理,而「other」加細節欄位則為長尾提供一個正確、可檢視的歸處。純自由文字字串(B)會喪失 enum 帶來的一致性。封閉的三值 enum(C)會迫使真正的例外被錯誤分類。不斷擴充 enum(D)既被動又難以維護。"}, {"scenario": "結構化資料擷取", "global_n": 88, "situation": "擷取出的輸出符合結構描述,但明細項目的金額有時無法加總為發票上所述的總額——這是 JSON 結構描述無法捕捉的錯誤。", "question": "最有效的防護為何?", "options": [{"letter": "A", "text": "加入語意驗證(例如 Pydantic 檢查),並在重試迴圈中把失敗回饋給模型。", "correct": true}, {"letter": "B", "text": "用更多欄位型別把 JSON 結構描述收得更緊。", "correct": false}, {"letter": "C", "text": "調低 temperature 以減少算術錯誤。", "correct": false}, {"letter": "D", "text": "既然符合結構描述就接受該輸出。", "correct": false}], "correct": "A", "explanation": "結構描述驗證檢查的是形狀與型別,而非跨欄位的業務規則;語意驗證器能捕捉加總不符,而「附回饋的重試」迴圈讓模型得以自我修正。更多欄位型別(B)仍無法表達「明細必須加總為總額」。temperature(C)無法保證算術一致。接受「符合結構描述卻錯誤」的資料(D)等於把錯誤出貨。"}, {"scenario": "結構化資料擷取", "global_n": 89, "situation": "你必須從 50,000 份封存文件擷取欄位。這是一次性的回填工作,沒有延遲需求,而成本很重要。", "question": "哪一種機制最合適?", "options": [{"letter": "A", "text": "透過 Message Batches API 提交這項工作。", "correct": true}, {"letter": "B", "text": "盡可能快地送出 50,000 個個別的同步請求。", "correct": false}, {"letter": "C", "text": "把所有文件串接成單一請求。", "correct": false}, {"letter": "D", "text": "以互動方式逐份手動處理。", "correct": false}], "correct": "A", "explanation": "Message Batches API 專為大量、非延遲敏感的工作而設計,成本約為一半——非常適合一次性回填。發出 50,000 個同步請求(B)成本更高且壓迫速率限制。串接所有內容(C)會超出上下文視窗並使文件互相糾纏。手動處理(D)無法規模化。"}, {"scenario": "結構化資料擷取", "global_n": 90, "situation": "下游程式碼要求模型的工具輸入每次都*完全*符合結構描述——不缺必填鍵、不多出屬性。", "question": "哪一個選項提供最強的保證?", "options": [{"letter": "A", "text": "在工具上啟用 strict 模式,使輸入在生成時即依結構描述驗證。", "correct": true}, {"letter": "B", "text": "在系統提示中加上「完全遵循結構描述」。", "correct": false}, {"letter": "C", "text": "事後驗證,並丟棄不符的結果。", "correct": false}, {"letter": "D", "text": "提供一個正確酬載的少樣本範例。", "correct": false}], "correct": "A", "explanation": "strict 工具使用會在模型生成工具輸入的當下強制套用結構描述,保證酬載相符。提示指示(B)只是建議,並無保證。事後丟棄(C)浪費呼叫且仍需備援。少樣本範例(D)能引導格式,卻不提供保證。"}, {"scenario": "結構化資料擷取", "global_n": 91, "situation": "一份掃描合約過於模糊,無法有把握地判定生效日期,然而結構描述把 `effective_date` 列為必填。", "question": "最負責任的行為為何?", "options": [{"letter": "A", "text": "為該欄位回傳 null(或一個旗標)並標示低信心,使其可被導向人工審查。", "correct": true}, {"letter": "B", "text": "輸出最有可能的日期以滿足必填欄位。", "correct": false}, {"letter": "C", "text": "默默跳過該文件。", "correct": false}, {"letter": "D", "text": "停下整個批次,直到有人介入。", "correct": false}], "correct": "A", "explanation": "以低信心標示「未知」,讓人能解決這個真正模糊的案例而不污染資料集(這也是該欄位應可為 null 的原因)。輸出一個看似合理的臆測(B)會注入無聲的錯誤。默默跳過(C)會在毫無痕跡下遺失該筆紀錄。停下整個批次(D)會為了一份壞掃描而擋下數千份良好擷取。"}, {"scenario": "結構化資料擷取", "global_n": 92, "situation": "在信任這條管線之前,你需要知道各欄位的擷取準確度,並為「自動接受 vs. 人工審查」設定信心門檻。", "question": "哪一種做法能得到可信的衡量?", "options": [{"letter": "A", "text": "對各欄位評分信心,並以已標註資料集校準,跨類型以分層方式抽樣文件。", "correct": true}, {"letter": "B", "text": "對整份文件使用單一的整體信心分數。", "correct": false}, {"letter": "C", "text": "不加查證就相信模型自報的信心。", "correct": false}, {"letter": "D", "text": "抽查少數幾份容易的文件。", "correct": false}], "correct": "A", "explanation": "以已標註資料校準的欄位層級評分,能顯示管線在何處可靠,而分層抽樣確保每種文件類型都有代表——使門檻反映真實準確度。單一文件層級分數(B)會掩蓋哪些欄位失敗。未校準的自報信心(C)未必符合現實。抽查容易的案例(D)會得到偏誤、過度樂觀的估計。"}, {"scenario": "代理式 AI 工具", "global_n": 93, "situation": "某代理必須能發出退款。退款不可逆,且必須在執行前先經過確認/權限步驟把關。", "question": "這項能力應如何公開?", "options": [{"letter": "A", "text": "作為專用的 `process_refund` 工具,讓框架能對其把關、驗證並要求確認。", "correct": true}, {"letter": "B", "text": "作為模型自行組合的通用 `bash` 能力(例如對退款端點發 `curl`)。", "correct": false}, {"letter": "C", "text": "在系統提示中指示模型退款前一律先詢問。", "correct": false}, {"letter": "D", "text": "信任模型只在適當時才退款。", "correct": false}], "correct": "A", "explanation": "專用工具給了框架一個具型別、可攔截的掛鉤,讓它能在這種破壞性、不可逆的動作之前強制執行確認與權限——這是單靠提示無法保證的控制。通用 `bash` 能力(B)是一串不透明的命令字串,框架無法可靠地把關。系統提示指示(C)與純粹信任(D)都不是強制力;模型仍可能略過把關逕行動作。"}, {"scenario": "代理式 AI 工具", "global_n": 94, "situation": "某代理常在應呼叫 `lookup_order` 時呼叫了 `get_customer`。這兩個工具的描述都簡短且相似。", "question": "你該先嘗試什麼?", "options": [{"letter": "A", "text": "重寫工具描述,讓每個都清楚說明何時使用,以及與另一個的差異。", "correct": true}, {"letter": "B", "text": "在代理前面加一個路由分類器模型。", "correct": false}, {"letter": "C", "text": "移除其中一個工具。", "correct": false}, {"letter": "D", "text": "對所有請求強制把 `tool_choice` 設為 `lookup_order`。", "correct": false}], "correct": "A", "explanation": "模型主要依工具描述來選擇工具,因此釐清描述能以最低成本直擊根因。另設分類器(B)為一個用文字即可解決的問題增添延遲與基礎架構。移除工具(C)會喪失所需能力。處處強制 `lookup_order`(D)會破壞那些確實需要 `get_customer` 的正當情況。"}, {"scenario": "代理式 AI 工具", "global_n": 95, "situation": "你正在撰寫那段「決定工具呼叫後代理回合何時完成」的迴圈。", "question": "正確的終止訊號為何?", "options": [{"letter": "A", "text": "當 `stop_reason` 為 `tool_use` 時持續,當其為 `end_turn` 時停止。", "correct": true}, {"letter": "B", "text": "不論狀態如何,固定迭代次數後停止。", "correct": false}, {"letter": "C", "text": "在助理文字中搜尋「我完成了」之類的字句。", "correct": false}, {"letter": "D", "text": "只要任何工具回傳結果就停止。", "correct": false}], "correct": "A", "explanation": "`stop_reason` 是 API 明確且可靠的訊號:`tool_use` 表示執行工具並繼續;`end_turn` 表示模型已完成。固定迭代上限(B)不是切斷正當工作就是空轉。搜尋「完成」字句(C)脆弱且易錯。第一個工具結果就停止(D)會讓多步驟任務過早結束。"}, {"scenario": "代理式 AI 工具", "global_n": 96, "situation": "為回答一項請求,代理需要三個彼此獨立、互不依賴結果的查詢(客戶、訂單、庫存)。", "question": "最有效率的模式為何?", "options": [{"letter": "A", "text": "在同一回合中平行發出這三個工具呼叫,並在下一則使用者訊息中一併回傳三個結果。", "correct": true}, {"letter": "B", "text": "嚴格逐一呼叫,分散在三個回合。", "correct": false}, {"letter": "C", "text": "把三者合併成單一過載的工具。", "correct": false}, {"letter": "D", "text": "請使用者選出最重要的查詢。", "correct": false}], "correct": "A", "explanation": "獨立的呼叫可在單一助理回合內平行進行,而把所有 `tool_result` 區塊一併放進單一使用者訊息回傳是受支援的模式——可將往返次數降到最低。逐一呼叫(B)為無相依的工作浪費回合。單一過載工具(C)混淆職責與結構描述。請使用者選擇(D)丟棄了所需資訊。"}, {"scenario": "代理式 AI 工具", "global_n": 97, "situation": "某 `get_account` 工具回傳 40 多個欄位,但代理始終只需要其中五個。在長時間的工作階段中,未使用的欄位不斷堆積並排擠上下文視窗。", "question": "最佳的解法為何?", "options": [{"letter": "A", "text": "修改該工具,只回傳代理需要的欄位。", "correct": true}, {"letter": "B", "text": "改用更大的模型來擴大上下文視窗。", "correct": false}, {"letter": "C", "text": "叫模型忽略多餘的欄位。", "correct": false}, {"letter": "D", "text": "更頻繁地摘要整段對話。", "correct": false}], "correct": "A", "explanation": "在源頭裁減工具輸出,可在每次呼叫都移除浪費的 token——從根源解決。更大的上下文視窗(B)只是以更高成本延後同樣的堆積。叫模型忽略欄位(C)仍要付出把它們帶在上下文中的代價。更頻繁的摘要(D)只治標,且有丟失細節的風險。"}, {"scenario": "代理式 AI 工具", "global_n": 98, "situation": "某工具包裝了一個不穩定的外部 API。有時逾時(值得重試);有時回傳永久性的「找不到」(不值得重試)。目前每種失敗在模型看來都一樣。", "question": "工具錯誤應如何傳遞?", "options": [{"letter": "A", "text": "回傳帶有類別與可重試旗標的結構化錯誤,讓模型對暫時性失敗重試、對永久性失敗升級。", "correct": true}, {"letter": "B", "text": "對每種失敗都回傳一個通用的「error」字串。", "correct": false}, {"letter": "C", "text": "任何失敗都默默回傳空結果。", "correct": false}, {"letter": "D", "text": "丟棄該工具呼叫並結束回合。", "correct": false}], "correct": "A", "explanation": "透過類別與可重試旗標區分暫時性與永久性失敗,讓模型能針對每種情況做出正確的復原決策。通用錯誤(B)抹除了這個區分。無聲的空結果(C)隱藏失敗,並誤導模型以為呼叫成功了。結束回合(D)放棄了可復原的工作。"}, {"scenario": "代理式 AI 工具", "global_n": 99, "situation": "對某個特定的工作流程步驟,代理必須在繼續之前呼叫 `validate_address` 工具——略過是不可接受的。", "question": "哪一種機制能強制這一點?", "options": [{"letter": "A", "text": "針對該請求,把 `tool_choice` 設為強制使用 `validate_address` 工具。", "correct": true}, {"letter": "B", "text": "在系統提示中加上「一律驗證地址」,並期望它會遵從。", "correct": false}, {"letter": "C", "text": "調低 temperature,讓模型更服從。", "correct": false}, {"letter": "D", "text": "在整個工作階段移除其他所 const state = { current: 0, answers: {} };

function md(text) {
  if (!text) return '';
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, ' ');
}

function buildSidebar() {
  const list = document.getElementById('sidebarList');
  document.getElementById('totalCount').textContent = QUESTIONS.length;
  let currentScenario = null;
  let groupEl = null;
  QUESTIONS.forEach((q, idx) => {
    if (q.scenario !== currentScenario) {
      currentScenario = q.scenario;
      const sg = document.createElement('div');
      sg.className = 'scenario-group';
      const lbl = document.createElement('div');
      lbl.className = 'scenario-label';
      lbl.textContent = q.scenario;
      sg.appendChild(lbl);
      groupEl = sg;
      list.appendChild(sg);
    }
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.id = 'sb-' + idx;
    btn.onclick = () => goto(idx);
    btn.innerHTML = '<span class="q-dot"></span> Q' + q.global_n;
    groupEl.appendChild(btn);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, idx) => {
    const btn = document.getElementById('sb-' + idx);
    if (!btn) return;
    btn.className = 'q-btn';
    if (idx === state.current) btn.classList.add('active');
    const ans = state.answers[q.global_n];
    if (ans !== undefined) {
      btn.classList.add(ans === q.correct ? 'answered-correct' : 'answered-wrong');
    }
  });
  document.getElementById('answeredCount').textContent = Object.keys(state.answers).length;
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const chosen = state.answers[q.global_n];
  const locked = chosen !== undefined;

  document.getElementById('qCounter').textContent = (idx + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === QUESTIONS.length - 1;

  const optionsHtml = q.options.map(opt => {
    let cls = 'option';
    if (locked) {
      cls += ' locked';
      if (opt.correct) cls += ' correct';
      else if (opt.letter === chosen) cls += ' wrong';
      else cls += ' dimmed';
    }
    return '<div class="' + cls + '" data-letter="' + opt.letter + '" onclick="answer(' + q.global_n + ', \'' + opt.letter + '\')">' +
      '<div class="opt-letter">' + opt.letter + '</div>' +
      '<div class="opt-text">' + md(opt.text) + '</div></div>';
  }).join('');

  const expl = locked
    ? '<div class="explanation show"><strong>Why ' + q.correct + ':</strong> ' + md(q.explanation) + '</div>'
    : '<div class="explanation"></div>';

  document.getElementById('qCard').innerHTML =
    '<div class="q-number">Question ' + q.global_n + '</div>' +
    '<div class="q-scenario">' + q.scenario + '</div>' +
    '<div class="q-situation">' + md(q.situation) + '</div>' +
    '<div class="q-prompt">' + md(q.question) + '</div>' +
    '<div class="options">' + optionsHtml + '</div>' +
    expl;
}

function answer(globalN, letter) {
  if (state.answers[globalN] !== undefined) return;
  state.answers[globalN] = letter;
  renderQuestion(state.current);
  updateSidebar();
}

function navigate(dir) { goto(state.current + dir); }

function goto(idx) {
  if (idx < 0 || idx >= QUESTIONS.length) return;
  document.getElementById('questionScreen').classList.add('active');
  document.getElementById('summaryScreen').classList.remove('active');
  state.current = idx;
  renderQuestion(idx);
  updateSidebar();
}

function showSummary() {
  document.getElementById('questionScreen').classList.remove('active');
  document.getElementById('summaryScreen').classList.add('active');

  const total = QUESTIONS.length;
  const answered = Object.keys(state.answers).length;
  let correct = 0;
  const wrongByScenario = {};

  QUESTIONS.forEach(q => {
    const ans = state.answers[q.global_n];
    if (ans === undefined) return;
    if (ans === q.correct) {
      correct++;
    } else {
      if (!wrongByScenario[q.scenario]) wrongByScenario[q.scenario] = [];
      wrongByScenario[q.scenario].push({ q: q, chosen: ans });
    }
  });

  const wrong = answered - correct;
  const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;
  const unanswered = total - answered;

  let wrongGroupsHtml = '';
  for (const scenario in wrongByScenario) {
    const items = wrongByScenario[scenario];
    const rows = items.map(item => {
      const chosenOpt = item.q.options.find(o => o.letter === item.chosen);
      const correctOpt = item.q.options.find(o => o.letter === item.q.correct);
      return '<div class="wrong-item">' +
        '<div class="wi-n">Q' + item.q.global_n + '</div>' +
        '<div class="wi-q">' +
          '<div class="wi-situation">' + md(item.q.situation) + '</div>' +
          '<div class="wi-prompt">' + md(item.q.question) + '</div>' +
          '<div class="wi-ans">' +
            'Your answer: <span class="wi-wrong-tag">' + item.chosen + '</span> — ' + md(chosenOpt ? chosenOpt.text : '') + '<br>' +
            'Correct: <span class="wi-correct-tag">' + item.q.correct + '</span> — ' + md(correctOpt ? correctOpt.text : '') +
          '</div>' +
        '</div></div>';
    }).join('');
    wrongGroupsHtml +=
      '<div class="group-block">' +
        '<div class="group-title">' + scenario +
          '<span class="group-badge">' + items.length + ' incorrect</span></div>' +
        rows +
      '</div>';
  }

  const unansweredNote = unanswered > 0
    ? '<p style="color:#e53e3e;font-size:14px;margin-bottom:20px;font-weight:600;">&#9888; ' + unanswered + ' question(s) not answered.</p>'
    : '';

  document.getElementById('summaryContent').innerHTML =
    '<h1>Exam Complete</h1>' +
    '<p class="summary-subtitle">You answered ' + answered + ' of ' + total + ' questions.</p>' +
    unansweredNote +
    '<div class="score-grid">' +
      '<div class="score-card total"><div class="big">' + pct + '%</div><div class="label">Score</div></div>' +
      '<div class="score-card correct-c"><div class="big">' + correct + '</div><div class="label">Correct</div></div>' +
      '<div class="score-card wrong-c"><div class="big">' + wrong + '</div><div class="label">Incorrect</div></div>' +
    '</div>' +
    (wrong > 0
      ? '<div class="section-title">Incorrect answers by scenario</div>' + wrongGroupsHtml
      : '<p style="color:#38a169;font-weight:700;font-size:17px;">All answered questions correct!</p>') +
    '<button class="restart-btn" onclick="restart()">Restart Exam</button>';
}

function restart() {
  state.answers = {};
  state.current = 0;
  document.getElementById('questionScreen').classList.add('active');
  document.getElementById('summaryScreen').classList.remove('active');
  renderQuestion(0);
  updateSidebar();
}

buildSidebar();
renderQuestion(0);
updateSidebar();
</script>
