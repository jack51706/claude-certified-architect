name: Deploy learning site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'guide_en.MD'
      - 'guide_zh-tw.md'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # `npm run build` runs scripts/sync.mjs first (regenerates the study
        # content + bilingual quiz data from the guides), then `astro build`.
        run: npm run build
        env:
          # Project Pages serve under /<repo>/. Derive the base path and site
          # URL from the repo so this works on any fork without edits.
          BASE_PATH: /${{ github.event.repository.name }}
          SITE_URL: https://${{ github.repository_owner }}.github.io

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
